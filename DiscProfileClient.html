<script>
(function(){
  const rows=[
    {d:'I take charge quickly.',i:'I energize the group.',s:'I create calm and stability.',c:'I check facts and details.'},
    {d:'I focus on results.',i:'I enjoy meeting new people.',s:'I listen patiently.',c:'I prefer clear standards.'},
    {d:'I make fast decisions.',i:'I persuade through enthusiasm.',s:'I support others consistently.',c:'I analyze before deciding.'},
    {d:'I challenge obstacles directly.',i:'I express ideas openly.',s:'I help people cooperate.',c:'I organize information carefully.'},
    {d:'I am comfortable with risk.',i:'I bring optimism.',s:'I value dependable routines.',c:'I notice errors others miss.'},
    {d:'I prefer independence.',i:'I think out loud.',s:'I avoid unnecessary conflict.',c:'I ask precise questions.'},
    {d:'I push projects forward.',i:'I celebrate people and wins.',s:'I make space for everyone.',c:'I compare options carefully.'},
    {d:'I speak directly.',i:'I communicate with emotion.',s:'I remain steady under pressure.',c:'I document what matters.'},
    {d:'I compete with high standards.',i:'I build relationships easily.',s:'I follow through reliably.',c:'I prefer accuracy over speed.'},
    {d:'I want freedom to act.',i:'I want freedom to express ideas.',s:'I want time to adjust.',c:'I want enough information.'},
    {d:'In conflict, I address the issue.',i:'In conflict, I talk it through.',s:'In conflict, I seek harmony.',c:'In conflict, I return to facts.'},
    {d:'Others may see me as forceful.',i:'Others may see me as expressive.',s:'Others may see me as patient.',c:'Others may see me as careful.'}
  ];
  const info={D:{name:'Direct / Driving',strengths:'decisive, independent, action-oriented',needs:'clear goals, choices, and concise communication',stress:'may become impatient or overly forceful',tips:'Lead with the result, be direct, and avoid unnecessary detail.'},I:{name:'Interactive / Influencing',strengths:'enthusiastic, persuasive, relationship-oriented',needs:'conversation, recognition, and room to express ideas',stress:'may lose focus or overpromise',tips:'Connect personally, keep energy positive, and confirm next steps in writing.'},S:{name:'Supportive / Steady',strengths:'patient, dependable, cooperative',needs:'respectful pacing, predictability, and time to adjust',stress:'may avoid conflict or hold concerns inside',tips:'Give advance notice, listen fully, and avoid rushing important decisions.'},C:{name:'Careful / Conscientious',strengths:'accurate, organized, analytical',needs:'facts, standards, and time to review',stress:'may overanalyze or sound overly critical',tips:'Provide details, explain expectations, and allow questions.'}};
  let last='';
  function render(){const box=document.getElementById('discQuestionList');if(!box)return;box.innerHTML=rows.map((r,i)=>`<fieldset class="disc-row"><legend>${i+1}. Choose one:</legend>${['d','i','s','c'].map(k=>`<label><input type="radio" name="disc${i}" value="${k.toUpperCase()}"><span>${r[k]}</span></label>`).join('')}</fieldset>`).join('');}
  function calculate(){const scores={D:0,I:0,S:0,C:0};for(let i=0;i<rows.length;i++){const q=document.querySelector(`input[name="disc${i}"]:checked`);if(!q){toast(`Please answer question ${i+1}.`,true);return;}scores[q.value]++;}const order=Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);const primary=order[0],secondary=order[1];const a=info[primary],b=info[secondary];last=`FamilyPD Communication Style Profile\nPrimary: ${primary} — ${a.name}\nSecondary: ${secondary} — ${b.name}\nScores: D ${scores.D}, i ${scores.I}, S ${scores.S}, C ${scores.C}\n\nLikely strengths: ${a.strengths}.\nHelpful conditions: ${a.needs}.\nUnder stress: ${a.stress}.\nCommunication tip: ${a.tips}\n\nThis is a non-clinical reflection activity, not an official licensed DiSC assessment.`;const out=document.getElementById('discProfileResult');out.innerHTML=`<h3>${primary} / ${secondary} profile</h3><p><strong>Primary:</strong> ${a.name}</p><p><strong>Secondary:</strong> ${b.name}</p><p><strong>Scores:</strong> D ${scores.D} · i ${scores.I} · S ${scores.S} · C ${scores.C}</p><p><strong>Likely strengths:</strong> ${a.strengths}.</p><p><strong>Helpful conditions:</strong> ${a.needs}.</p><p><strong>Under stress:</strong> ${a.stress}.</p><p><strong>Communication tip:</strong> ${a.tips}</p><p class="warning-text">This is a reflection activity, not an official licensed DiSC assessment or diagnosis.</p>`;out.classList.remove('hidden');['copyDiscProfileButton','downloadDiscProfileButton'].forEach(id=>document.getElementById(id).classList.remove('hidden'));out.scrollIntoView({behavior:'smooth',block:'start'});}
  function bind(){render();const calc=document.getElementById('calculateDiscProfileButton');if(calc)calc.addEventListener('click',calculate);const reset=document.getElementById('resetDiscProfileButton');if(reset)reset.addEventListener('click',()=>{document.querySelectorAll('#discQuestionList input').forEach(x=>x.checked=false);document.getElementById('discProfileResult').classList.add('hidden');last='';});const copy=document.getElementById('copyDiscProfileButton');if(copy)copy.addEventListener('click',async()=>{if(!last)return;try{await navigator.clipboard.writeText(last);}catch(e){}toast('Communication profile copied.');});const dl=document.getElementById('downloadDiscProfileButton');if(dl)dl.addEventListener('click',()=>{if(last&&typeof downloadTextFile==='function')downloadTextFile('FamilyPD-Communication-Profile.txt','text/plain',last);});}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bind);else bind();
})();
</script>
