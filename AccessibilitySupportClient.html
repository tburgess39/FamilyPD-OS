  let currentSupportField = null;
  let supportObserver = null;
  let speechQueue = [];
  let speechQueueIndex = 0;


  function supportUi_() {
    return ACCESS_SUPPORT_UI[state.language] || ACCESS_SUPPORT_UI.en;
  }


  function bindAccessibilitySupport() {
    document.getElementById('quickSupportButton').addEventListener(
      'click',
      function() {
        if (currentSupportField && document.body.contains(currentSupportField)) {
          openFieldSupport(currentSupportField);
        } else {
          openGeneralSupport();
        }
      }
    );
    document.getElementById('closeFieldSupportButton').addEventListener(
      'click',
      closeFieldSupport
    );
    document.getElementById('supportReadQuestionButton').addEventListener(
      'click',
      readCurrentSupportQuestion
    );
    document.getElementById('supportReadAnswerButton').addEventListener(
      'click',
      readCurrentSupportAnswer
    );
    document.getElementById('supportReadSectionButton').addEventListener(
      'click',
      function() {
        const panel = document.querySelector('.workspace-panel.active') ||
          document.querySelector('main');
        readElementAloud(panel);
      }
    );
    document.getElementById('supportStopReadingButton').addEventListener(
      'click',
      stopReadAloud
    );
    document.getElementById('supportClearAnswerButton').addEventListener(
      'click',
      clearCurrentSupportAnswer
    );
    document.getElementById('fieldSupportExamples').addEventListener(
      'click',
      handleSupportExampleClick
    );

    document.addEventListener('focusin', function(event) {
      const field = supportableField_(event.target);
      if (!field) return;
      currentSupportField = field;
      updateSupportTriggerState_();
    });

    attachSupportToFields_();
    supportObserver = new MutationObserver(function() {
      attachSupportToFields_();
    });
    supportObserver.observe(document.body, {
      childList: true,
      subtree: true
    });
    applyAccessibilitySupportLanguage();
    updateSpeechControls_();
  }


  function applyAccessibilitySupportLanguage() {
    const text = supportUi_();
    setText('quickSupportButtonText', text.topButton);
    setText('fieldSupportEyebrow', text.drawerEyebrow);
    setText('fieldSupportTitle', text.drawerTitle);
    setText('fieldSupportQuestionHeading', text.question);
    setText('fieldSupportExplanationHeading', text.explanation);
    setText('fieldSupportExamplesHeading', text.examples);
    setText('supportReadQuestionButton', text.readQuestion);
    setText('supportReadAnswerButton', text.readAnswer);
    setText('supportReadSectionButton', text.readSection);
    setText('supportStopReadingButton', text.stop);
    setText('supportClearAnswerButton', text.clear);
    document.getElementById('closeFieldSupportButton').setAttribute(
      'aria-label',
      text.close
    );

    document.querySelectorAll('.field-help-trigger').forEach(function(button) {
      button.textContent = '💡 ' + text.choicesButton;
      button.setAttribute('aria-label', text.choicesButton);
    });

    if (currentSupportField && !document.getElementById('fieldSupportDrawer')
      .classList.contains('hidden')) {
      renderFieldSupport_(currentSupportField);
    }
    updateSpeechControls_();
  }


  function attachSupportToFields_() {
    const selector = [
      '.workspace-panel input:not([type="hidden"]):not([type="file"]):not([type="checkbox"]):not([type="radio"]):not([type="button"]):not([type="submit"])',
      '.workspace-panel textarea:not([readonly])',
      '.workspace-panel select'
    ].join(',');

    document.querySelectorAll(selector).forEach(function(field) {
      if (!supportableField_(field) || field.dataset.fpdSupportBound === 'yes') {
        return;
      }
      field.dataset.fpdSupportBound = 'yes';

      const wrapper = field.closest('.field') || field.closest('label') ||
        field.parentElement;
      if (!wrapper || wrapper.querySelector(':scope > .field-help-trigger')) {
        return;
      }

      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'field-help-trigger';
      button.textContent = '💡 ' + supportUi_().choicesButton;
      button.setAttribute('aria-label', supportUi_().choicesButton);
      button.addEventListener('click', function(event) {
        event.preventDefault();
        currentSupportField = field;
        openFieldSupport(field);
      });
      wrapper.appendChild(button);
    });
  }


  function supportableField_(field) {
    if (!field || !field.matches) return null;
    if (!field.matches('input,textarea,select')) return null;
    if (field.disabled || field.readOnly) return null;
    if (field.closest('#fieldSupportDrawer')) return null;
    if (['hidden', 'file', 'checkbox', 'radio', 'button', 'submit']
      .indexOf(String(field.type || '').toLowerCase()) >= 0) return null;
    return field;
  }


  function openGeneralSupport() {
    currentSupportField = null;
    const text = supportUi_();
    show('fieldSupportDrawer');
    document.getElementById('fieldSupportDrawer').classList.add('open');
    setText('fieldSupportQuestionText', text.noFieldTitle);
    setText('fieldSupportExplanationText', text.noFieldText);
    setText('fieldSupportExamplesHeading', text.examples);
    document.getElementById('fieldSupportExamples').innerHTML =
      '<div class="support-empty">' + escapeHtml(text.editableNote) + '</div>';
    document.getElementById('supportReadQuestionButton').disabled = false;
    document.getElementById('supportReadAnswerButton').disabled = true;
    document.getElementById('supportClearAnswerButton').disabled = true;
    document.getElementById('closeFieldSupportButton').focus();
  }


  function openFieldSupport(field) {
    currentSupportField = field;
    show('fieldSupportDrawer');
    document.getElementById('fieldSupportDrawer').classList.add('open');
    renderFieldSupport_(field);
  }


  function closeFieldSupport() {
    const drawer = document.getElementById('fieldSupportDrawer');
    drawer.classList.remove('open');
    hide('fieldSupportDrawer');
    if (currentSupportField && document.body.contains(currentSupportField)) {
      currentSupportField.focus();
    }
  }


  function renderFieldSupport_(field) {
    const context = fieldContext_(field);
    const text = supportUi_();
    setText('fieldSupportQuestionText', context.label);
    setText('fieldSupportExplanationText', context.help);
    setText(
      'fieldSupportExamplesHeading',
      field.tagName === 'SELECT' ? text.choices : text.examples
    );

    const container = document.getElementById('fieldSupportExamples');
    if (field.tagName === 'SELECT') {
      const options = Array.from(field.options)
        .filter(function(option) { return Boolean(option.value); })
        .slice(0, 20);
      container.innerHTML = options.length
        ? options.map(function(option, index) {
            const description = optionDescription_(field, option);
            return '<button type="button" class="support-example-button support-choice-card" ' +
              'data-support-choice-index="' + index + '"><span>' +
              escapeHtml(option.textContent.trim()) + '</span>' +
              (description ? '<p>' + escapeHtml(description) + '</p>' : '') +
              '<small>' +
              escapeHtml(option.selected ? text.selected : text.choose) +
              '</small></button>';
          }).join('')
        : '<div class="support-empty">' + escapeHtml(text.noExamples) + '</div>';
      container.dataset.supportMode = 'select';
    } else {
      const examples = context.examples || [];
      container.innerHTML = examples.length
        ? '<p class="support-editable-note">' +
          escapeHtml(text.editableNote) + '</p>' +
          examples.map(function(example, index) {
            return '<button type="button" class="support-example-button" ' +
              'data-support-example-index="' + index + '"><span>' +
              escapeHtml(example) + '</span><small>' +
              escapeHtml(field.value.trim() ? text.add : text.use) +
              '</small></button>';
          }).join('')
        : '<div class="support-empty">' + escapeHtml(text.noExamples) + '</div>';
      container.dataset.supportMode = 'text';
      container.dataset.supportExamples = JSON.stringify(examples);
    }

    document.getElementById('supportReadQuestionButton').disabled = false;
    document.getElementById('supportReadAnswerButton').disabled = false;
    document.getElementById('supportClearAnswerButton').disabled = false;
    updateSupportTriggerState_();
  }


  function fieldContext_(field) {
    const label = fieldLabel_(field);
    const help = fieldHelp_(field);
    const examples = fieldExamples_(field);
    return { label: label, help: help, examples: examples };
  }


  function fieldLabel_(field) {
    const label = field.closest('label');
    if (label) {
      const labelSpan = label.querySelector(':scope > span');
      if (labelSpan && labelSpan.textContent.trim()) {
        return labelSpan.textContent.trim();
      }
    }
    const aria = field.getAttribute('aria-label');
    if (aria) return aria;
    const placeholder = field.getAttribute('placeholder');
    if (placeholder) return placeholder;
    return state.language === 'es' ? 'Respuesta' : 'Response';
  }


  function fieldHelp_(field) {
    const text = supportUi_();
    const language = state.language === 'es' ? 'es' : 'en';
    const detailed = FIELD_SUPPORT_CONTEXT[language] &&
      FIELD_SUPPORT_CONTEXT[language][field.id];
    if (detailed) return detailed;
    const label = field.closest('label');
    if (label) {
      const small = label.querySelector('small');
      if (small && small.textContent.trim()) return small.textContent.trim();
    }
    if (field.dataset.help) return field.dataset.help;
    if (field.tagName === 'SELECT') return text.selectHelp;
    if (field.type === 'date' || field.type === 'time') return text.dateHelp;
    if (field.type === 'url') return text.urlHelp;
    if (field.type === 'number' || field.type === 'range') return text.numberHelp;
    const nearby = field.closest('.planner-step, .edit-card, .form-card');
    if (nearby) {
      const intro = nearby.querySelector('.section-heading-row p, .planner-step-content > p');
      if (intro && intro.textContent.trim()) return intro.textContent.trim();
    }
    return text.genericHelp;
  }


  function fieldExamples_(field) {
    const language = state.language === 'es' ? 'es' : 'en';
    if (['url', 'date', 'time', 'number', 'range'].indexOf(
      String(field.type || '').toLowerCase()
    ) >= 0) return [];
    const specific = FIELD_SUPPORT_EXAMPLES[language][field.id];
    if (specific && specific.length) return specific.slice();

    const classes = String(field.className || '').toLowerCase();
    const id = String(field.id || '').toLowerCase();
    const combined = id + ' ' + classes + ' ' +
      String(field.placeholder || '').toLowerCase();

    const patterns = language === 'es' ? {
      question: ['¿Qué información necesitamos confirmar?', '¿Qué apoyo ayudaría?', '¿Qué acción debemos tomar después?'],
      action: ['Completar el primer paso.', 'Confirmar la información en una fuente oficial.', 'Programar una revisión y asignar un rol general.'],
      responsibility: ['Explicar o demostrar los pasos.', 'Recordar la fecha de revisión.', 'Comunicar cambios y pedir apoyo.'],
      commitment: ['Nos comunicaremos con respeto.', 'Compartiremos responsabilidades de manera justa.', 'Revisaremos el progreso y ajustaremos el plan.'],
      note: ['No hay notas adicionales todavía.', 'Revisar este elemento en la próxima reunión.', 'Se necesita más información antes de decidir.'],
      title: ['Revisión familiar', 'Plan de próximos pasos', 'Rutina del hogar'],
      purpose: ['Esto importa porque reducirá confusión y apoyará el progreso.', 'El propósito es aprender, decidir y elegir una acción realista.']
    } : {
      question: ['What information do we need to confirm?', 'What support would help?', 'What action should happen next?'],
      action: ['Complete the first step.', 'Confirm the information using an official source.', 'Schedule a review and assign a general role.'],
      responsibility: ['Explain or demonstrate the steps.', 'Provide a reminder before the review date.', 'Communicate changes and ask for support.'],
      commitment: ['We will communicate respectfully.', 'We will share responsibilities fairly.', 'We will review progress and adjust the plan.'],
      note: ['No additional notes yet.', 'Review this item at the next meeting.', 'More information is needed before deciding.'],
      title: ['Household Review', 'Next-Step Plan', 'Household Routine'],
      purpose: ['This matters because it will reduce confusion and support progress.', 'The purpose is to learn, decide, and choose one realistic action.']
    };

    if (/question|prompt/.test(combined)) return patterns.question;
    if (/action|next|step/.test(combined)) return patterns.action;
    if (/responsib|assigned/.test(combined)) return patterns.responsibility;
    if (/commitment|agreement|statement/.test(combined)) return patterns.commitment;
    if (/note|reflection|recap|description/.test(combined)) return patterns.note;
    if (/title|label/.test(combined)) return patterns.title;
    if (/purpose|why|matter|objective|outcome/.test(combined)) return patterns.purpose;

    const panel = field.closest('.workspace-panel');
    const panelExamples = panel &&
      PANEL_FALLBACK_EXAMPLES[language][panel.id];
    return panelExamples ? panelExamples.slice() : [];
  }


  function optionDescription_(field, option) {
    const language = state.language === 'es' ? 'es' : 'en';
    const fieldMap = SELECT_OPTION_HELP[language] &&
      SELECT_OPTION_HELP[language][field.id];
    if (fieldMap && fieldMap[option.value]) return fieldMap[option.value];

    // The source finder and saved-plan category fields share the same values.
    if ((field.id === 'opportunitySearchCategorySelect' ||
         field.id === 'opportunityCategoryFilterSelect') &&
        SELECT_OPTION_HELP[language].opportunityCategorySelect) {
      const description = SELECT_OPTION_HELP[language]
        .opportunityCategorySelect[option.value];
      if (description) return description;
    }

    const label = option.textContent.trim();
    if (!label) return '';
    return language === 'es'
      ? 'Elija esta opción cuando “' + label + '” sea la descripción más cercana. Puede cambiarla después.'
      : 'Choose this when “' + label + '” is the closest description. You can change it later.';
  }


  function handleSupportExampleClick(event) {
    const button = event.target.closest('.support-example-button');
    if (!button || !currentSupportField) return;
    const container = document.getElementById('fieldSupportExamples');

    if (container.dataset.supportMode === 'select') {
      const options = Array.from(currentSupportField.options)
        .filter(function(option) { return Boolean(option.value); })
        .slice(0, 20);
      const option = options[Number(button.dataset.supportChoiceIndex)];
      if (!option) return;
      currentSupportField.value = option.value;
      currentSupportField.dispatchEvent(new Event('change', { bubbles: true }));
      renderFieldSupport_(currentSupportField);
      return;
    }

    let examples = [];
    try {
      examples = JSON.parse(container.dataset.supportExamples || '[]');
    } catch (error) {
      examples = [];
    }
    const example = examples[Number(button.dataset.supportExampleIndex)];
    if (!example) return;

    const current = String(currentSupportField.value || '').trim();
    currentSupportField.value = current
      ? current + (currentSupportField.tagName === 'TEXTAREA' ? '\n' : ' ') + example
      : example;
    currentSupportField.dispatchEvent(new Event('input', { bubbles: true }));
    currentSupportField.dispatchEvent(new Event('change', { bubbles: true }));
    currentSupportField.focus();
    renderFieldSupport_(currentSupportField);
  }


  function clearCurrentSupportAnswer() {
    if (!currentSupportField) return;
    if (currentSupportField.tagName === 'SELECT') {
      currentSupportField.selectedIndex = 0;
      currentSupportField.dispatchEvent(new Event('change', { bubbles: true }));
    } else {
      currentSupportField.value = '';
      currentSupportField.dispatchEvent(new Event('input', { bubbles: true }));
    }
    renderFieldSupport_(currentSupportField);
  }


  function readCurrentSupportQuestion() {
    if (!currentSupportField) {
      readTextAloud(
        supportUi_().noFieldTitle + '. ' + supportUi_().noFieldText
      );
      return;
    }
    const context = fieldContext_(currentSupportField);
    let text = context.label + '. ' + context.help;
    if (currentSupportField.tagName === 'SELECT') {
      const choices = Array.from(currentSupportField.options)
        .filter(function(option) { return Boolean(option.value); })
        .slice(0, 12)
        .map(function(option) {
          const description = optionDescription_(currentSupportField, option);
          return option.textContent.trim() +
            (description ? ': ' + description : '');
        });
      if (choices.length) {
        text += '. ' + supportUi_().choices + ': ' + choices.join('. ');
      }
    }
    readTextAloud(text);
  }


  function readCurrentSupportAnswer() {
    if (!currentSupportField) return;
    const value = currentSupportField.tagName === 'SELECT'
      ? currentSupportField.options[currentSupportField.selectedIndex] &&
        currentSupportField.options[currentSupportField.selectedIndex].textContent
      : currentSupportField.value;
    readTextAloud(
      value && String(value).trim()
        ? String(value).trim()
        : supportUi_().answerEmpty
    );
  }


  function updateSupportTriggerState_() {
    document.querySelectorAll('.field-help-trigger').forEach(function(button) {
      const wrapper = button.parentElement;
      const field = wrapper && wrapper.querySelector('input,textarea,select');
      button.classList.toggle('current-field', field === currentSupportField);
    });
  }


  function stopReadAloud() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    speechQueue = [];
    speechQueueIndex = 0;
    state.speechActive = false;
    setText('readPageButtonText', ui().readAloud);
    const stopButton = document.getElementById('supportStopReadingButton');
    if (stopButton) stopButton.disabled = true;
  }


  function updateSpeechControls_() {
    const stopButton = document.getElementById('supportStopReadingButton');
    if (stopButton) stopButton.disabled = !state.speechActive;
    setText(
      'readPageButtonText',
      state.speechActive ? ui().stopReading : ui().readAloud
    );
  }


  function readElementAloud(elementOrId) {
    const element = typeof elementOrId === 'string'
      ? document.getElementById(elementOrId)
      : elementOrId;
    if (!element) return;

    const pieces = [];
    const seen = new Set();
    element.querySelectorAll(
      'h1,h2,h3,h4,p,small,summary,label > span,input,textarea,select'
    ).forEach(function(node) {
      if (node.offsetParent === null || node.closest('#fieldSupportDrawer')) return;
      let value = '';
      if (node.matches('input,textarea')) {
        if (['hidden', 'checkbox', 'radio', 'file'].indexOf(node.type) >= 0) return;
        value = String(node.value || '').trim();
      } else if (node.matches('select')) {
        const option = node.options[node.selectedIndex];
        value = option ? option.textContent.trim() : '';
      } else {
        value = node.textContent.trim();
      }
      value = value.replace(/\s+/g, ' ');
      if (!value || seen.has(value)) return;
      seen.add(value);
      pieces.push(value);
    });

    readTextAloud(pieces.join('. ').substring(0, 14000));
  }


  function readTextAloud(text) {
    if (!('speechSynthesis' in window)) {
      toast(supportUi_().browserNoSpeech, true);
      return;
    }

    const clean = String(text || '').replace(/\s+/g, ' ').trim();
    if (!clean) return;

    window.speechSynthesis.cancel();
    speechQueue = splitSpeechText_(clean, 1100);
    speechQueueIndex = 0;
    state.speechActive = true;
    updateSpeechControls_();
    speakNextSupportChunk_();
  }


  function speakNextSupportChunk_() {
    if (!state.speechActive || speechQueueIndex >= speechQueue.length) {
      state.speechActive = false;
      updateSpeechControls_();
      return;
    }

    const utterance = new SpeechSynthesisUtterance(
      speechQueue[speechQueueIndex]
    );
    utterance.lang = state.language === 'es' ? 'es-US' : 'en-US';
    utterance.rate = 0.92;
    utterance.onend = function() {
      speechQueueIndex += 1;
      speakNextSupportChunk_();
    };
    utterance.onerror = function() {
      state.speechActive = false;
      updateSpeechControls_();
    };
    window.speechSynthesis.speak(utterance);
  }


  function splitSpeechText_(text, maximum) {
    const sentences = String(text || '').match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];
    const chunks = [];
    let current = '';
    sentences.forEach(function(sentence) {
      const clean = sentence.trim();
      if (!clean) return;
      if (current && (current + ' ' + clean).length > maximum) {
        chunks.push(current);
        current = clean;
      } else {
        current = current ? current + ' ' + clean : clean;
      }
    });
    if (current) chunks.push(current);
    return chunks;
  }
</script>
