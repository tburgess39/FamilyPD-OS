  function bindSystemsEvents() {
    document.getElementById('newSystemRecordButton').addEventListener(
      'click',
      function() { openSystemBuilder(); }
    );
    document.getElementById('cancelSystemEditButton').addEventListener(
      'click',
      closeSystemBuilder

      populateSystemTemplates

    document.getElementById('useSystemTemplateButton').addEventListener(

      useSelectedSystemTemplate

    document.getElementById('addSystemStepButton').addEventListener(

      function() { addSystemStepRow(''); }

      'click',
      saveSystemRecord

    document.getElementById('systemsFilterSelect').addEventListener(
      'change',
      renderSystemRecords

    document.getElementById('systemsPillarFilterSelect').addEventListener(
      'change',
      renderSystemRecords
    );

      'click',

      'click',

        openPanel('systemsPanel');
        document.getElementById('systemsRecordList').scrollIntoView({

  async function loadSystemsWorkspace() {
    try {
      const data = await callServer('getSystemsWorkspace', state.language);
      state.systemsData = normalizeSystemsWorkspace_(data);
      renderSystemsWorkspace(state.systemsData);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  function normalizeSystemsWorkspace_(data) {
    data = data && typeof data === 'object' ? data : {};
    const guidance = data.guidance && typeof data.guidance === 'object'
      ? data.guidance
      : {};

    return Object.assign({}, data, {
      role: data.role ||
        state.workspace && state.workspace.role ||
        'FAMILY_MEMBER',
      records: Array.isArray(data.records) ? data.records : [],
      roleOptions: Array.isArray(data.roleOptions) ? data.roleOptions : [],
      summary: data.summary && typeof data.summary === 'object'
        ? data.summary
        : { total: 0, active: 0, reviewNeeded: 0, upcomingReviews: [] },
      guidance: Object.assign({
        pillars: [],
        types: [],
        statuses: [],
        reviewFrequencies: [],
        priorities: [],
        templates: {},
        privacyMessage: '',
        safetyMessage: ''
      }, guidance),
      citation: data.citation && typeof data.citation === 'object'
        ? data.citation
        : {
            inTextCitation: '(Hall, 2025, pp. 15–20, 57–63)'
          }
    });
  }


  function renderSystemsWorkspace(data) {
    state.systemsData = normalizeSystemsWorkspace_(data);
    const isLead = state.systemsData.role === 'HOUSEHOLD_LEAD';

    document.getElementById('newSystemRecordButton').classList.toggle(
      'hidden',
      !isLead
    );
    if (!isLead) hide('systemBuilderCard');

    setText(
      'systemsGuidanceCitation',
      state.systemsData.citation.inTextCitation ||
        '(Hall, 2025, pp. 15–20, 57–63)'
    );
    setText(
      'systemsPrivacyText',
      state.systemsData.guidance.privacyMessage || ''
    );
    setText(
      'systemsSafetyNoticeText',
      state.systemsData.guidance.safetyMessage || ''
    );

    applySystemsLanguage();
    populateSystemsSelects();
    renderSystemRecords();
    renderSystemsDashboard();
  }

      filter.options[0].textContent = text.current;

  function populateSystemsSelects() {
    if (!state.systemsData) return;
    const guidance = state.systemsData.guidance;

    fillSystemsSelect_('systemPillarSelect', guidance.pillars || []);
    fillSystemsSelect_('systemTypeSelect', guidance.types || []);
    fillSystemsSelect_('systemStatusSelect', guidance.statuses || []);
    fillSystemsSelect_(
      'systemFrequencySelect',
      guidance.reviewFrequencies || []
    );
    fillSystemsSelect_('systemPrioritySelect', guidance.priorities || []);

    populateSystemTemplates();
    populateSystemOwners();
    renderSystemAppliesTo();
    populateSystemsPillarFilter();
  }


  function fillSystemsSelect_(id, options, includeBlank, blankLabel) {
    const select = document.getElementById(id);
    if (!select) return;
    const current = select.value;
    const records = Array.isArray(options) ? options : [];
    select.innerHTML =
      (includeBlank
        ? '<option value="">' + escapeHtml(blankLabel || '') + '</option>'
        : '') +
      records.map(function(option) {
        return '<option value="' + escapeAttribute(option.value) + '">' +
          escapeHtml(option.label) + '</option>';
      }).join('');

    const values = records.map(function(option) { return option.value; });
    if (current && values.indexOf(current) >= 0) {
      select.value = current;
    } else if (select.options.length) {
      select.selectedIndex = 0;
    }
  }


  function populateSystemTemplates() {
    const select = document.getElementById('systemTemplateSelect');
    if (!select || !state.systemsData) return;

    const pillar = document.getElementById('systemPillarSelect').value ||
      'Health';
    const templates = state.systemsData.guidance.templates &&
      state.systemsData.guidance.templates[pillar] || [];

    select.innerHTML = '<option value="">' +
      escapeHtml(systemsUi().selectTemplate) + '</option>' +
      templates.map(function(template) {
        return '<option value="' + escapeAttribute(template.id) + '">' +
          escapeHtml(template.title) + ' · ' +
          escapeHtml(systemTypeLabel_(template.recordType)) +
          '</option>';
      }).join('');
  }


  function populateSystemOwners(selected) {
    const select = document.getElementById('systemOwnerSelect');
    if (!select || !state.systemsData) return;
    const current = selected !== undefined ? selected : select.value;
    const options = state.systemsData.roleOptions || [];

    select.innerHTML = '<option value="">' +
      escapeHtml(systemsUi().selectRole) + '</option>' +
      options.map(function(value) {
        return '<option value="' + escapeAttribute(value) + '">' +
          escapeHtml(systemRoleLabel_(value)) + '</option>';
      }).join('');

    if (options.indexOf(current) >= 0) select.value = current;
  }


  function renderSystemAppliesTo(selected) {
    const container = document.getElementById('systemAppliesToOptions');
    if (!container || !state.systemsData) return;

    const selectedValues = Array.isArray(selected)
      ? selected
      : Array.from(container.querySelectorAll('input:checked'))
        .map(function(input) { return input.value; });
    const options = state.systemsData.roleOptions || [];

    container.innerHTML = options.map(function(value) {
      return '<label class="choice-chip"><input type="checkbox" value="' +
        escapeAttribute(value) + '"' +
        (selectedValues.indexOf(value) >= 0 ? ' checked' : '') +
        '><span>' + escapeHtml(systemRoleLabel_(value)) +
        '</span></label>';
    }).join('');
  }


  function populateSystemsPillarFilter() {
    const select = document.getElementById('systemsPillarFilterSelect');
    if (!select || !state.systemsData) return;
    const current = select.value || 'ALL';
    select.innerHTML = '<option value="ALL">' +
      escapeHtml(systemsUi().allAreas) + '</option>' +
      (state.systemsData.guidance.pillars || []).map(function(option) {
        return '<option value="' + escapeAttribute(option.value) + '">' +
          escapeHtml(option.label) + '</option>';
      }).join('');
    select.value = current;
  }


  function openSystemBuilder(record) {
    record = record || {};
    document.getElementById('systemRecordIdInput').value = record.id || '';
    document.getElementById('systemTemplateIdInput').value =
      record.templateId || '';
    document.getElementById('systemPillarSelect').value =
      record.pillar || 'Health';
    populateSystemTemplates();
    document.getElementById('systemTemplateSelect').value =
      record.templateId || '';
    document.getElementById('systemTitleInput').value = record.title || '';
    document.getElementById('systemTypeSelect').value =
      record.recordType || 'System';
    document.getElementById('systemStatusSelect').value =
      record.status || 'Draft';
    populateSystemOwners(record.ownerRole || '');
    document.getElementById('systemPrioritySelect').value =
      record.priority || 'Routine';
    renderSystemAppliesTo(record.appliesTo || []);
    document.getElementById('systemPurposeInput').value =
      record.purpose || '';
    document.getElementById('systemStatementInput').value =
      record.statement || '';
    document.getElementById('systemFrequencySelect').value =
      record.reviewFrequency || 'Monthly';
    document.getElementById('systemEffectiveDateInput').value =
      record.effectiveDate || '';
    document.getElementById('systemNextReviewInput').value =
      record.nextReviewDate || '';
    document.getElementById('systemNotesInput').value = record.notes || '';

    const steps = document.getElementById('systemStepsEditor');
    steps.innerHTML = '';
    (record.steps || []).forEach(addSystemStepRow);

    show('systemBuilderCard');
    openPanel('systemsPanel');
    document.getElementById('systemBuilderCard').scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }


  function closeSystemBuilder() {
    hide('systemBuilderCard');
  }


  async function useSelectedSystemTemplate() {
    const templateId = document.getElementById('systemTemplateSelect').value;
    if (!templateId) {
      toast(systemsUi().selectTemplate, true);
      return;
    }

    const button = document.getElementById('useSystemTemplateButton');
    setBusy(button, true, systemsUi().creating);

    try {
      const template = await callServer('generateGuidedSystemRecord', {
        language: state.language,
        pillar: document.getElementById('systemPillarSelect').value,
        templateId: templateId
      });

      document.getElementById('systemTemplateIdInput').value =
        template.id || '';
      document.getElementById('systemTitleInput').value =
        template.title || '';
      document.getElementById('systemTypeSelect').value =
        template.recordType || 'System';
      document.getElementById('systemStatusSelect').value = 'Draft';
      populateSystemOwners(template.ownerRole || '');
      document.getElementById('systemPrioritySelect').value =
        template.priority || 'Routine';
      renderSystemAppliesTo(['Family Member']);
      document.getElementById('systemPurposeInput').value =
        template.purpose || '';
      document.getElementById('systemStatementInput').value =
        template.statement || '';
      document.getElementById('systemFrequencySelect').value =
        template.reviewFrequency || 'Monthly';

      const steps = document.getElementById('systemStepsEditor');
      steps.innerHTML = '';
      (template.steps || []).forEach(addSystemStepRow);

      toast(systemsUi().templateAdded);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, systemsUi().useTemplate);
    }
  }


  function addSystemStepRow(value) {
    const container = document.getElementById('systemStepsEditor');
    if (container.children.length >= 12) {
      toast(
        state.language === 'es'
          ? 'Puede agregar hasta doce pasos.'
          : 'You can add up to twelve steps.',
        true
      );
      return;
    }

    const row = document.createElement('div');
    row.className = 'repeat-row';
    row.innerHTML =
      '<input class="system-step-input" type="text" maxlength="1000" ' +
      'spellcheck="true" value="' + escapeAttribute(value || '') +
      '" placeholder="' + escapeAttribute(systemsUi().stepPlaceholder) +
      '"><button type="button" class="remove-row-button">' +
      escapeHtml(systemsUi().remove) + '</button>';

    row.querySelector('button').addEventListener('click', function() {
      row.remove();
    });
    container.appendChild(row);
  }


  function collectSystemSteps_() {
    return Array.from(
      document.querySelectorAll('#systemStepsEditor .system-step-input')
    ).map(function(input) {
      return input.value.trim();
    }).filter(Boolean);
  }


  async function saveSystemRecord() {
    const title = document.getElementById('systemTitleInput').value.trim();
    if (!title) {
      toast(systemsUi().titleRequired, true);
      return;
    }

    const payload = {
      id: document.getElementById('systemRecordIdInput').value,
      language: state.language,
      templateId: document.getElementById('systemTemplateIdInput').value,
      title: title,
      pillar: document.getElementById('systemPillarSelect').value,
      recordType: document.getElementById('systemTypeSelect').value,
      status: document.getElementById('systemStatusSelect').value,
      ownerRole: document.getElementById('systemOwnerSelect').value,
      priority: document.getElementById('systemPrioritySelect').value,
      appliesTo: Array.from(
        document.querySelectorAll('#systemAppliesToOptions input:checked')
      ).map(function(input) { return input.value; }),
      purpose: document.getElementById('systemPurposeInput').value,
      statement: document.getElementById('systemStatementInput').value,
      steps: collectSystemSteps_(),
      reviewFrequency: document.getElementById('systemFrequencySelect').value,
      effectiveDate: document.getElementById('systemEffectiveDateInput').value,
      nextReviewDate: document.getElementById('systemNextReviewInput').value,
      notes: document.getElementById('systemNotesInput').value
    };

    if (!clientPrivacyCheck(payload)) return;

    const button = document.getElementById('saveSystemRecordButton');
    setBusy(button, true, systemsUi().saving);
    try {
      const result = await callServer('saveSystemRecord', payload);
      state.systemsData = normalizeSystemsWorkspace_(result.workspace);
      renderSystemsWorkspace(state.systemsData);
      closeSystemBuilder();
      toast(systemsUi().saved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, systemsUi().save);
    }
  }


  function renderSystemRecords() {
    const container = document.getElementById('systemsRecordList');
    if (!container || !state.systemsData) return;

    const filter = document.getElementById('systemsFilterSelect').value ||
      'CURRENT';
    const pillar = document.getElementById('systemsPillarFilterSelect').value ||
      'ALL';
    const today = systemsLocalDateKey_(new Date());
    const isLead = state.systemsData.role === 'HOUSEHOLD_LEAD';

    const records = (state.systemsData.records || []).filter(function(record) {
      if (pillar !== 'ALL' && record.pillar !== pillar) return false;
      if (filter === 'ARCHIVED') return record.status === 'Archived';
      if (filter === 'ALL') return true;
      if (filter === 'REVIEW') {
        return record.status === 'Review needed' ||
          Boolean(record.nextReviewDate && record.nextReviewDate < today);
      }
      return record.status !== 'Archived';
    });

    if (!records.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(isLead
          ? systemsUi().noRecordsLead
          : systemsUi().noRecordsMember) + '</div>';
      return;
    }

    container.innerHTML = records.map(function(record) {
      const overdue = record.nextReviewDate &&
        record.nextReviewDate < today &&
        record.status !== 'Archived';
      const actions = [
        isLead
          ? systemActionButton_('edit', record, systemsUi().edit)
          : '',
        isLead && record.status !== 'Archived'
          ? systemActionButton_(
              'review',
              record,
              systemsUi().reviewed
            )
          : '',
        systemActionButton_('pdf', record, systemsUi().pdf),
        isLead && record.status !== 'Archived'
          ? systemActionButton_(
              'archive',
              record,
              systemsUi().archive,
              true
            )
          : ''
      ].join('');

      return '<article class="system-record-card' +
        (overdue ? ' review-due' : '') + '">' +
        '<div class="system-card-top"><div>' +
        '<span class="goal-badge">' +
        escapeHtml(systemTypeLabel_(record.recordType)) + '</span>' +
        (record.recordType === 'Safety Plan'
          ? '<span class="goal-badge safety-badge">' +
            escapeHtml(systemsUi().safetyBadge) + '</span>'
          : '') +
        (!isLead
          ? '<span class="goal-badge muted">' +
            escapeHtml(systemsUi().readonly) + '</span>'
          : '') +
        '<h3>' + escapeHtml(record.title) + '</h3></div>' +
        '<span class="meeting-status-badge">' +
        escapeHtml(systemStatusLabel_(record.status)) + '</span></div>' +
        '<div class="goal-meta"><span>' +
        escapeHtml(systemPillarLabel_(record.pillar)) + '</span><span>' +
        escapeHtml(systemFrequencyLabel_(record.reviewFrequency)) +
        '</span><span>' +
        escapeHtml(systemPriorityLabel_(record.priority)) +
        '</span></div>' +
        (record.purpose
          ? '<p>' + escapeHtml(record.purpose) + '</p>'
          : '') +
        '<div class="system-record-details"><span>' +
        escapeHtml(systemRoleLabel_(record.ownerRole || '—')) +
        '</span><span>' + Number((record.steps || []).length) + ' ' +
        escapeHtml(systemsUi().stepsCount) + '</span><span>' +
        escapeHtml(record.nextReviewDate
          ? systemsUi().nextReviewShort + ': ' +
            systemsFormatDate_(record.nextReviewDate)
          : systemsUi().noReviewDate) + '</span></div>' +
        '<div class="button-row">' + actions + '</div></article>';
    }).join('');
  }


  function systemActionButton_(action, record, label, danger) {
    return '<button type="button" class="' +
      (danger
        ? 'text-button danger-text'
        : 'secondary-button compact-button') +
      '" data-system-action="' + escapeAttribute(action) +
      '" data-system-id="' + escapeAttribute(record.id) +
      '" data-system-type="' + escapeAttribute(record.recordType) +
      '">' + escapeHtml(label) + '</button>';
  }


  async function handleSystemRecordAction(event) {
    const button = event.target.closest('button[data-system-action]');
    if (!button) return;
    const record = findSystemRecord_(button.dataset.systemId);
    if (!record) return;

    if (button.dataset.systemAction === 'edit') {
      openSystemBuilder(record);
    }
    if (button.dataset.systemAction === 'review') {
      await markSystemRecordReviewed(record, button);
    }
    if (button.dataset.systemAction === 'pdf') {
      await generateSystemPdf(record, button);
    }
    if (button.dataset.systemAction === 'archive') {
      await archiveSystemRecord(record);
    }
  }


  function findSystemRecord_(id) {
    return (state.systemsData.records || []).find(function(record) {
      return record.id === id;
    }) || null;
  }


  async function markSystemRecordReviewed(record, button) {
    setBusy(button, true, systemsUi().reviewing);
    try {
      const result = await callServer('markSystemReviewed', {
        recordId: record.id,
        recordType: record.recordType,
        language: state.language
      });
      state.systemsData = normalizeSystemsWorkspace_(result.workspace);
      renderSystemsWorkspace(state.systemsData);
      toast(systemsUi().reviewedMessage);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function archiveSystemRecord(record) {
    if (!window.confirm(systemsUi().confirmArchive)) return;
    try {
      const result = await callServer('archiveSystemRecord', {
        recordId: record.id,
        recordType: record.recordType,
        language: state.language
      });
      state.systemsData = normalizeSystemsWorkspace_(result.workspace);
      renderSystemsWorkspace(state.systemsData);
      toast(systemsUi().archivedMessage);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function generateSystemPdf(record, button) {
    const original = button.textContent;
    setBusy(button, true, systemsUi().creating);
    try {
      const result = await callServer(
        'generateSystemDocument',
        record.recordType,
        record.id,
        state.language
      );
      downloadBase64File(
        result.filename,
        'application/pdf',
        result.base64Content
      );
      toast(result.message);
      if (result.driveFileUrl) {
        window.open(result.driveFileUrl, '_blank', 'noopener');
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, original);
    }
  }


  function renderSystemsDashboard() {
    if (!state.systemsData) return;
    const summary = state.systemsData.summary || {};
    setText('dashboardSystemsActiveCount', String(summary.active || 0));
    setText(
      'dashboardSystemsReviewCount',
      String(summary.reviewNeeded || 0)
    );
    setText('dashboardSystemsTotalCount', String(summary.total || 0));

    const container = document.getElementById('dashboardSystemsReviewList');
    const records = Array.isArray(summary.upcomingReviews)
      ? summary.upcomingReviews
      : [];

    if (!records.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(systemsUi().dashboardEmpty) + '</div>';
      return;
    }

    container.innerHTML = records.map(function(record) {
      return '<article class="dashboard-system-item"><div>' +
        '<span class="goal-badge">' +
        escapeHtml(systemTypeLabel_(record.recordType)) + '</span>' +
        '<h4>' + escapeHtml(record.title) + '</h4><p>' +
        escapeHtml(systemPillarLabel_(record.pillar)) + '</p></div>' +
        '<div class="dashboard-system-date"><span>' +
        escapeHtml(systemsUi().due) + '</span><strong>' +
        escapeHtml(systemsFormatDate_(record.nextReviewDate)) +
        '</strong></div></article>';
    }).join('');
  }


  function systemTypeLabel_(value) {
    return systemsOptionLabel_('types', value);
  }


  function systemStatusLabel_(value) {
    return systemsOptionLabel_('statuses', value);
  }


  function systemFrequencyLabel_(value) {
    return systemsOptionLabel_('reviewFrequencies', value);
  }


  function systemPriorityLabel_(value) {
    return systemsOptionLabel_('priorities', value);
  }


  function systemPillarLabel_(value) {
    return systemsOptionLabel_('pillars', value);
  }


  function systemsOptionLabel_(group, value) {
    const options = state.systemsData &&
      state.systemsData.guidance &&
      state.systemsData.guidance[group] || [];
    const match = options.find(function(option) {
      return option.value === value;
    });
    return match ? match.label : value;
  }


  function systemRoleLabel_(value) {
    if (state.language !== 'es') return value;
    return {
      'Household Lead': 'Líder del hogar',
      'Co-Lead': 'Colíder',
      'Family Member': 'Miembro de la familia',
      'Adult Member': 'Miembro adulto',
      'Young Adult Member': 'Miembro adulto joven',
      'Teen Member': 'Miembro adolescente',
      'Child Member': 'Miembro menor',
      'Older Adult Member': 'Miembro adulto mayor',
      'Meeting Facilitator': 'Facilitador de reuniones',
      'Goal & Progress Coordinator': 'Coordinador de metas y progreso',
      'Learning Coordinator': 'Coordinador de aprendizaje',
      'Household Operations Coordinator':
        'Coordinador de operaciones del hogar',
      'Safety Coordinator': 'Coordinador de seguridad'
    }[value] || value;
  }


  function systemsFormatDate_(value) {
    if (!value) return '';
    const date = new Date(value + 'T12:00:00');
    if (Number.isNaN(date.getTime())) return value;

    return new Intl.DateTimeFormat(
      state.language === 'es' ? 'es-US' : 'en-US',
      { month: 'short', day: 'numeric', year: 'numeric' }
    ).format(date);
  }


  function systemsLocalDateKey_(date) {
    return [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, '0'),
      String(date.getDate()).padStart(2, '0')
    ].join('-');
  }
</script>
