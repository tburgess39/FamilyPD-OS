  function bindOpportunityEvents() {
    document.getElementById('newOpportunityButton').addEventListener(

      function() { openOpportunityBuilder(); }

    document.getElementById('cancelOpportunityEditButton').addEventListener(
      'click',
      closeOpportunityBuilder

    document.querySelectorAll('[data-opportunity-step]').forEach(function(button) {
      button.addEventListener('click', function() {
        activateOpportunityGuideStep(button.dataset.opportunityStep, true);
      });
    });
    document.getElementById('opportunityPreviousStepButton').addEventListener(
      'click',
      function() { moveOpportunityGuideStep(-1); }
    );
    document.getElementById('opportunityNextStepButton').addEventListener(
      'click',
      function() { moveOpportunityGuideStep(1); }
    );
    document.getElementById('searchOpportunitySourcesButton').addEventListener(
      'click',
      searchOfficialOpportunitySources
    );
    document.getElementById('showAllOpportunitySourcesButton').addEventListener(
      'click',
      showAllOpportunitySources
    );
    document.getElementById('opportunitySourceResults').addEventListener(
      'click',
      handleOpportunitySourceAction
    );
    document.getElementById('checkOpportunityLinkButton').addEventListener(
      'click',
      function() {
        checkOpportunityLinkFromField(
          'opportunityLinkInput',
          true,
          'opportunityBuilderLinkResult'
        );
      }
    );
    document.getElementById('recheckOpportunityUrlButton').addEventListener(
      'click',
      function() {
        checkOpportunityLinkFromField(
          'opportunityUrlInput',
          false,
          'opportunityLinkResult'
        );
      }
    );
    document.getElementById('addOpportunityRequirementButton').addEventListener(
      'click',
      function() { addOpportunitySimpleRow('requirements', ''); }
    );
    document.getElementById('addOpportunityQuestionButton').addEventListener(
      'click',
      function() { addOpportunitySimpleRow('questions', ''); }
    );
    document.getElementById('addOpportunityActionButton').addEventListener(
      'click',
      function() { addOpportunityActionRow({}); }
    );
    document.getElementById('saveOpportunityButton').addEventListener(
      'click',
      saveOpportunityPlan
    );
    document.getElementById('opportunityRecordFilterSelect').addEventListener(
      'change',
      renderOpportunityRecords
    );
    document.getElementById('opportunityCategoryFilterSelect').addEventListener(
      'change',
      renderOpportunityRecords
    );
    document.getElementById('opportunityRecordList').addEventListener(
      'click',
      handleOpportunityRecordAction
    );
    document.getElementById('dashboardOpenOpportunitiesButton').addEventListener(
      'click',
      function() {
        openPanel('opportunitiesPanel');
        document.getElementById('opportunityRecordList').scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    );
    document.getElementById('readMobilitySectionButton').addEventListener(
      'click',
      function() {
        if (typeof readElementAloud === 'function') {
          readElementAloud('mobilityLearningCard');
        } else {
          handleReadPage();
        }
      }
    );
    document.getElementById('mobilityStarterActions').addEventListener(
      'click',
      handleMobilityStarterAction
    );
    document.getElementById('mobilityResourceList').addEventListener(
      'click',
      handleMobilityResourceAction
    );
  }


  async function loadOpportunityWorkspace() {
    try {
      const data = await callServer('getOpportunityWorkspace', state.language);
      state.opportunitiesData = normalizeOpportunityWorkspace_(data);
      renderOpportunityWorkspace(state.opportunitiesData);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  function normalizeOpportunityWorkspace_(data) {
    data = data && typeof data === 'object' ? data : {};
    const options = data.options && typeof data.options === 'object'
      ? data.options
      : {};
    return Object.assign({}, data, {
      role: data.role ||
        state.workspace && state.workspace.role ||
        'FAMILY_MEMBER',
      sharedRecords: Array.isArray(data.sharedRecords)
        ? data.sharedRecords
        : [],
      personalRecords: Array.isArray(data.personalRecords)
        ? data.personalRecords
        : [],
      directory: Array.isArray(data.directory) ? data.directory : [],
      mobilityGuide: data.mobilityGuide && typeof data.mobilityGuide === 'object'
        ? data.mobilityGuide
        : { title: '', explanation: '', caution: '', pathways: [], starterActions: [] },
      mobilityResources: Array.isArray(data.mobilityResources)
        ? data.mobilityResources
        : [],
      options: {
        categories: Array.isArray(options.categories) ? options.categories : [],
        audiences: Array.isArray(options.audiences) ? options.audiences : [],
        statuses: Array.isArray(options.statuses) ? options.statuses : [],
        priorities: Array.isArray(options.priorities) ? options.priorities : [],
        scopes: Array.isArray(options.scopes) ? options.scopes : []
      },
      summary: data.summary && typeof data.summary === 'object'
        ? data.summary
        : {
            shared: 0,
            personal: 0,
            actionNeeded: 0,
            overdue: 0,
            upcomingDeadlines: []
          },
      guidance: data.guidance && typeof data.guidance === 'object'
        ? data.guidance
        : {
            statement: '',
            inTextCitation: '(Hall, 2025, pp. 34–41, 106–108)',
            sourceReminder: '',
            privacyReminder: ''
          }
    });
  }


  function renderOpportunityWorkspace(data) {
    state.opportunitiesData = normalizeOpportunityWorkspace_(data);
    const isLead = state.opportunitiesData.role === 'HOUSEHOLD_LEAD';

    setText(
      'opportunityGuidanceText',
      state.opportunitiesData.guidance.statement || opportunityUi().guidanceText
    );
    setText(
      'opportunityGuidanceCitation',
      state.opportunitiesData.guidance.inTextCitation ||
        '(Hall, 2025, pp. 34–41, 106–108)'
    );
    setText(
      'opportunityPrivacyText',
      state.opportunitiesData.guidance.privacyReminder || ''
    );
    setText(
      'opportunitySourceReminder',
      state.opportunitiesData.guidance.sourceReminder ||
        opportunityUi().sourceReminder
    );

    applyOpportunityLanguage();
    populateOpportunitySelects_();
    renderMobilityLearning_();
    renderOpportunitySources_(
      state.opportunitiesData.directory,
      false
    );
    renderOpportunityRecords();
    renderOpportunityDashboard();
    activateOpportunityGuideStep(state.opportunityGuideStep || 'learn');

    const scope = document.getElementById('opportunityScopeSelect');
    if (!isLead && scope) {
      Array.from(scope.options).forEach(function(option) {
        if (option.value === 'HOUSEHOLD') option.remove();
      });
      scope.value = 'PERSONAL';
    }
  }

  function fillOpportunitySelect_(id, options, includeBlank, blankLabel) {
    const select = document.getElementById(id);
    if (!select) return;
    const current = select.value;
    const values = Array.isArray(options) ? options : [];
    select.innerHTML =
      (includeBlank
        ? '<option value="">' + escapeHtml(blankLabel || '') + '</option>'
        : '') +
      values.map(function(option) {
        return '<option value="' + escapeAttribute(option.value) + '">' +
          escapeHtml(option.label) + '</option>';
      }).join('');

    if (current && Array.from(select.options).some(function(option) {
      return option.value === current;
    })) {
      select.value = current;
    } else if (select.options.length) {
      select.selectedIndex = 0;
    }
  }


  function populateOpportunityCategoryFilter_() {
    const select = document.getElementById('opportunityCategoryFilterSelect');
    if (!select || !state.opportunitiesData) return;
    const current = select.value || 'ALL';

      escapeHtml(opportunityUi().allCategories) + '</option>' +
      state.opportunitiesData.options.categories.map(function(option) {
        return '<option value="' + escapeAttribute(option.value) + '">' +
          escapeHtml(option.label) + '</option>';
      }).join('');
    select.value = current;
  }

  async function checkOpportunityLinkFromField(
    inputId,
    openBuilderAfter,
    resultId
  ) {
    const input = document.getElementById(inputId);
    const url = input.value.trim();
    if (!url) {
      toast(
        state.language === 'es'
          ? 'Pegue un enlace público HTTPS.'
          : 'Paste a public HTTPS link.',
        true
      );
      return;
    }

    const button = inputId === 'opportunityLinkInput'
      ? document.getElementById('checkOpportunityLinkButton')
      : document.getElementById('recheckOpportunityUrlButton');
    setBusy(button, true, opportunityUi().checking);

    try {
      const checked = await callServer(
        'checkOpportunityLink',
        url,
        state.language
      );
      renderOpportunityLinkResult_(checked, resultId);

      if (checked.success) {
        applyOpportunityCheck_(checked);
        if (openBuilderAfter) {
          openOpportunityBuilder({
            title: checked.title || checked.domain || '',
            provider: checked.providerSuggestion || checked.domain || '',
            url: checked.url || url,
            domain: checked.domain || '',
            sourceTier: checked.sourceTier || 'Public link checked',
            verificationStatus: checked.verificationStatus || 'Link checked',
            lastCheckedAt: checked.lastCheckedAt || '',
            audience: document.getElementById(
              'opportunitySearchAudienceSelect'
            ).value || 'Any household member',
            locationLabel: document.getElementById(
              'opportunitySearchLocationInput'
            ).value || ''
          });
          toast(opportunityUi().linkAdded);
        }
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(
        button,
        false,
        inputId === 'opportunityLinkInput'
          ? opportunityUi().checkUse
          : opportunityUi().checkLink
      );
    }
  }


  function renderOpportunityLinkResult_(checked, resultId) {
    const container = document.getElementById(resultId);
    if (!container) return;
    show(resultId);
    container.classList.toggle('check-failed', !checked.success);
    const checks = checked.verificationChecks || {};
    const badges = [
      checked.secureHttps
        ? (state.language === 'es' ? 'HTTPS seguro' : 'Secure HTTPS')
        : '',
      checked.publicDomain
        ? (state.language === 'es' ? 'Dominio público' : 'Public domain')
        : '',
      checks.httpsCertificateCheck
        ? (state.language === 'es' ? 'Certificado revisado' : 'Certificate checked')
        : '',
      checked.reachable
        ? (state.language === 'es' ? 'La página respondió' : 'Page responded')
        : checked.automatedAccessLimited
          ? (state.language === 'es'
            ? 'El sitio limitó la revisión automática'
            : 'Site limited automated checking')
          : '',
      checked.httpStatus ? 'HTTP ' + checked.httpStatus : ''
    ].filter(Boolean);

    container.innerHTML =
      '<strong>' +
      escapeHtml(checked.success
        ? opportunityUi().linkResponded
        : opportunityUi().linkFailed) + '</strong>' +
      '<p>' + escapeHtml(checked.message || '') + '</p>' +
      '<div class="link-result-meta">' + badges.map(function(value) {
        return '<span>' + escapeHtml(value) + '</span>';
      }).join('') + '</div><div class="source-verification-line">' +
      escapeHtml(checked.verificationStatus || '') +
      (checked.domain ? ' · ' + escapeHtml(checked.domain) : '') +
      '</div><small>' +
      escapeHtml(opportunityUi().notFactCheck) + '</small>';
  }


  function applyOpportunityCheck_(checked) {
    document.getElementById('opportunityDomainInput').value =
      checked.domain || '';
    document.getElementById('opportunitySourceTierInput').value =
      checked.sourceTier || 'Public link checked';
    document.getElementById('opportunityVerificationInput').value =
      checked.verificationStatus || 'Link checked';
    document.getElementById('opportunityLastCheckedInput').value =
      checked.lastCheckedAt || '';
    setText(
      'opportunityVerificationStatusText',
      [
        opportunitySourceTierLabel_(checked.sourceTier || ''),
        opportunityVerificationLabel_(checked.verificationStatus || ''),
        checked.domain || ''
      ].filter(Boolean).join(' · ')
    );
    if (!document.getElementById('opportunityProviderInput').value.trim()) {
      document.getElementById('opportunityProviderInput').value =
        checked.providerSuggestion || checked.domain || '';
    }
    if (!document.getElementById('opportunityTitleInput').value.trim()) {
      document.getElementById('opportunityTitleInput').value =
        checked.title || checked.domain || '';
    }
  }


  function openOpportunityBuilder(record) {
    record = record || {};
    const isLead = state.opportunitiesData &&
      state.opportunitiesData.role === 'HOUSEHOLD_LEAD';
    const defaultScope = isLead ? 'HOUSEHOLD' : 'PERSONAL';

    document.getElementById('opportunityRecordIdInput').value =
      record.id || '';
    document.getElementById('opportunityScopeSelect').value =
      record.scope || defaultScope;
    document.getElementById('opportunityCategorySelect').value =
      record.category || 'Career exploration';
    document.getElementById('opportunityTitleInput').value =
      record.title || '';
    document.getElementById('opportunityProviderInput').value =
      record.provider || '';
    document.getElementById('opportunityAudienceSelect').value =
      record.audience || 'Any household member';
    document.getElementById('opportunityUrlInput').value =
      record.url || '';
    document.getElementById('opportunityDomainInput').value =
      record.domain || opportunityDomainFromUrl_(record.url || '');
    document.getElementById('opportunitySourceTierInput').value =
      record.sourceTier || 'Not yet checked';
    document.getElementById('opportunityVerificationInput').value =
      record.verificationStatus || 'Not yet checked';
    document.getElementById('opportunityLastCheckedInput').value =
      record.lastCheckedAt || '';
    setText(
      'opportunityVerificationStatusText',
      [
        opportunitySourceTierLabel_(
          record.sourceTier || opportunityUi().notChecked
        ),
        opportunityVerificationLabel_(
          record.verificationStatus || opportunityUi().notChecked
        ),
        record.domain || opportunityDomainFromUrl_(record.url || '')
      ].filter(Boolean).join(' · ')
    );
    document.getElementById('opportunityLocationInput').value =
      record.locationLabel || '';
    document.getElementById('opportunityDeadlineInput').value =
      record.deadline || '';
    document.getElementById('opportunityStatusSelect').value =
      record.status || 'Saved';
    document.getElementById('opportunityPrioritySelect').value =
      record.priority || 'Interested';
    document.getElementById('opportunityBenefitsInput').value =
      record.benefits || '';
    document.getElementById('opportunityEligibilityInput').value =
      record.eligibility || '';
    document.getElementById('opportunityCostInput').value =
      record.costSummary || '';
    document.getElementById('opportunityNextActionInput').value =
      record.nextAction || '';
    document.getElementById('opportunityNotesInput').value =
      record.notes || '';

    const requirements = document.getElementById(
      'opportunityRequirementsEditor'
    );
    requirements.innerHTML = '';
    (record.requirements || []).forEach(function(value) {
      addOpportunitySimpleRow('requirements', value);
    });

    const questions = document.getElementById(
      'opportunityQuestionsEditor'
    );
    questions.innerHTML = '';
    (record.questions || []).forEach(function(value) {
      addOpportunitySimpleRow('questions', value);
    });

    const actions = document.getElementById('opportunityActionEditor');
    actions.innerHTML = '';
    (record.actionSteps || []).forEach(addOpportunityActionRow);

    show('opportunityBuilderCard');
    state.opportunityGuideStep = 'plan';
    openPanel('opportunitiesPanel');
    activateOpportunityGuideStep('plan');
    document.getElementById('opportunityBuilderCard').scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });

  function addOpportunitySimpleRow(type, value) {
    const container = document.getElementById(
      type === 'requirements'
        ? 'opportunityRequirementsEditor'
        : 'opportunityQuestionsEditor'
    );
    const maximum = type === 'requirements' ? 15 : 12;
    if (container.children.length >= maximum) {
      toast(
        state.language === 'es'
          ? 'Se alcanzó el número máximo de elementos.'
          : 'The maximum number of items has been reached.',
        true
      );
      return;
    }

    const row = document.createElement('div');
    row.className = 'repeat-row';
    row.innerHTML =
      '<input type="text" class="opportunity-' +
      escapeAttribute(type) +
      '-input" maxlength="800" spellcheck="true" value="' +
      escapeAttribute(value || '') + '" placeholder="' +
      escapeAttribute(
        type === 'requirements'
          ? opportunityUi().requirementPlaceholder
          : opportunityUi().questionPlaceholder
      ) + '"><button type="button" class="remove-row-button">' +
      escapeHtml(opportunityUi().remove) + '</button>';
    row.querySelector('button').addEventListener('click', function() {
      row.remove();
    });
    container.appendChild(row);
  }

  function collectOpportunityActions_() {
    return Array.from(
      document.querySelectorAll('#opportunityActionEditor .opportunity-action-row')
    ).map(function(row) {
      return {
        id: row.dataset.actionId || '',
        text: row.querySelector('.opportunity-action-text').value.trim(),

        status: row.querySelector('.opportunity-action-complete').checked

  }


  async function saveOpportunityPlan() {
    const title = document.getElementById('opportunityTitleInput')
      .value.trim();
    if (!title) {
      toast(opportunityUi().titleRequired, true);
      return;
    }

    const payload = {
      id: document.getElementById('opportunityRecordIdInput').value,
      language: state.language,
      scope: document.getElementById('opportunityScopeSelect').value,
      title: title,
      category: document.getElementById('opportunityCategorySelect').value,
      provider: document.getElementById('opportunityProviderInput').value,
      url: document.getElementById('opportunityUrlInput').value,
      domain: document.getElementById('opportunityDomainInput').value,
      sourceTier: document.getElementById('opportunitySourceTierInput').value,
      verificationStatus: document.getElementById(
        'opportunityVerificationInput'
      ).value,
      lastCheckedAt: document.getElementById(
        'opportunityLastCheckedInput'
      ).value,
      audience: document.getElementById('opportunityAudienceSelect').value,
      locationLabel: document.getElementById(
        'opportunityLocationInput'
      ).value,
      deadline: document.getElementById('opportunityDeadlineInput').value,
      costSummary: document.getElementById('opportunityCostInput').value,
      eligibility: document.getElementById(
        'opportunityEligibilityInput'
      ).value,
      benefits: document.getElementById('opportunityBenefitsInput').value,
      requirements: collectOpportunitySimpleRows_(
        '#opportunityRequirementsEditor .opportunity-requirements-input'
      ),
      status: document.getElementById('opportunityStatusSelect').value,
      priority: document.getElementById('opportunityPrioritySelect').value,
      nextAction: document.getElementById(
        'opportunityNextActionInput'
      ).value,
      actionSteps: collectOpportunityActions_(),
      questions: collectOpportunitySimpleRows_(
        '#opportunityQuestionsEditor .opportunity-questions-input'
      ),
      notes: document.getElementById('opportunityNotesInput').value
    };

    if (!clientPrivacyCheck(payload)) return;

    const button = document.getElementById('saveOpportunityButton');
    setBusy(button, true, opportunityUi().saving);
    try {
      const result = await callServer('saveOpportunityRecord', payload);
      state.opportunitiesData = normalizeOpportunityWorkspace_(
        result.workspace
      );
      renderOpportunityWorkspace(state.opportunitiesData);
      hide('opportunityBuilderCard');
      activateOpportunityGuideStep('saved', true);
      toast(opportunityUi().saved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, opportunityUi().save);
    }
  }


  function renderOpportunityRecords() {
    const container = document.getElementById('opportunityRecordList');
    if (!container || !state.opportunitiesData) return;

    const filter = document.getElementById(
      'opportunityRecordFilterSelect'
    ).value || 'CURRENT';
    const category = document.getElementById(
      'opportunityCategoryFilterSelect'
    ).value || 'ALL';
    const today = opportunityLocalDateKey_(new Date());
    const records = state.opportunitiesData.sharedRecords.concat(
      state.opportunitiesData.personalRecords
    ).filter(function(record) {
      if (category !== 'ALL' && record.category !== category) return false;
      if (filter === 'SHARED') return record.scope === 'HOUSEHOLD' &&
        record.status !== 'Archived';
      if (filter === 'PERSONAL') return record.scope === 'PERSONAL' &&
        record.status !== 'Archived';
      if (filter === 'ARCHIVED') return record.status === 'Archived';
      if (filter === 'ALL') return true;
      if (filter === 'ACTION') {
        return record.status !== 'Archived' &&
          record.status !== 'Closed' &&
          (record.priority === 'High priority' ||
           record.status === 'Preparing' ||
           Boolean(record.nextAction));
      }
      if (filter === 'DEADLINE') {
        return record.status !== 'Archived' &&
          record.status !== 'Closed' &&
          Boolean(record.deadline && record.deadline >= today);
      }
      return record.status !== 'Archived' && record.status !== 'Closed';
    });

    if (!records.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(
          state.opportunitiesData.role === 'HOUSEHOLD_LEAD'
            ? opportunityUi().noRecordsLead
            : opportunityUi().noRecordsMember
        ) + '</div>';
      return;
    }

    container.innerHTML = records.map(function(record) {
      const canEdit = !record.readOnly;
      const overdue = record.deadline &&
        record.deadline < today &&
        ['Applied', 'Accepted', 'Not selected', 'Closed', 'Archived']
          .indexOf(record.status) < 0;

      const actions = [
        record.url
          ? '<a class="secondary-button compact-button link-button" ' +
            'target="_blank" rel="noopener" href="' +
            escapeAttribute(record.url) + '">' +
            escapeHtml(opportunityUi().openLink) + '</a>'
          : '',
        canEdit
          ? opportunityRecordActionButton_(
              'edit',
              record,
              opportunityUi().edit
            )
          : '',
        record.readOnly
          ? opportunityRecordActionButton_(
              'copy',
              record,
              opportunityUi().personalCopy
            )
          : '',
        opportunityRecordActionButton_(
          'pdf',
          record,
          opportunityUi().pdf
        ),
        canEdit && record.status !== 'Archived'
          ? opportunityRecordActionButton_(
              'archive',
              record,
              opportunityUi().archive,
              true
            )
          : ''
      ].join('');

      return '<article class="opportunity-record-card' +
        (overdue ? ' opportunity-overdue' : '') + '">' +
        '<div class="opportunity-record-top"><div>' +
        '<span class="goal-badge">' +
        escapeHtml(opportunityCategoryLabel_(record.category)) +
        '</span><span class="goal-badge ' +
        (record.scope === 'HOUSEHOLD' ? 'shared-scope-badge' : 'personal-scope-badge') +
        '">' +
        escapeHtml(record.scope === 'HOUSEHOLD'
          ? opportunityUi().sharedBadge
          : opportunityUi().personalBadge) +
        '</span>' +
        (record.readOnly
          ? '<span class="goal-badge muted">' +
            escapeHtml(opportunityUi().readOnly) + '</span>'
          : '') +
        '<h3>' + escapeHtml(record.title) + '</h3>' +
        '<p class="opportunity-provider">' +
        escapeHtml(record.provider || record.domain || '') +
        '</p></div><span class="meeting-status-badge">' +
        escapeHtml(opportunityStatusLabel_(record.status)) +
        '</span></div>' +
        '<div class="goal-meta"><span>' +
        escapeHtml(opportunityPriorityLabel_(record.priority)) +
        '</span><span>' +
        escapeHtml(opportunityAudienceLabel_(record.audience)) +
        '</span>' +
        (record.locationLabel
          ? '<span>' + escapeHtml(record.locationLabel) + '</span>'
          : '') +
        '</div>' +
        (record.benefits
          ? '<p>' + escapeHtml(record.benefits) + '</p>'
          : '') +
        '<div class="opportunity-record-details"><span>' +
        escapeHtml(record.deadline
          ? opportunityUi().due + ': ' +
            opportunityFormatDate_(record.deadline)
          : opportunityUi().noDeadline) +
        '</span><span>' +
        Number((record.requirements || []).length) + ' ' +
        escapeHtml(opportunityUi().requirements) +
        '</span><span>' +
        Number((record.actionSteps || []).length) + ' ' +
        escapeHtml(opportunityUi().actions) +
        '</span></div>' +
        (record.nextAction
          ? '<div class="next-action-box"><strong>' +
            escapeHtml(opportunityUi().next) + ':</strong> ' +
            escapeHtml(record.nextAction) + '</div>'
          : '') +
        '<div class="source-verification-line">' +
        escapeHtml([
          opportunitySourceTierLabel_(record.sourceTier || ''),
          opportunityVerificationLabel_(record.verificationStatus || ''),
          record.domain || ''
        ].filter(Boolean).join(' · ')) +
        '</div><div class="button-row">' + actions + '</div></article>';
    }).join('');
  }


  function opportunityRecordActionButton_(action, record, label, danger) {
    return '<button type="button" class="' +
      (danger
        ? 'text-button danger-text'
        : 'secondary-button compact-button') +
      '" data-opportunity-action="' + escapeAttribute(action) +
      '" data-opportunity-id="' + escapeAttribute(record.id) +
      '" data-opportunity-scope="' + escapeAttribute(record.scope) +
      '">' + escapeHtml(label) + '</button>';
  }


  async function handleOpportunityRecordAction(event) {
    const button = event.target.closest(
      'button[data-opportunity-action]'
    );
    if (!button) return;
    const record = findOpportunityRecord_(
      button.dataset.opportunityId,
      button.dataset.opportunityScope
    );
    if (!record) return;

    if (button.dataset.opportunityAction === 'edit') {
      openOpportunityBuilder(record);
    }
    if (button.dataset.opportunityAction === 'copy') {
      await copyOpportunityToPersonal(record, button);
    }
    if (button.dataset.opportunityAction === 'pdf') {
      await generateOpportunityPdf(record, button);
    }
    if (button.dataset.opportunityAction === 'archive') {
      await archiveOpportunity(record);
    }
  }


  function findOpportunityRecord_(id, scope) {
    const records = scope === 'HOUSEHOLD'
      ? state.opportunitiesData.sharedRecords
      : state.opportunitiesData.personalRecords;
    return records.find(function(record) {
      return record.id === id;
    }) || null;
  }


  async function copyOpportunityToPersonal(record, button) {
    setBusy(button, true, opportunityUi().creating);
    try {
      const result = await callServer(
        'copySharedOpportunityToPersonal',
        record.id,
        state.language
      );
      state.opportunitiesData = normalizeOpportunityWorkspace_(
        result.workspace
      );
      renderOpportunityWorkspace(state.opportunitiesData);
      toast(opportunityUi().copied);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function archiveOpportunity(record) {
    if (!window.confirm(opportunityUi().confirmArchive)) return;
    try {
      const result = await callServer('archiveOpportunityRecord', {
        recordId: record.id,
        scope: record.scope,
        language: state.language
      });
      state.opportunitiesData = normalizeOpportunityWorkspace_(
        result.workspace
      );
      renderOpportunityWorkspace(state.opportunitiesData);
      toast(opportunityUi().archivedMessage);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function generateOpportunityPdf(record, button) {
    const original = button.textContent;
    setBusy(button, true, opportunityUi().creating);
    try {
      const result = await callServer(
        'generateOpportunityDocument',
        record.scope,
        record.id,
        state.language
      );
      downloadBase64File(
        result.filename,
        'application/pdf',
        result.base64Content
      );
      toast(result.message);
      if (result.driveFileUrl) {
        window.open(result.driveFileUrl, '_blank', 'noopener');
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, original);
    }
  }


  function renderOpportunityDashboard() {
    if (!state.opportunitiesData) return;
    const summary = state.opportunitiesData.summary || {};
    setText(
      'dashboardOpportunitySharedCount',
      String(summary.shared || 0)
    );
    setText(
      'dashboardOpportunityPersonalCount',
      String(summary.personal || 0)
    );
    setText(
      'dashboardOpportunityActionCount',
      String(summary.actionNeeded || 0)
    );
    setText(
      'dashboardOpportunityOverdueCount',
      String(summary.overdue || 0)
    );

    const container = document.getElementById(
      'dashboardOpportunityDeadlineList'
    );
    const records = Array.isArray(summary.upcomingDeadlines)
      ? summary.upcomingDeadlines
      : [];

    if (!records.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(opportunityUi().dashboardEmpty) + '</div>';
      return;
    }

    container.innerHTML = records.map(function(record) {
      return '<article class="dashboard-opportunity-item"><div>' +
        '<span class="goal-badge">' +
        escapeHtml(opportunityCategoryLabel_(record.category)) +
        '</span><h4>' + escapeHtml(record.title) + '</h4><p>' +
        escapeHtml(record.provider || record.locationLabel || '') +
        '</p></div><div class="dashboard-opportunity-date"><span>' +
        escapeHtml(opportunityUi().due) + '</span><strong>' +
        escapeHtml(opportunityFormatDate_(record.deadline)) +
        '</strong></div></article>';
    }).join('');
  }


  const OPPORTUNITY_GUIDE_STEPS = ['learn', 'find', 'link', 'plan', 'saved'];


  function opportunityGuideGroups_() {
    return {
      learn: ['mobilityLearningCard'],
      find: ['opportunityFinderCard'],
      link: ['opportunityLinkCard'],
      plan: ['opportunityBuilderCard'],
      saved: ['opportunitySavedSection']
    };
  }


  function activateOpportunityGuideStep(step, scroll) {
    if (OPPORTUNITY_GUIDE_STEPS.indexOf(step) < 0) step = 'learn';
    state.opportunityGuideStep = step;
    const groups = opportunityGuideGroups_();
    const allIds = [];
    Object.keys(groups).forEach(function(key) {
      groups[key].forEach(function(id) {
        if (allIds.indexOf(id) < 0) allIds.push(id);
      });
    });

    allIds.forEach(function(id) {
      const element = document.getElementById(id);
      if (element) element.classList.add('guided-section-hidden');
    });
    (groups[step] || []).forEach(function(id) {
      const element = document.getElementById(id);
      if (element) element.classList.remove('guided-section-hidden');
    });

    // The plan step begins with a blank guided planner when no record is open.
    if (step === 'plan') {
      const builder = document.getElementById('opportunityBuilderCard');
      if (builder && builder.classList.contains('hidden')) {
        openOpportunityBuilder({});
        return;
      }
    }

    document.querySelectorAll('[data-opportunity-step]').forEach(function(button) {
      button.classList.toggle('active', button.dataset.opportunityStep === step);
    });
    const text = opportunityUi();
    const index = OPPORTUNITY_GUIDE_STEPS.indexOf(step);
    setText(
      'opportunityGuideStatus',
      (state.language === 'es' ? 'Paso ' : 'Step ') +
        (index + 1) + (state.language === 'es' ? ' de ' : ' of ') +
        OPPORTUNITY_GUIDE_STEPS.length + ' · ' + text.guideLabels[step]
    );
    setText('opportunityGuideInstruction', text.guideInstructions[step]);
    document.getElementById('opportunityPreviousStepButton').disabled = index === 0;
    document.getElementById('opportunityNextStepButton').disabled =
      index === OPPORTUNITY_GUIDE_STEPS.length - 1;

    if (scroll) {
      document.getElementById('opportunityStepNav').scrollIntoView({
        behavior: 'smooth', block: 'start'
      });
    }
    if (typeof attachSupportToFields_ === 'function') attachSupportToFields_();
  }


  function moveOpportunityGuideStep(direction) {
    const index = OPPORTUNITY_GUIDE_STEPS.indexOf(
      state.opportunityGuideStep || 'learn'
    );
    const next = Math.max(
      0,
      Math.min(OPPORTUNITY_GUIDE_STEPS.length - 1, index + Number(direction || 0))
    );
    activateOpportunityGuideStep(OPPORTUNITY_GUIDE_STEPS[next], true);
  }


  function opportunitySourceTierLabel_(value) {
    if (state.language !== 'es') return value;
    return {
      'Official government source': 'Fuente oficial del gobierno',
      'Government-sponsored source': 'Fuente patrocinada por el gobierno',
      'Research and public-data source': 'Fuente de investigación y datos públicos',
      'Organization website': 'Sitio de la organización',
      'Public link checked': 'Enlace público revisado',
      'Secure public HTTPS address': 'Dirección pública HTTPS segura',
      'Not yet checked': 'Todavía no revisado'
    }[value] || value;
  }


  function opportunityVerificationLabel_(value) {
    if (state.language !== 'es') return value;
    return {
      'Official domain checked': 'Dominio oficial revisado',
      'Government-sponsored domain checked': 'Dominio patrocinado revisado',
      'Secure HTTPS format checked': 'Formato HTTPS seguro revisado',
      'Link checked': 'Enlace revisado',
      'Check failed': 'No se pudo revisar',
      'Not yet checked': 'Todavía no revisado',
      'Official or research resource listed by FamilyPD':
        'Recurso oficial o de investigación incluido por FamilyPD'
    }[value] || value;
  }


  function opportunityOptionLabel_(group, value) {
    const options = state.opportunitiesData &&
      state.opportunitiesData.options &&
      state.opportunitiesData.options[group] || [];
    const match = options.find(function(option) {
      return option.value === value;
    });
    return match ? match.label : value;
  }


  function opportunityCategoryLabel_(value) {
    return opportunityOptionLabel_('categories', value);
  }


  function opportunityAudienceLabel_(value) {
    return opportunityOptionLabel_('audiences', value);
  }


  function opportunityStatusLabel_(value) {
    return opportunityOptionLabel_('statuses', value);
  }


  function opportunityPriorityLabel_(value) {
    return opportunityOptionLabel_('priorities', value);
  }


  function opportunityDomainFromUrl_(value) {
    const match = String(value || '').match(/^https:\/\/([^/:?#]+)/i);
    return match
      ? match[1].replace(/^www\./i, '').toLowerCase()
      : '';
  }


  function opportunityFormatDate_(value) {
    if (!value) return '';
    const date = new Date(value + 'T12:00:00');
    if (Number.isNaN(date.getTime())) return value;
    return new Intl.DateTimeFormat(
      state.language === 'es' ? 'es-US' : 'en-US',
      { month: 'short', day: 'numeric', year: 'numeric' }
    ).format(date);
  }


  function opportunityLocalDateKey_(date) {
    return [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, '0'),
      String(date.getDate()).padStart(2, '0')
    ].join('-');
  }
</script>
