    return LEARNING_UI[state.language] || LEARNING_UI.en;

  function bindLearningEvents() {
    document.getElementById('newLearningPlanButton').addEventListener('click', function() {
      openLearningBuilder();
    });
    document.getElementById('cancelLearningEditButton').addEventListener('click', closeLearningBuilder);
    document.getElementById('learningPillarSelect').addEventListener('change', populateLearningTopics);
    document.getElementById('useLearningTopicButton').addEventListener('click', useSelectedLearningTopic);
    document.getElementById('addLearningResourceButton').addEventListener('click', function() {
      addLearningResourceRow({});
    });
    document.getElementById('addLearningActivityButton').addEventListener('click', function() {
      addLearningListRow('learningActivitiesEditor', '', 'activity');
    });
    document.getElementById('addLearningPromptButton').addEventListener('click', function() {
      addLearningListRow('learningPromptsEditor', '', 'prompt');
    });
    document.getElementById('buildLearningAiPromptButton').addEventListener('click', buildLearningAiPrompt);
    document.getElementById('copyLearningAiPromptButton').addEventListener('click', copyLearningAiPrompt);
    document.getElementById('saveLearningPlanButton').addEventListener('click', saveLearningPlan);
    document.getElementById('sharedLearningList').addEventListener('click', handleLearningListClick);
    document.getElementById('personalLearningList').addEventListener('click', handleLearningListClick);
    document.getElementById('cancelLearningReflectionButton').addEventListener('click', closeLearningReflection);
    document.getElementById('saveLearningReflectionButton').addEventListener('click', saveLearningReflection);
  }

  async function loadLearningWorkspace() {
    try {
      const data = await callServer('getLearningWorkspace', state.language);
      state.learningData = data;
      renderLearningWorkspace(data);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  function renderLearningWorkspace(data) {
    state.learningData = data;
    const isLead = data.role === 'HOUSEHOLD_LEAD';
    document.getElementById('learningScopeField').classList.toggle('hidden', !isLead);
    if (!isLead) document.getElementById('learningScopeSelect').value = 'PERSONAL';

    setText('learningGuidanceCitation',
      data.citation && data.citation.inTextCitation || '(Hall, 2025, pp. 20–23)');
    setText('learningPrivacyText',
      data.guidance && data.guidance.privacyMessage || '');

    applyLearningLanguage();
    populateLearningSelects();
    renderLearningLists();
  }


  function populateLearningSelects() {
    if (!state.learningData) return;
    const guidance = state.learningData.guidance || {};
    fillOptionSelect('learningPillarSelect', guidance.groups || []);
    fillOptionSelect('learningStatusSelect', guidance.statuses || []);
    fillOptionSelect('learningFormatSelect', guidance.formats || []);
    fillOptionSelect('learningDifficultySelect', guidance.difficulties || []);
    fillOptionSelect('learningDurationSelect', guidance.durations || []);
    populateLearningTopics();
    populateLearningFacilitator();
    renderLearningAudience();
  }


  function populateLearningTopics() {
    const select = document.getElementById('learningTopicSelect');
    if (!select || !state.learningData) return;
    const pillar = document.getElementById('learningPillarSelect').value || 'Education';
    const topics = state.learningData.guidance &&
      state.learningData.guidance.topics &&
      state.learningData.guidance.topics[pillar] || [];
    select.innerHTML = '<option value="">' + escapeHtml(learningUi().selectTopic) +
      '</option>' + topics.map(function(topic) {
        return '<option value="' + escapeAttribute(topic.id) + '">' +
          escapeHtml(topic.title) + '</option>';
      }).join('');
  }


  function learningRoleLabel(value) {
    if (state.language !== 'es') return value;
    return {
      'Household Lead': 'Líder del hogar',
      'Co-Lead': 'Colíder',
      'Family Member': 'Miembro de la familia',
      'Adult Member': 'Miembro adulto',
      'Young Adult Member': 'Miembro adulto joven',
      'Teen Member': 'Miembro adolescente',
      'Child Member': 'Miembro menor',
      'Older Adult Member': 'Miembro adulto mayor',
      'Meeting Facilitator': 'Facilitador de reuniones',
      'Goal & Progress Coordinator': 'Coordinador de metas y progreso',
      'Learning Coordinator': 'Coordinador de aprendizaje',
      'Household Operations Coordinator': 'Coordinador de operaciones del hogar',
      'Safety Coordinator': 'Coordinador de seguridad'
    }[value] || value;
  }


  function populateLearningFacilitator() {
    const select = document.getElementById('learningFacilitatorSelect');
    if (!select || !state.learningData) return;
    const current = select.value;
    const options = state.learningData.roleOptions || [];
    select.innerHTML = '<option value="">' +
      escapeHtml(learningUi().selectFacilitator) + '</option>' +
      options.map(function(value) {
        return '<option value="' + escapeAttribute(value) + '">' +
          escapeHtml(learningRoleLabel(value)) + '</option>';
      }).join('');
    if (options.indexOf(current) >= 0) select.value = current;
  }


  function renderLearningAudience(selected) {
    const container = document.getElementById('learningAudienceOptions');
    if (!container || !state.learningData) return;
    const selectedValues = Array.isArray(selected)
      ? selected
      : Array.from(container.querySelectorAll('input:checked'))
        .map(function(input) { return input.value; });
    const options = state.learningData.roleOptions || [];
    container.innerHTML = options.map(function(value) {
      return '<label class="choice-chip"><input type="checkbox" value="' +
        escapeAttribute(value) + '"' +
        (selectedValues.indexOf(value) >= 0 ? ' checked' : '') +
        '><span>' + escapeHtml(learningRoleLabel(value)) + '</span></label>';
    }).join('');
  }


  function openLearningBuilder(plan, scope) {
    plan = plan || {};
    const isLead = state.workspace && state.workspace.role === 'HOUSEHOLD_LEAD';
    state.editingLearningPlanId = plan.id || '';

    document.getElementById('learningPlanIdInput').value = plan.id || '';
    document.getElementById('learningScopeSelect').value =
      isLead ? (scope || plan.scope || 'HOUSEHOLD') : 'PERSONAL';
    document.getElementById('learningPillarSelect').value = plan.pillar || 'Education';
    populateLearningTopics();
    document.getElementById('learningTopicSelect').value = '';
    document.getElementById('learningTitleInput').value = plan.title || '';
    document.getElementById('learningStatusSelect').value = plan.status || 'Draft';
    document.getElementById('learningFormatSelect').value = plan.format || 'Mixed format';
    document.getElementById('learningDifficultySelect').value =
      plan.difficulty || 'Mixed levels';
    document.getElementById('learningDurationSelect').value =
      String(plan.estimatedMinutes || 30);
    populateLearningFacilitator();
    document.getElementById('learningFacilitatorSelect').value =
      plan.facilitatorRole || '';
    renderLearningAudience(plan.audienceRoles || []);
    document.getElementById('learningObjectiveInput').value = plan.objective || '';
    document.getElementById('learningWhyInput').value = plan.why || '';
    document.getElementById('learningActionInput').value = plan.actionStep || '';
    document.getElementById('learningReflectionInput').value =
      plan.reflectionPrompt || '';
    document.getElementById('learningNotesInput').value = plan.notes || '';
    document.getElementById('learningAiPromptOutput').value = '';

    document.getElementById('learningResourcesEditor').innerHTML = '';
    (plan.resources || []).forEach(addLearningResourceRow);

    document.getElementById('learningActivitiesEditor').innerHTML = '';
    (plan.activities || []).forEach(function(value) {
      addLearningListRow('learningActivitiesEditor', value, 'activity');
    });

    document.getElementById('learningPromptsEditor').innerHTML = '';
    (plan.discussionPrompts || []).forEach(function(value) {
      addLearningListRow('learningPromptsEditor', value, 'prompt');
    });

    show('learningBuilderCard');
    openPanel('learningPanel');
    document.getElementById('learningBuilderCard').scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }


  function closeLearningBuilder() {
    hide('learningBuilderCard');
    state.editingLearningPlanId = '';
  }


  async function useSelectedLearningTopic() {
    const lessonId = document.getElementById('learningTopicSelect').value;
    if (!lessonId) {
      toast(learningUi().topicRequired, true);
      return;
    }

    const button = document.getElementById('useLearningTopicButton');
    setBusy(button, true, state.language === 'es' ? 'Agregando…' : 'Adding…');
    try {
      const result = await callServer('generateGuidedLearningPlan', {
        language: state.language,
        pillar: document.getElementById('learningPillarSelect').value,
        lessonId: lessonId
      });
      document.getElementById('learningTitleInput').value = result.title || '';
      document.getElementById('learningObjectiveInput').value = result.objective || '';
      document.getElementById('learningWhyInput').value = state.language === 'es'
        ? 'Este tema apoya el crecimiento práctico del hogar y puede aplicarse con pasos pequeños.'
        : 'This topic supports practical household growth and can be applied through small steps.';
      document.getElementById('learningActivitiesEditor').innerHTML = '';
      if (result.activity) {
        addLearningListRow('learningActivitiesEditor', result.activity, 'activity');
      }
      document.getElementById('learningPromptsEditor').innerHTML = '';
      (result.discussionPrompts || []).forEach(function(value) {
        addLearningListRow('learningPromptsEditor', value, 'prompt');
      });
      document.getElementById('learningActionInput').value = result.actionStep || '';
      document.getElementById('learningReflectionInput').value =
        result.reflectionPrompt || '';
      toast(learningUi().topicAdded);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, learningUi().useTopic);
    }
  }


  function addLearningResourceRow(resource) {
    resource = resource || {};
    const container = document.getElementById('learningResourcesEditor');
    if (container.children.length >= 10) {
      toast(state.language === 'es'
        ? 'Puede agregar hasta diez recursos.'
        : 'You can add up to ten resources.', true);
      return;
    }

    const typeOptions = (state.learningData &&
      state.learningData.guidance &&
      state.learningData.guidance.resourceTypes || [])
      .map(function(option) {
        return '<option value="' + escapeAttribute(option.value) + '"' +
          (option.value === (resource.type || 'Article or webpage') ? ' selected' : '') +
          '>' + escapeHtml(option.label) + '</option>';
      }).join('');

    const card = document.createElement('article');
    card.className = 'learning-resource-card';
    card.dataset.id = resource.id || '';
    card.dataset.domain = resource.domain || '';
    card.dataset.verificationStatus = resource.verificationStatus || 'Not checked';
    card.dataset.httpStatus = String(resource.httpStatus || 0);
    card.dataset.lastCheckedAt = resource.lastCheckedAt || '';

    card.innerHTML =
      '<div class="section-heading-row"><div><span class="resource-status-badge">' +
      escapeHtml(verificationLabel_(card.dataset.verificationStatus)) +
      '</span><small class="resource-domain">' +
      escapeHtml(resource.domain || learningUi().sourceCheckDisclaimer) +
      '</small></div><button type="button" class="text-button danger-text remove-learning-resource">' +
      escapeHtml(learningUi().remove) + '</button></div>' +
      '<div class="form-grid"><label class="field"><span>' +
      escapeHtml(state.language === 'es' ? 'Tipo de recurso' : 'Resource type') +
      '</span><select class="learning-resource-type">' + typeOptions + '</select></label>' +
      '<label class="field"><span>' + escapeHtml(learningUi().year) +
      '</span><input class="learning-resource-year" type="text" maxlength="4" inputmode="numeric" value="' +
      escapeAttribute(resource.year || '') + '"></label>' +
      '<label class="field full"><span>' + escapeHtml(learningUi().resourceTitle) +
      '</span><input class="learning-resource-title" type="text" maxlength="500" spellcheck="true" value="' +
      escapeAttribute(resource.title || '') + '"></label>' +
      '<label class="field full"><span>' + escapeHtml(learningUi().authorPublisher) +
      '</span><input class="learning-resource-author" type="text" maxlength="240" spellcheck="true" value="' +
      escapeAttribute(resource.authorOrPublisher || '') + '"></label>' +
      '<label class="field full"><span>' + escapeHtml(learningUi().resourceUrl) +
      '</span><input class="learning-resource-url" type="url" maxlength="2000" value="' +
      escapeAttribute(resource.url || '') + '" placeholder="https://"></label>' +
      '<label class="field full"><span>' + escapeHtml(learningUi().resourceNotes) +
      '</span><textarea class="learning-resource-notes" rows="2" maxlength="1000" spellcheck="true">' +
      escapeHtml(resource.notes || '') + '</textarea></label></div>' +
      '<div class="button-row"><button type="button" class="secondary-button compact-button check-learning-resource">' +
      escapeHtml(learningUi().checkLink) + '</button>' +
      (resource.url ? '<a class="secondary-button compact-button link-button open-learning-resource" target="_blank" rel="noopener" href="' +
        escapeAttribute(resource.url) + '">' + escapeHtml(learningUi().openResource) + '</a>' : '') +
      '</div>';

    card.querySelector('.remove-learning-resource').addEventListener('click', function() {
      card.remove();
    });
    card.querySelector('.check-learning-resource').addEventListener('click', function(event) {
      checkLearningResource(card, event.currentTarget);
    });
    container.appendChild(card);
  }


  function renderLearningResourceLanguage() {
    const existing = collectLearningResources();
    const container = document.getElementById('learningResourcesEditor');
    if (!container) return;
    container.innerHTML = '';
    existing.forEach(addLearningResourceRow);
  }


  async function checkLearningResource(card, button) {
    const url = card.querySelector('.learning-resource-url').value.trim();
    setBusy(button, true, learningUi().checking);
    try {
      const result = await callServer('checkLearningResourceLink', url);
      card.dataset.domain = result.domain || '';
      card.dataset.verificationStatus = result.verificationStatus || 'Check failed';
      card.dataset.httpStatus = String(result.httpStatus || 0);
      card.dataset.lastCheckedAt = result.lastCheckedAt || '';
      card.querySelector('.resource-status-badge').textContent =
        verificationLabel_(card.dataset.verificationStatus);
      card.querySelector('.resource-domain').textContent =
        (result.domain || '') + (result.httpStatus ? ' · HTTP ' + result.httpStatus : '');
      let open = card.querySelector('.open-learning-resource');
      if (!open && result.url) {
        open = document.createElement('a');
        open.className = 'secondary-button compact-button link-button open-learning-resource';
        open.target = '_blank';
        open.rel = 'noopener';
        button.parentElement.appendChild(open);
      }
      if (open) {
        open.href = result.url;
        open.textContent = learningUi().openResource;
      }
      toast(result.message, !result.success);
    } catch (error) {
      card.dataset.verificationStatus = 'Check failed';
      card.querySelector('.resource-status-badge').textContent =
        verificationLabel_('Check failed');
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, learningUi().checkLink);
    }
  }


  function verificationLabel_(value) {
    const text = String(value || '');
    if (text === 'Check failed' || /failed/i.test(text)) {
      return learningUi().linkFailed;
    }
    if (text === 'Link checked' ||
        /secure https|page response checked|address checked/i.test(text)) {
      return learningUi().linkChecked;
    }
    return learningUi().linkNotChecked;
  }


  function collectLearningResources() {
    return Array.from(document.querySelectorAll('#learningResourcesEditor .learning-resource-card'))
      .map(function(card) {
        return {
          id: card.dataset.id || '',
          type: card.querySelector('.learning-resource-type').value,
          title: card.querySelector('.learning-resource-title').value.trim(),
          authorOrPublisher: card.querySelector('.learning-resource-author').value.trim(),
          year: card.querySelector('.learning-resource-year').value.trim(),
          url: card.querySelector('.learning-resource-url').value.trim(),
          notes: card.querySelector('.learning-resource-notes').value.trim(),
          domain: card.dataset.domain || '',
          verificationStatus: card.dataset.verificationStatus || 'Not checked',
          httpStatus: Number(card.dataset.httpStatus || 0),
          lastCheckedAt: card.dataset.lastCheckedAt || ''
        };
      })
      .filter(function(item) { return item.title || item.url; });
  }


  function addLearningListRow(containerId, value, kind) {
    const container = document.getElementById(containerId);
    const max = kind === 'prompt' ? 8 : 10;
    if (container.children.length >= max) return;
    const row = document.createElement('div');
    row.className = 'repeat-row';
    row.innerHTML = '<input class="learning-list-input" type="text" maxlength="' +
      (kind === 'prompt' ? '700' : '1000') + '" spellcheck="true" value="' +
      escapeAttribute(value || '') + '" placeholder="' +
      escapeAttribute(kind === 'prompt'
        ? learningUi().promptPlaceholder
        : learningUi().activityPlaceholder) + '">' +
      '<button type="button" class="remove-row-button">' +
      escapeHtml(learningUi().remove) + '</button>';
    row.querySelector('button').addEventListener('click', function() {
      row.remove();
    });
    container.appendChild(row);
  }


  function collectLearningList(containerId) {
    return Array.from(document.querySelectorAll('#' + containerId + ' .learning-list-input'))
      .map(function(input) { return input.value.trim(); })
      .filter(Boolean);
  }


  function buildLearningAiPrompt() {
    const title = document.getElementById('learningTitleInput').value.trim() ||
      (state.language === 'es' ? 'este tema' : 'this topic');
    const objective = document.getElementById('learningObjectiveInput').value.trim();
    const format = document.getElementById('learningFormatSelect').value;
    const prompt = state.language === 'es'
      ? [
          'Ayúdame a crear una explicación sencilla y una actividad breve sobre: ' + title + '.',
          '',
          'Objetivo: ' + (objective || 'Ayudar a una familia a comprender y aplicar el tema.'),
          'Formato preferido: ' + format + '.',
          '',
          'Requisitos:',
          '- Usa palabras claras para lectores de diferentes niveles.',
          '- Incluye una explicación corta, un ejemplo cotidiano y tres preguntas abiertas.',
          '- Incluye una actividad práctica y una acción pequeña para esta semana.',
          '- Señala cualquier afirmación importante que deba verificarse.',
          '- Sugiere dos tipos de fuentes confiables para comprobar la información.',
          '- No solicites nombres, direcciones, información médica, escolar, financiera ni privada.',
          '',
          'Voy a revisar y editar tu respuesta antes de usarla.'
        ].join('\n')
      : [
          'Help me create a simple explanation and short activity about: ' + title + '.',
          '',
          'Objective: ' + (objective || 'Help a family understand and apply the topic.'),
          'Preferred format: ' + format + '.',
          '',
          'Requirements:',
          '- Use clear language for readers at different levels.',
          '- Include a short explanation, an everyday example, and three open questions.',
          '- Include one hands-on activity and one small action for this week.',
          '- Flag important claims that should be verified.',
          '- Suggest two trustworthy source types for checking the information.',
          '- Do not ask for names, addresses, medical, school, financial, or private information.',
          '',
          'I will review and edit the response before using it.'
        ].join('\n');

    document.getElementById('learningAiPromptOutput').value = prompt;
    toast(learningUi().promptBuilt);
  }


  async function copyLearningAiPrompt() {
    const output = document.getElementById('learningAiPromptOutput');
    if (!output.value) buildLearningAiPrompt();
    try {
      await navigator.clipboard.writeText(output.value);
      toast(learningUi().promptCopied);
    } catch (error) {
      output.select();
      document.execCommand('copy');
      toast(learningUi().promptCopied);
    }
  }


  async function saveLearningPlan() {
    const title = document.getElementById('learningTitleInput').value.trim();
    if (!title) {
      toast(learningUi().titleRequired, true);
      return;
    }

    const payload = {
      id: document.getElementById('learningPlanIdInput').value,
      language: state.language,
      scope: state.workspace && state.workspace.role === 'HOUSEHOLD_LEAD'
        ? document.getElementById('learningScopeSelect').value
        : 'PERSONAL',
      title: title,
      pillar: document.getElementById('learningPillarSelect').value,
      status: document.getElementById('learningStatusSelect').value,
      format: document.getElementById('learningFormatSelect').value,
      difficulty: document.getElementById('learningDifficultySelect').value,
      estimatedMinutes: Number(document.getElementById('learningDurationSelect').value || 30),
      facilitatorRole: document.getElementById('learningFacilitatorSelect').value,
      audienceRoles: Array.from(
        document.querySelectorAll('#learningAudienceOptions input:checked')
      ).map(function(input) { return input.value; }),
      objective: document.getElementById('learningObjectiveInput').value,
      why: document.getElementById('learningWhyInput').value,
      resources: collectLearningResources(),
      activities: collectLearningList('learningActivitiesEditor'),
      discussionPrompts: collectLearningList('learningPromptsEditor'),
      actionStep: document.getElementById('learningActionInput').value,
      reflectionPrompt: document.getElementById('learningReflectionInput').value,
      notes: document.getElementById('learningNotesInput').value
    };

    const privacyPayload = JSON.parse(JSON.stringify(payload));
    privacyPayload.resources = (privacyPayload.resources || []).map(function(resource) {
      resource.url = '';
      return resource;
    });
    if (!clientPrivacyCheck(privacyPayload)) return;

    const button = document.getElementById('saveLearningPlanButton');
    setBusy(button, true, learningUi().saving);
    try {
      const result = await callServer('saveLearningPlanRecord', payload);
      state.learningData = result.workspace;
      renderLearningWorkspace(state.learningData);
      closeLearningBuilder();
      toast(learningUi().saved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, learningUi().save);
    }
  }


  function renderLearningLists() {
    if (!state.learningData) return;
    renderLearningList(
      'sharedLearningList',
      (state.learningData.sharedPlans || []).filter(function(plan) {
        return plan.status !== 'Archived';
      }),
      'HOUSEHOLD'
    );
    renderLearningList(
      'personalLearningList',
      (state.learningData.personalPlans || []).filter(function(plan) {
        return plan.status !== 'Archived';
      }),
      'PERSONAL'
    );
  }


  function renderLearningList(containerId, plans, scope) {
    const container = document.getElementById(containerId);
    if (!plans.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(scope === 'HOUSEHOLD'
          ? learningUi().noShared : learningUi().noPersonal) + '</div>';
      return;
    }

    const editable = scope === 'PERSONAL' ||
      (state.workspace && state.workspace.role === 'HOUSEHOLD_LEAD');
    container.innerHTML = plans.map(function(plan) {
      const response = (state.learningData.responses || []).find(function(item) {
        return item.planId === plan.id;
      });
      const resources = (plan.resources || []).slice(0, 3).map(function(resource) {
        if (!resource.url) return '';
        return '<a target="_blank" rel="noopener" href="' +
          escapeAttribute(resource.url) + '">' +
          escapeHtml(resource.title || resource.domain || learningUi().openResource) +
          '</a>';
      }).filter(Boolean).join('');

      const actions = [
        editable ? learningButton_('edit', plan.id, scope, learningUi().edit) : '',
        learningButton_('reflect', plan.id, scope, learningUi().reflect),
        learningButton_('pdf', plan.id, scope, learningUi().pdf),
        editable ? learningButton_('archive', plan.id, scope, learningUi().archive, true) : ''
      ].join('');

      return '<article class="learning-plan-card"><div class="learning-card-top"><div>' +
        '<span class="goal-badge">' +
        escapeHtml(scope === 'HOUSEHOLD'
          ? learningUi().householdBadge : learningUi().privateBadge) +
        '</span>' + (!editable ? '<span class="goal-badge muted">' +
          escapeHtml(learningUi().readonlyBadge) + '</span>' : '') +
        '<h3>' + escapeHtml(plan.title) + '</h3></div>' +
        '<span class="meeting-status-badge">' +
        escapeHtml(learningLabelFor('statuses', plan.status)) + '</span></div>' +
        '<div class="goal-meta"><span>' +
        escapeHtml(learningLabelFor('groups', plan.pillar)) + '</span><span>' +
        escapeHtml(learningLabelFor('formats', plan.format)) + '</span><span>' +
        escapeHtml(learningLabelFor('difficulties', plan.difficulty)) + '</span><span>' +
        Number(plan.estimatedMinutes || 30) +
        (state.language === 'es' ? ' minutos' : ' minutes') + '</span></div>' +
        (plan.objective ? '<p>' + escapeHtml(plan.objective) + '</p>' : '') +
        '<div class="learning-counts"><span>' +
        Number((plan.resources || []).length) + ' ' +
        escapeHtml(learningUi().resourcesCount) + '</span><span>' +
        Number((plan.activities || []).length) + ' ' +
        escapeHtml(learningUi().activitiesCount) + '</span></div>' +
        (resources ? '<div class="learning-resource-links">' + resources + '</div>' : '') +
        (response && response.completed
          ? '<div class="completion-note">✓ ' +
            escapeHtml(state.language === 'es'
              ? 'Reflexión marcada como completada'
              : 'Reflection marked complete') + '</div>' : '') +
        '<div class="button-row">' + actions + '</div></article>';
    }).join('');
  }


  function learningButton_(action, id, scope, label, danger) {
    return '<button type="button" class="' +
      (danger ? 'text-button danger-text' : 'secondary-button compact-button') +
      '" data-learning-action="' + escapeAttribute(action) +
      '" data-learning-id="' + escapeAttribute(id) +
      '" data-learning-scope="' + escapeAttribute(scope) + '">' +
      escapeHtml(label) + '</button>';
  }


  function learningLabelFor(group, value) {
    const options = state.learningData &&
      state.learningData.guidance &&
      state.learningData.guidance[group] || [];
    const match = options.find(function(option) { return option.value === value; });
    return match ? match.label : value;
  }


  function findLearningPlan(scope, id) {
    const list = scope === 'HOUSEHOLD'
      ? state.learningData.sharedPlans || []
      : state.learningData.personalPlans || [];
    return list.find(function(plan) { return plan.id === id; }) || null;
  }


  async function handleLearningListClick(event) {
    const button = event.target.closest('button[data-learning-action]');
    if (!button) return;
    const action = button.dataset.learningAction;
    const scope = button.dataset.learningScope;
    const plan = findLearningPlan(scope, button.dataset.learningId);
    if (!plan) return;

    if (action === 'edit') openLearningBuilder(plan, scope);
    if (action === 'reflect') openLearningReflection(plan);
    if (action === 'archive') await archiveLearningPlan(plan, scope);
    if (action === 'pdf') await generateLearningPdf(plan, scope, button);
  }


  async function archiveLearningPlan(plan, scope) {
    if (!window.confirm(learningUi().confirmArchive)) return;
    try {
      const result = await callServer('archiveLearningPlanRecord', {
        planId: plan.id,
        scope: scope,
        language: state.language
      });
      state.learningData = result.workspace;
      renderLearningWorkspace(state.learningData);
      toast(learningUi().archived);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function generateLearningPdf(plan, scope, button) {
    const original = button.textContent;
    setBusy(button, true, learningUi().creating);
    try {
      const result = await callServer(
        'generateLearningPlanDocument',
        scope,
        plan.id,
        state.language
      );
      downloadBase64File(result.filename, 'application/pdf', result.base64Content);
      toast(result.message);
      if (result.driveFileUrl) {
        window.open(result.driveFileUrl, '_blank', 'noopener');
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, original);
    }
  }


  function openLearningReflection(plan) {
    const response = (state.learningData.responses || []).find(function(item) {
      return item.planId === plan.id;
    }) || {};

    document.getElementById('learningResponseIdInput').value = response.id || '';
    document.getElementById('learningResponsePlanIdInput').value = plan.id;
    document.getElementById('learningReflectionPlanName').textContent = plan.title;
    document.getElementById('learningKeyLearningInput').value =
      response.keyLearning || '';
    document.getElementById('learningQuestionsInput').value =
      response.questions || '';
    document.getElementById('learningPersonalActionInput').value =
      response.action || '';
    document.getElementById('learningCompletedInput').checked =
      Boolean(response.completed);

    show('learningReflectionCard');
    openPanel('learningPanel');
    document.getElementById('learningReflectionCard').scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }


  function closeLearningReflection() {
    hide('learningReflectionCard');
  }


  async function saveLearningReflection() {
    const payload = {
      id: document.getElementById('learningResponseIdInput').value,
      planId: document.getElementById('learningResponsePlanIdInput').value,
      keyLearning: document.getElementById('learningKeyLearningInput').value,
      questions: document.getElementById('learningQuestionsInput').value,
      action: document.getElementById('learningPersonalActionInput').value,
      completed: document.getElementById('learningCompletedInput').checked,
      language: state.language
    };
    if (!clientPrivacyCheck(payload)) return;

    const button = document.getElementById('saveLearningReflectionButton');
    setBusy(button, true, learningUi().saving);
    try {
      const result = await callServer('saveLearningReflection', payload);
      state.learningData = result.workspace;
      renderLearningWorkspace(state.learningData);
      closeLearningReflection();
      toast(learningUi().reflectionSaved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, learningUi().saveReflection);
    }
  }
</script>
