    return MEETING_UI[state.language] || MEETING_UI.en;

  function bindMeetingEvents() {
    document.getElementById('newMeetingButton').addEventListener('click', function() {
      openMeetingBuilder();
    });
    document.getElementById('cancelMeetingEditButton').addEventListener('click', closeMeetingBuilder);
    document.getElementById('topicGroupSelect').addEventListener('change', populateMeetingTopicLibrary);
    document.getElementById('addLibraryTopicButton').addEventListener('click', addSelectedLibraryTopic);
    document.getElementById('addCustomTopicButton').addEventListener('click', addCustomMeetingTopic);
    document.getElementById('searchMeetingNewsButton').addEventListener('click', searchMeetingNews);
    document.getElementById('meetingNewsResults').addEventListener('click', handleNewsResultClick);
    document.getElementById('checkMeetingArticleLinkButton').addEventListener(
      'click',
      handleFullPlannerLinkCheck
    );
    document.getElementById('quickMeetingTemplateSelect').addEventListener(
      'change',
      applyQuickMeetingTemplate
    );
    document.getElementById('quickMeetingTopicGroupSelect').addEventListener(
      'change',
      populateQuickMeetingTopics
    );
    document.getElementById('quickAddTopicButton').addEventListener(
      'click',
      addQuickMeetingTopic
    );
    document.getElementById('quickMeetingSelectedTopics').addEventListener(
      'click',
      handleQuickTopicRemove
    );
    document.getElementById('quickSearchNewsButton').addEventListener(
      'click',
      searchQuickMeetingNews
    );
    document.getElementById('quickMeetingNewsResults').addEventListener(
      'click',
      handleQuickNewsResultClick
    );
    document.getElementById('quickCheckLinkButton').addEventListener(
      'click',
      checkQuickMeetingLink
    );
    document.getElementById('quickSelectedArticle').addEventListener(
      'click',
      handleQuickArticleRemove
    );
    document.getElementById('quickCreateMeetingButton').addEventListener(
      'click',
      createQuickMeeting
    );
    document.getElementById('quickOpenFullPlannerButton').addEventListener(
      'click',
      continueQuickMeetingInFullPlanner
    );
    document.getElementById('dashboardQuickMeetingButton').addEventListener(
      'click',
      openQuickMeetingFromDashboard
    );
    document.getElementById('dashboardOpenMeetingsButton').addEventListener(
      'click',
      function() {
        openPanel('meetingsPanel');
        document.getElementById('activeMeetingsList').scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    );
    document.getElementById('addMeetingMaterialButton').addEventListener('click', function() {
      addMeetingMaterialRow('');
    });
    document.getElementById('addMeetingDecisionButton').addEventListener('click', function() {
      addMeetingDecisionRow({});
    });
    document.getElementById('addMeetingActionButton').addEventListener('click', function() {
      addMeetingActionRow({});
    });
    document.getElementById('carryForwardButton').addEventListener('click', handleCarryForward);
    document.getElementById('saveMeetingButton').addEventListener('click', handleSaveMeeting);
    document.getElementById('activeMeetingsList').addEventListener('click', handleMeetingListClick);
    document.getElementById('completedMeetingsList').addEventListener('click', handleMeetingListClick);
    document.getElementById('cancelMemberPrepButton').addEventListener('click', closeMemberPreparation);
    document.getElementById('saveMemberPrepButton').addEventListener('click', handleSaveMemberPreparation);
  }

  async function loadMeetingsWorkspace() {
    try {
      const data = await callServer('getMeetingsWorkspace', state.language);
      state.meetingsData = data;
      renderMeetingsWorkspace(data);
    } catch (error) {
      toast(error.message || String(error), true);
    }

  function renderMeetingsWorkspace(data) {
    state.meetingsData = data;
    const isLead = data.role === 'HOUSEHOLD_LEAD';

    document.getElementById('newMeetingButton').classList.toggle('hidden', !isLead);
    document.getElementById('quickMeetingCard').classList.toggle('hidden', !isLead);
    document.getElementById('dashboardQuickMeetingButton').classList.toggle('hidden', !isLead);
    if (!isLead) {
      hide('meetingBuilderCard');
      hide('quickMeetingCard');
    }

    setText(
      'meetingGuidanceCitation',
      data.citation && data.citation.inTextCitation ||
        '(Hall, 2025, pp. 17–20, 54, 57–63)'
    );
    setText('meetingPrivacyText', data.guidance && data.guidance.privacyMessage || '');

    applyMeetingLanguage();
    populateMeetingSelects();
    initializeQuickMeeting(!state.quickMeetingInitialized);
    renderMeetingLists();
    renderDashboardUpcomingMeetings();
  }


  function populateMeetingSelects() {
    if (!state.meetingsData) return;
    const guidance = state.meetingsData.guidance || {};

    fillOptionSelect('meetingTypeSelect', guidance.types || []);
    fillOptionSelect('meetingStatusSelect', guidance.statuses || []);
    fillOptionSelect('meetingDurationSelect', guidance.durations || []);
    fillOptionSelect('meetingFormatSelect', guidance.formats || []);
    fillOptionSelect('topicGroupSelect', guidance.topicGroups || []);
    fillOptionSelect('newsPillarSelect', (guidance.topicGroups || []).filter(function(item) {
      return item.value !== 'Organization';
    }));
    fillOptionSelect('quickMeetingTemplateSelect', guidance.types || []);
    fillOptionSelect('quickMeetingDurationSelect', guidance.durations || []);
    fillOptionSelect('quickMeetingTopicGroupSelect', guidance.topicGroups || []);
    fillOptionSelect('quickNewsPillarSelect', (guidance.topicGroups || []).filter(function(item) {
      return item.value !== 'Organization';
    }));

    populateMeetingTopicLibrary();
    populateQuickMeetingTopics();
    populateQuickFacilitator();
    populateFacilitatorSelect();
    renderMeetingAttendeeOptions();
    populatePreviousMeetingSelect();
  }

  function renderMeetingAttendeeOptions(selected) {
    const container = document.getElementById('meetingAttendeeOptions');
    if (!container || !state.meetingsData) return;
    const selectedValues = Array.isArray(selected)
      ? selected
      : Array.from(container.querySelectorAll('input:checked')).map(function(input) {
          return input.value;
        });

    container.innerHTML = options.map(function(value) {
      const checked = selectedValues.indexOf(value) >= 0 ? ' checked' : '';

        escapeAttribute(value) + '"' + checked + '><span>' +
        escapeHtml(meetingRoleLabel(value)) + '</span></label>';

          escapeHtml(meeting.title + date) + '</option>';

        !state.workspace ||
        state.workspace.role !== 'HOUSEHOLD_LEAD') {
      return;
    }

    populateQuickFacilitator();
    populateQuickMeetingTopics();

    if (force || !state.quickMeetingInitialized) {
      state.quickMeetingInitialized = true;
      state.quickMeetingTopics = [];
      state.quickMeetingArticle = null;
      document.getElementById('quickMeetingTemplateSelect').value =
        'Weekly Check-In';
      document.getElementById('quickMeetingDateInput').value = '';

      hide('quickMeetingNewsResults');

      return;

      'Health';

  function findMeetingLibraryTopic_(pillar, id) {
    const topics = state.meetingsData &&
      state.meetingsData.guidance &&
      state.meetingsData.guidance.topics &&
      state.meetingsData.guidance.topics[pillar] || [];
    return topics.find(function(topic) { return topic.id === id; }) || null;
  }


  function quickLibraryTopic_(pillar, id) {
    const topic = findMeetingLibraryTopic_(pillar, id);
    if (!topic) return null;
    return {
      id: '',
      sourceType: 'Library',
      libraryId: topic.id,
      pillar: pillar,
      title: topic.title,
      purpose: topic.purpose,
      prompts: cloneClient_(topic.prompts || []),
      desiredOutcome: topic.desiredOutcome,
      timeMinutes: 12,
      article: null
    };
  }


  function applyQuickMeetingTemplate() {
    if (!state.meetingsData) return;
    const type = document.getElementById('quickMeetingTemplateSelect').value ||
      'Weekly Check-In';
    const template = quickMeetingTemplates_()[type] ||
      quickMeetingTemplates_()['Custom Meeting'];

    document.getElementById('quickMeetingDurationSelect').value =
      String(template.duration || 30);
    state.quickMeetingTopics = (template.topics || [])
      .map(function(pair) {
        return quickLibraryTopic_(pair[0], pair[1]);
      })
      .filter(Boolean)
      .slice(0, 2);
    renderQuickMeetingSelectedTopics();
  }


  function refreshQuickTopicsForLanguage_() {
    state.quickMeetingTopics = (state.quickMeetingTopics || []).map(function(topic) {
      if (topic.sourceType !== 'Library' || !topic.libraryId) return topic;
      return quickLibraryTopic_(topic.pillar, topic.libraryId) || topic;
    });
  }


  function renderQuickMeetingSelectedTopics() {
    const container = document.getElementById('quickMeetingSelectedTopics');
    if (!container) return;
    const topics = state.quickMeetingTopics || [];

    if (!topics.length) {
      container.innerHTML = '<span class="small-muted">' +
        escapeHtml(state.language === 'es'
          ? 'Todavía no hay temas seleccionados.'
          : 'No topics selected yet.') + '</span>';
      return;
    }

    container.innerHTML = topics.map(function(topic, index) {
      return '<span class="quick-topic-chip"><span>' +
        escapeHtml(topic.title) + '</span><button type="button" data-quick-topic-index="' +
        index + '" aria-label="' + escapeAttribute(meetingUi().remove) +
        '">×</button></span>';
    }).join('');
  }


  function quickMeetingTopicCount_() {
    return (state.quickMeetingTopics || []).length +
      (state.quickMeetingArticle ? 1 : 0);
  }


  function quickArticleHasRoom_() {
    return Boolean(state.quickMeetingArticle) ||
      (state.quickMeetingTopics || []).length < 3;
  }


  function addQuickMeetingTopic() {
    if (quickMeetingTopicCount_() >= 3) {
      toast(meetingUi().quickTopicLimit, true);
      return;
    }

    const pillar = document.getElementById('quickMeetingTopicGroupSelect').value;
    const id = document.getElementById('quickMeetingTopicSelect').value;
    if (!id) {
      toast(meetingUi().quickNoTopic, true);
      return;
    }

    const topic = quickLibraryTopic_(pillar, id);
    if (!topic) {
      toast(meetingUi().quickNoTopic, true);
      return;
    }

    const duplicate = (state.quickMeetingTopics || []).some(function(item) {
      return item.libraryId === id;
    });
    if (!duplicate) {
      state.quickMeetingTopics.push(topic);
      renderQuickMeetingSelectedTopics();
    }
  }


  function handleQuickTopicRemove(event) {
    const button = event.target.closest('button[data-quick-topic-index]');
    if (!button) return;
    state.quickMeetingTopics.splice(Number(button.dataset.quickTopicIndex), 1);
    renderQuickMeetingSelectedTopics();
  }

    const isLink = article && article.provider === 'Manual link check';
    return {
      id: '',
      sourceType: isLink ? 'Link' : 'News',
      libraryId: '',
      pillar: document.getElementById('quickNewsPillarSelect').value || 'Education',

            '¿Qué acción realista podemos tomar?'

            'What can our household learn?',
            'What should we verify before accepting the information?',

  async function searchQuickMeetingNews() {
    if (!quickArticleHasRoom_()) {
      toast(meetingUi().quickTopicLimit, true);
      return;
    }

    const button = document.getElementById('quickSearchNewsButton');
    const pillar = document.getElementById('quickNewsPillarSelect').value ||
      'Education';
    setBusy(button, true, meetingUi().newsLoading);

    try {
      const result = await callServer(
        'findRecentMeetingNews',
        pillar,
        state.language
      );
      state.quickMeetingNewsResults = result.results || [];
      renderQuickMeetingNewsResults(result);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, meetingUi().quickFindStories);
    }
  }

    const container = document.getElementById('quickMeetingNewsResults');
    const items = result && result.results || [];

    if (!items.length) {
      container.innerHTML = renderNewsFallbackSearches_(result);
      show('quickMeetingNewsResults');
      return;

    container.innerHTML =
      '<div class="news-notice">' + escapeHtml(meetingUi().newsNotice) + '</div>' +
      items.map(function(article, index) {
        return '<article class="news-result-card"><div><span class="goal-badge">' +

          escapeHtml(article.title) + '</h4><p class="small-muted">' +
          escapeHtml(article.publishedDate || '') + '</p></div><div class="button-row">' +
          '<a class="secondary-button compact-button link-button" target="_blank" rel="noopener" href="' +
          escapeAttribute(article.url) + '">' + escapeHtml(meetingUi().openArticle) + '</a>' +
          '<button type="button" class="primary-button compact-button" data-quick-news-index="' +
          index + '">' + escapeHtml(meetingUi().addArticle) + '</button></div></article>';
      }).join('');
    show('quickMeetingNewsResults');
  }


  function renderNewsFallbackSearches_(result) {
    const searches = result && Array.isArray(result.fallbackSearches)
      ? result.fallbackSearches
      : [];
    const notice = result && result.notice || meetingUi().newsEmpty;

    if (!searches.length) {
      return '<div class="empty-state">' +
        escapeHtml(notice || meetingUi().newsEmpty) + '</div>';

    return '<div class="news-fallback-card"><h4>' +
      escapeHtml(meetingUi().newsFallbackTitle) + '</h4><p>' +
      escapeHtml(meetingUi().newsFallbackText) + '</p><div class="news-notice">' +
      escapeHtml(notice) + '</div></div>' +
      searches.map(function(search) {
        return '<article class="news-result-card news-search-card"><div>' +
          '<span class="goal-badge">' +
          escapeHtml(search.publisher || '') + '</span><h4>' +
          escapeHtml(search.title || '') + '</h4><p class="small-muted">' +
          escapeHtml(search.note || '') + '</p></div><div class="button-row">' +
          '<a class="primary-button compact-button link-button" target="_blank" ' +
          'rel="noopener" href="' + escapeAttribute(search.url || '#') + '">' +
          escapeHtml(meetingUi().openSearch) + '</a></div></article>';
      }).join('');

  function renderDashboardUpcomingMeetings() {
    const container = document.getElementById('dashboardUpcomingMeetingsList');
    if (!container || !state.meetingsData) return;

    const isLead = state.workspace &&
      state.workspace.role === 'HOUSEHOLD_LEAD';
    const today = localDateKey_(new Date());
    const upcoming = (state.meetingsData.meetings || [])
      .filter(function(meeting) {
        return meeting.status === 'Scheduled' &&
          meeting.scheduledDate &&
          meeting.scheduledDate >= today;
      })
      .sort(function(a, b) {
        return (a.scheduledDate + ' ' + (a.scheduledTime || '99:99'))
          .localeCompare(b.scheduledDate + ' ' + (b.scheduledTime || '99:99'));
      })
      .slice(0, 3);

      return '<article class="dashboard-meeting-item"><div class="dashboard-meeting-date">' +

  function localDateKey_(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
  }


  function formatDashboardMeetingDate_(dateValue) {
    const date = new Date(dateValue + 'T12:00:00');
    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    if (localDateKey_(date) === localDateKey_(today)) {
      return meetingUi().today;
    }
    if (localDateKey_(date) === localDateKey_(tomorrow)) {
      return meetingUi().tomorrow;
    }

    return new Intl.DateTimeFormat(
      state.language === 'es' ? 'es-US' : 'en-US',
      { weekday: 'short', month: 'short', day: 'numeric' }
    ).format(date);
  }


  function formatDashboardMeetingTime_(timeValue) {
    const parts = String(timeValue || '').split(':');
    if (parts.length !== 2) return timeValue;
    const date = new Date();
    date.setHours(Number(parts[0]), Number(parts[1]), 0, 0);
    return new Intl.DateTimeFormat(
      state.language === 'es' ? 'es-US' : 'en-US',
      { hour: 'numeric', minute: '2-digit' }
    ).format(date);
  }

      const existing = state.meetingDraftTopics[index] || {};

        libraryId: existing.libraryId || '',
        pillar: card.querySelector('.meeting-topic-pillar').value,
        title: card.querySelector('.meeting-topic-title').value.trim(),
        purpose: card.querySelector('.meeting-topic-purpose').value.trim(),
        prompts: Array.from(card.querySelectorAll('.meeting-topic-prompt'))
          .map(function(input) { return input.value.trim(); })
          .filter(Boolean),
        desiredOutcome: card.querySelector('.meeting-topic-outcome').value.trim(),
        timeMinutes: Number(card.querySelector('.meeting-topic-time').value || 15),
        article: existing.article ? cloneClient_(existing.article) : null
      };
    });
    state.meetingDraftTopics = next;
  }

      escapeAttribute(meetingUi().targetDate) + '">' +
      '<label class="action-complete-check"><input class="meeting-action-complete" type="checkbox"' +
      (item.status === 'Completed' ? ' checked' : '') + '><span>' +
      escapeHtml(meetingUi().completed) + '</span></label>' +
      '<button type="button" class="remove-row-button">' +
      escapeHtml(meetingUi().remove) + '</button>';
    row.querySelector('button').addEventListener('click', function() { row.remove(); });
    container.appendChild(row);
  }


  function collectMeetingMaterials() {
    return Array.from(document.querySelectorAll('.meeting-material-input'))
      .map(function(input) { return input.value.trim(); })
      .filter(Boolean);
  }


  function collectMeetingDecisions() {
    return Array.from(document.querySelectorAll('#meetingDecisionsEditor .repeat-row'))
      .map(function(row) {
        return {
          id: row.dataset.id || '',
          text: row.querySelector('.meeting-decision-input').value.trim()
        };
      })
      .filter(function(item) { return Boolean(item.text); });
  }


  function collectMeetingActions() {
    return Array.from(document.querySelectorAll('#meetingActionsEditor .meeting-action-row'))
      .map(function(row) {
        return {
          id: row.dataset.id || '',
          text: row.querySelector('.meeting-action-text').value.trim(),
          assignedRole: row.querySelector('.meeting-action-role').value,
          dueDate: row.querySelector('.meeting-action-date').value,
          status: row.querySelector('.meeting-action-complete').checked
            ? 'Completed' : 'Open'
        };
      })
      .filter(function(item) { return Boolean(item.text); });
  }


  async function handleSaveMeeting() {
    syncMeetingTopicsFromDom();
    const status = document.getElementById('meetingStatusSelect').value || 'Draft';
    const title = document.getElementById('meetingTitleInput').value.trim();
    const date = document.getElementById('meetingDateInput').value;

    if (!title) {
      toast(meetingUi().titleRequired, true);
      return;
    }
    if (status !== 'Draft' && !date) {
      toast(meetingUi().scheduledDateRequired, true);
      return;
    }

    const payload = {
      id: document.getElementById('meetingIdInput').value,
      language: state.language,
      title: title,
      meetingType: document.getElementById('meetingTypeSelect').value,
      status: status,
      scheduledDate: date,
      scheduledTime: document.getElementById('meetingTimeInput').value,
      durationMinutes: Number(document.getElementById('meetingDurationSelect').value || 60),
      meetingFormat: document.getElementById('meetingFormatSelect').value,
      locationNote: document.getElementById('meetingLocationInput').value,
      facilitatorRole: document.getElementById('meetingFacilitatorSelect').value,
      attendeeRoles: Array.from(
        document.querySelectorAll('#meetingAttendeeOptions input:checked')
      ).map(function(input) { return input.value; }),
      openingMessage: document.getElementById('meetingOpeningInput').value,
      previousRecap: document.getElementById('meetingRecapInput').value,
      mealPlan: document.getElementById('meetingMealInput').value,
      materials: collectMeetingMaterials(),
      topics: state.meetingDraftTopics,
      notes: document.getElementById('meetingNotesInput').value,
      decisions: collectMeetingDecisions(),
      actionItems: collectMeetingActions(),
      closingMessage: document.getElementById('meetingClosingInput').value
    };

    if (!clientPrivacyCheck(payload)) return;

    const button = document.getElementById('saveMeetingButton');
    setBusy(button, true, meetingUi().saving);
    try {
      const result = await callServer('saveMeetingRecord', payload);
      state.meetingsData = result.workspace;
      renderMeetingsWorkspace(state.meetingsData);
      closeMeetingBuilder();
      toast(meetingUi().saved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, meetingUi().save);
    }
  }


  function renderMeetingLists() {
    if (!state.meetingsData) return;
    const meetings = state.meetingsData.meetings || [];
    const active = meetings.filter(function(item) {
      return item.status === 'Draft' || item.status === 'Scheduled';
    });
    const completed = meetings.filter(function(item) {
      return item.status === 'Completed';
    });

    renderMeetingList('activeMeetingsList', active, false);
    renderMeetingList('completedMeetingsList', completed, true);
  }


  function renderMeetingList(containerId, meetings, completed) {
    const container = document.getElementById(containerId);
    if (!meetings.length) {
      container.innerHTML = '<div class="empty-state">' +
        escapeHtml(completed ? meetingUi().noCompleted : meetingUi().noActive) +
        '</div>';
      return;
    }

    const isLead = state.workspace && state.workspace.role === 'HOUSEHOLD_LEAD';
    container.innerHTML = meetings.map(function(meeting) {
      const openActions = (meeting.actionItems || []).filter(function(item) {
        return item.status !== 'Completed';
      }).length;
      const dateLine = [meeting.scheduledDate, meeting.scheduledTime]
        .filter(Boolean).join(' · ') || (state.language === 'es' ? 'Fecha pendiente' : 'Date not set');
      const topicNames = (meeting.topics || []).slice(0, 4).map(function(topic) {
        return '<span>' + escapeHtml(topic.title) + '</span>';
      }).join('');
      const articleLinks = (meeting.topics || [])
        .filter(function(topic) {
          return topic.article && topic.article.url;
        })
        .slice(0, 4)
        .map(function(topic) {
          return '<a target="_blank" rel="noopener" href="' +
            escapeAttribute(topic.article.url) + '">' +
            escapeHtml(meetingUi().openArticle + ': ' + topic.article.title) +
            '</a>';
        }).join('');

      const actionButtons = isLead
        ? [
            buttonHtml_('edit', meeting.id, meetingUi().edit),
            buttonHtml_('duplicate', meeting.id, meetingUi().duplicate),
            buttonHtml_('agenda', meeting.id, meetingUi().agendaPdf),
            meeting.status === 'Completed'
              ? buttonHtml_('minutes', meeting.id, meetingUi().minutesPdf) : '',
            buttonHtml_('archive', meeting.id, meetingUi().archive, true)
          ].join('')
        : [
            buttonHtml_('prepare', meeting.id, meetingUi().prepare),
            buttonHtml_('agenda', meeting.id, meetingUi().agendaPdf),
            meeting.status === 'Completed'
              ? buttonHtml_('minutes', meeting.id, meetingUi().minutesPdf) : ''
          ].join('');

      return '<article class="meeting-card"><div class="meeting-card-header"><div>' +
        '<span class="goal-badge">' + escapeHtml(meetingUi().householdBadge) + '</span>' +
        (!isLead ? '<span class="goal-badge muted">' +
          escapeHtml(meetingUi().readonlyBadge) + '</span>' : '') +
        '<h3>' + escapeHtml(meeting.title) + '</h3><p class="small-muted">' +
        escapeHtml(meetingLabelFor('types', meeting.meetingType)) + ' · ' +
        escapeHtml(dateLine) + '</p></div><span class="meeting-status-badge">' +
        escapeHtml(meetingLabelFor('statuses', meeting.status)) + '</span></div>' +
        '<div class="meeting-summary-grid"><span><b>' +
        escapeHtml(meetingUi().facilitatorShort) + ':</b> ' +
        escapeHtml(meetingRoleLabel(meeting.facilitatorRole || '—')) + '</span><span><b>' +
        escapeHtml(meetingUi().topics) + ':</b> ' +
        Number((meeting.topics || []).length) + '</span><span><b>' +
        escapeHtml(meetingUi().actionsOpen) + ':</b> ' + openActions + '</span></div>' +
        (topicNames ? '<div class="meeting-topic-chips">' + topicNames + '</div>' : '') +
        (articleLinks ? '<div class="meeting-source-links">' + articleLinks + '</div>' : '') +
        (meeting.mealPlan ? '<p><b>' + escapeHtml(meetingUi().mealShort) +
          ':</b> ' + escapeHtml(meeting.mealPlan) + '</p>' : '') +
        '<div class="button-row meeting-card-actions">' + actionButtons + '</div></article>';
    }).join('');
  }


  function buttonHtml_(action, meetingId, label, danger) {
    return '<button type="button" class="' +
      (danger ? 'text-button danger-text' : 'secondary-button compact-button') +
      '" data-meeting-action="' + escapeAttribute(action) +
      '" data-meeting-id="' + escapeAttribute(meetingId) + '">' +
      escapeHtml(label) + '</button>';
  }


  function meetingLabelFor(group, value) {
    const options = state.meetingsData &&
      state.meetingsData.guidance &&
      state.meetingsData.guidance[group] || [];
    const match = options.find(function(option) { return option.value === value; });
    return match ? match.label : value;
  }


  function findMeeting(meetingId) {
    return (state.meetingsData && state.meetingsData.meetings || [])
      .find(function(item) { return item.id === meetingId; }) || null;
  }


  async function handleMeetingListClick(event) {
    const button = event.target.closest('button[data-meeting-action]');
    if (!button) return;
    const action = button.dataset.meetingAction;
    const meeting = findMeeting(button.dataset.meetingId);
    if (!meeting) return;

    if (action === 'edit') openMeetingBuilder(meeting);
    if (action === 'prepare') openMemberPreparation(meeting);
    if (action === 'duplicate') await duplicateMeeting(meeting);
    if (action === 'archive') await archiveMeeting(meeting);
    if (action === 'agenda') await generateMeetingPdf(meeting, 'AGENDA', button);
    if (action === 'minutes') await generateMeetingPdf(meeting, 'MINUTES', button);
  }


  async function duplicateMeeting(meeting) {
    try {
      const result = await callServer(
        'duplicateMeetingRecord',
        meeting.id,
        state.language
      );
      state.meetingsData = result.workspace;
      renderMeetingsWorkspace(state.meetingsData);
      toast(meetingUi().duplicated);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function archiveMeeting(meeting) {
    if (!window.confirm(meetingUi().confirmArchive)) return;
    try {
      const result = await callServer(
        'archiveMeetingRecord',
        meeting.id,
        state.language
      );
      state.meetingsData = result.workspace;
      renderMeetingsWorkspace(state.meetingsData);
      toast(meetingUi().archived);
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }


  async function generateMeetingPdf(meeting, type, button) {
    const original = button.textContent;
    setBusy(button, true, meetingUi().pdfCreating);
    try {
      const result = await callServer(
        'generateMeetingDocument',
        meeting.id,
        type,
        state.language
      );
      downloadBase64File(result.filename, 'application/pdf', result.base64Content);
      toast(result.message);
      if (result.driveFileUrl) {
        window.open(result.driveFileUrl, '_blank', 'noopener');
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, original);
    }
  }


  async function handleCarryForward() {
    const previousId = document.getElementById('previousMeetingSelect').value;
    if (!previousId) {
      toast(meetingUi().choosePrevious, true);
      return;
    }

    const button = document.getElementById('carryForwardButton');
    setBusy(button, true, state.language === 'es' ? 'Agregando…' : 'Adding…');
    try {
      const result = await callServer(
        'carryForwardMeetingItems',
        previousId,
        state.language
      );
      document.getElementById('meetingRecapInput').value =
        result.recap || document.getElementById('meetingRecapInput').value;
      if (!(result.actionItems || []).length) {
        toast(meetingUi().previousItemsNone);
      } else {
        (result.actionItems || []).forEach(addMeetingActionRow);
        toast(meetingUi().carried);
      }
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, meetingUi().addPreviousItems);
    }
  }


  function openMemberPreparation(meeting) {
    const existing = (state.meetingsData.memberPreparations || []).find(function(item) {
      return item.meetingId === meeting.id;
    }) || {};

    document.getElementById('memberPrepIdInput').value = existing.id || '';
    document.getElementById('memberPrepMeetingIdInput').value = meeting.id;
    document.getElementById('memberPrepMeetingName').textContent = meeting.title;
    document.getElementById('memberPrepQuestionsInput').value = existing.questions || '';
    document.getElementById('memberPrepTopicInput').value = existing.topicSuggestion || '';
    document.getElementById('memberPrepSupportInput').value = existing.supportNeeded || '';
    show('memberMeetingPrepCard');
    openPanel('meetingsPanel');
    document.getElementById('memberMeetingPrepCard').scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }


  function closeMemberPreparation() {
    hide('memberMeetingPrepCard');
  }


  async function handleSaveMemberPreparation() {
    const payload = {
      id: document.getElementById('memberPrepIdInput').value,
      meetingId: document.getElementById('memberPrepMeetingIdInput').value,
      questions: document.getElementById('memberPrepQuestionsInput').value,
      topicSuggestion: document.getElementById('memberPrepTopicInput').value,
      supportNeeded: document.getElementById('memberPrepSupportInput').value,
      language: state.language
    };
    if (!clientPrivacyCheck(payload)) return;

    const button = document.getElementById('saveMemberPrepButton');
    setBusy(button, true, meetingUi().saving);
    try {
      const result = await callServer('saveMeetingPreparation', payload);
      state.meetingsData = result.workspace;
      renderMeetingsWorkspace(state.meetingsData);
      closeMemberPreparation();
      toast(meetingUi().prepSaved);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, meetingUi().savePrep);
    }
  }


  function cloneClient_(value) {
    return JSON.parse(JSON.stringify(value == null ? null : value));
  }
</script>
