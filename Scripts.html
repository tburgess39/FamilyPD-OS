  const STATIC_TEXT_ORIGINALS = new WeakMap();
  const STATIC_ATTRIBUTE_ORIGINALS = new WeakMap();
  let STATIC_FRAME_PRIMED = false;

  function normalizeStaticText_(value) {
    return String(value || '').replace(/\s+/g, ' ').trim();
  }

  function primeStaticFrameTranslations() {
    // New cards, rows, and helper content are inserted after the first page
    // render. Register any new nodes every time language is applied so those
    // elements can switch back and forth instead of remaining in English.
    const root = document.body;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    let node;
    while ((node = walker.nextNode())) {
      if (!node.parentElement ||
          ['SCRIPT', 'STYLE', 'TEXTAREA'].includes(node.parentElement.tagName)) continue;
      if (!STATIC_TEXT_ORIGINALS.has(node)) {
        STATIC_TEXT_ORIGINALS.set(node, node.nodeValue);
      }
    }

    document.querySelectorAll('[placeholder],[title],[aria-label],[data-help]').forEach(function(element) {
      if (STATIC_ATTRIBUTE_ORIGINALS.has(element)) return;
      STATIC_ATTRIBUTE_ORIGINALS.set(element, {
        placeholder: element.getAttribute('placeholder'),
        title: element.getAttribute('title'),
        ariaLabel: element.getAttribute('aria-label'),
        dataHelp: element.getAttribute('data-help')
      });
    });

    STATIC_FRAME_PRIMED = true;
  }

  function applyStaticFrameTranslations() {
    primeStaticFrameTranslations();
    const es = state.language === 'es';
    const root = document.body;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    let node;

    while ((node = walker.nextNode())) {
      if (!node.parentElement ||
          ['SCRIPT', 'STYLE', 'TEXTAREA'].includes(node.parentElement.tagName)) continue;
      const original = STATIC_TEXT_ORIGINALS.get(node);
      if (typeof original !== 'string') continue;
      const key = normalizeStaticText_(original);
      const translated = es && STATIC_FRAME_ES[key] ? STATIC_FRAME_ES[key] : original;
      if (translated === original) {
        node.nodeValue = original;
      } else {
        const leading = original.match(/^\s*/)[0];
        const trailing = original.match(/\s*$/)[0];
        node.nodeValue = leading + translated + trailing;
      }
    }

    document.querySelectorAll('[placeholder],[title],[aria-label],[data-help]').forEach(function(element) {
      const original = STATIC_ATTRIBUTE_ORIGINALS.get(element);
      if (!original) return;

      ['placeholder', 'title'].forEach(function(attribute) {
        const value = original[attribute];
        if (value == null) return;
        element.setAttribute(
          attribute,
          es && STATIC_FRAME_ES[normalizeStaticText_(value)]
            ? STATIC_FRAME_ES[normalizeStaticText_(value)]
            : value
        );
      });

      if (original.ariaLabel != null) {
        element.setAttribute(
          'aria-label',
          es && STATIC_FRAME_ES[normalizeStaticText_(original.ariaLabel)]
            ? STATIC_FRAME_ES[normalizeStaticText_(original.ariaLabel)]
            : original.ariaLabel
        );
      }

      if (original.dataHelp != null) {
        element.setAttribute(
          'data-help',
          es && STATIC_FRAME_ES[normalizeStaticText_(original.dataHelp)]
            ? STATIC_FRAME_ES[normalizeStaticText_(original.dataHelp)]
            : original.dataHelp
        );
      }
    });
  }

  function initialize() {
    primeStaticFrameTranslations();
    document.documentElement.lang = state.language;
    document.getElementById('languageSelect').value = state.language;
    applyInitialLanguage();
    bindStaticEvents();

    callServer('getBootstrap')
      .then(function(data) {
        state.bootstrap = data;
        evaluateSecurity(data.security);
      })
      .catch(function(error) {
        showSecurityBlock(
          'FamilyPD could not complete its startup security check. ' +
          (error.message || String(error))
        );
      });
  }

  function evaluateSecurity(security) {
    const protocolOk = window.location.protocol === 'https:';
    const hostname = String(window.location.hostname || '').toLowerCase();
    const productionHosts = security.approvedProductionHosts || [];
    const prototypeHosts = security.approvedPrototypeHosts || [];

    const approvedGooglePrototypeHost =
      prototypeHosts.includes(hostname) ||
      hostname === 'script.googleusercontent.com' ||
      hostname.endsWith('-script.googleusercontent.com');

    const hostOk = productionHosts.includes(hostname) || approvedGooglePrototypeHost;

    if (!protocolOk || !hostOk) {
      showSecurityBlock(
        !protocolOk
          ? 'This page is not using an encrypted HTTPS connection.'
          : 'The hostname "' + hostname + '" is not approved for FamilyPD.'
      );
      return;
    }

    state.securityPassed = true;
    show('app');
    hide('securityBlock');

    const isProduction = productionHosts.includes(hostname);
    const es = state.language === 'es';
    document.getElementById('securityBannerText').textContent =
      isProduction
        ? (es ? 'Sitio oficial de FamilyPD — ' : 'Official FamilyPD site — ') + hostname
        : (es ? 'Prototipo autorizado de FamilyPD — alojado por Google' : 'Authorized FamilyPD prototype — Google hosted');

    document.getElementById('securityModeNotice').innerHTML = isProduction
      ? (es
          ? '<strong>Sitio oficial:</strong> El nombre de host coincide con un dominio aprobado de FamilyPD.'
          : '<strong>Official production site:</strong> The hostname matches an approved FamilyPD domain.')
      : (es
          ? '<strong>Aviso del prototipo:</strong> Esta versión de prueba autorizada está alojada temporalmente por Google Apps Script. Úsela solamente cuando la abra desde el sitio oficial de FamilyPD o desde un enlace de prueba autorizado.'
          : '<strong>Prototype notice:</strong> This authorized test version is temporarily hosted by Google Apps Script. Use it only when opened from the official FamilyPD site or an authorized test link.');

    if (localStorage.getItem('FPD_SECURITY_ACK_V4') === 'YES') {
      renderBootstrap(state.bootstrap);
    } else {
      openSecurityModal();
      hide('loadingView');
    }
  }

  function acknowledgeSecurity() {
    localStorage.setItem('FPD_SECURITY_ACK_V4', 'YES');
    closeSecurityModal();
    renderBootstrap(state.bootstrap);
  }

  function openSecurityModal() { show('securityModal'); }

  function closeSecurityModal() {
    if (!localStorage.getItem('FPD_SECURITY_ACK_V4')) return;
    hide('securityModal');
  }

  function showSecurityBlock(message) {
    document.getElementById('securityBlockMessage').textContent = message;
    hide('app');

  function normalizeWorkspaceSummary(workspace) {
    const candidate = workspace && typeof workspace === 'object'
      ? workspace
      : {};
    const bootstrapWorkspace = state.bootstrap &&
      state.bootstrap.workspace &&
      typeof state.bootstrap.workspace === 'object'
        ? state.bootstrap.workspace
        : {};
    const merged = Object.assign({}, bootstrapWorkspace, candidate);
    const role = merged.role || '';
    const roleLabel = merged.roleLabel ||
      (role === 'HOUSEHOLD_LEAD'
        ? 'Household Lead'
        : role === 'FAMILY_MEMBER'
          ? 'Family Member'
          : 'FamilyPD');

    return Object.assign({}, merged, {
      role: role,
      roleLabel: roleLabel,
      rootFolderUrl: merged.rootFolderUrl || '#'
    });
  }


  function renderBootstrap(data) {
    hide('loadingView');
    data = data && typeof data === 'object' ? data : {};

    if (!data.configured) {
      show('onboardingView');
      return;
    }

    const workspace = normalizeWorkspaceSummary(data.workspace);
    if (!workspace.role) {
      toast(
        state.language === 'es'
          ? 'FamilyPD no recibió el resumen del espacio de trabajo. Actualice la página o vuelva a conectar el espacio.'
          : 'FamilyPD did not receive the workspace summary. Refresh the page or reconnect the workspace.',
        true
      );
      show('onboardingView');
      return;
    }

    renderDashboard(workspace);
  }

  async function verifyWorkspaceHealthAndLoad() {
    renderWorkspaceHealth({ checking: true });
    try {
      const health = await callServer('getWorkspaceHealth');
      state.workspaceHealth = health || { healthy: false, issues: [] };
      renderWorkspaceHealth(state.workspaceHealth);

      if (!state.workspaceHealth.healthy) {
        openPanel('workspacePanel', true);
        return;
      }

      loadWorkspaceModulesOnce();
      const requestedPanel = sessionStorage.getItem('FPD_REOPEN_PANEL');
      sessionStorage.removeItem('FPD_REOPEN_PANEL');
      if (requestedPanel && document.getElementById(requestedPanel)) {
        openPanel(requestedPanel, true);
      }
    } catch (error) {
      state.workspaceHealth = {
        healthy: false,
        canRepair: true,
        issues: [error.message || String(error)]
      };
      renderWorkspaceHealth(state.workspaceHealth);
      openPanel('workspacePanel', true);
    }
  }

  function renderWorkspaceHealth(health) {
    const banner = document.getElementById('workspaceHealthBanner');
    const issues = document.getElementById('workspaceHealthIssues');
    const repairButton = document.getElementById('healthRepairButton');
    if (!banner || !issues || !repairButton) return;

    banner.classList.remove('hidden', 'healthy', 'needs-repair');
    issues.classList.add('hidden');
    issues.innerHTML = '';
    repairButton.classList.add('hidden');

    if (health && health.checking) {
      setText(
        'workspaceHealthTitle',
        state.language === 'es'
          ? 'Revisando el espacio FamilyPD…'
          : 'Checking the FamilyPD workspace…'
      );
      setText(
        'workspaceHealthText',
        state.language === 'es'
          ? 'FamilyPD está confirmando que la carpeta y los archivos esenciales están disponibles.'
          : 'FamilyPD is confirming that its folder and core files are available.'
      );
      return;
    }

    if (health && health.healthy) {
      banner.classList.add('healthy');
      setText(
        'workspaceHealthTitle',
        state.language === 'es'
          ? 'El espacio FamilyPD está listo'
          : 'The FamilyPD workspace is ready'
      );
      setText(
        'workspaceHealthText',
        state.language === 'es'
          ? 'La carpeta y los archivos esenciales están conectados. Puede usar todas las funciones.'
          : 'The main folder and core files are connected. All features are available.'
      );
      window.setTimeout(function() {
        if (state.workspaceHealth && state.workspaceHealth.healthy) {
          banner.classList.add('health-collapsed');
        }
      }, 2200);
      return;
    }

    banner.classList.add('needs-repair');
    banner.classList.remove('health-collapsed');
    setText(
      'workspaceHealthTitle',
      state.language === 'es'
        ? 'El espacio FamilyPD necesita reparación antes de continuar'
        : 'The FamilyPD workspace needs repair before you continue'
    );
    setText(
      'workspaceHealthText',
      state.language === 'es'
        ? 'Un archivo o carpeta esencial no está disponible. FamilyPD ha detenido las herramientas que necesitan esos archivos.'
        : 'A core file or folder is unavailable. FamilyPD paused the tools that depend on those files.'
    );
    const records = health && Array.isArray(health.issues) ? health.issues : [];
    issues.innerHTML = records.map(function(item) {
      return '<li>' + escapeHtml(translateWorkspaceHealthIssue_(item)) + '</li>';
    }).join('');
    issues.classList.toggle('hidden', !records.length);
    repairButton.classList.toggle(
      'hidden',
      Boolean(health && health.canRepair === false)
    );
    setText('healthRepairButton', ui().repairWorkspace);
  }


  function translateWorkspaceHealthIssue_(value) {
    const text = String(value || '');
    if (state.language !== 'es') return text;

    const exact = {
      'No FamilyPD workspace has been created for this account.':
        'No se ha creado un espacio FamilyPD para esta cuenta.',
      'No FamilyPD workspace has been created for this Google account.':
        'No se ha creado un espacio FamilyPD para esta cuenta de Google.',
      'The FamilyPD workspace connection is missing.':
        'Falta la conexión con el espacio FamilyPD.',
      'The FamilyPD recovery file connection is missing.':
        'Falta la conexión con el archivo de recuperación de FamilyPD.',
      'The FamilyPD data file is unavailable or in Trash.':
        'El archivo principal de datos no está disponible o está en la papelera.',
      'The FamilyPD sources file is unavailable or in Trash.':
        'El archivo de fuentes no está disponible o está en la papelera.',
      'The FamilyPD recovery file is unavailable or in Trash.':
        'El archivo de recuperación no está disponible o está en la papelera.',
      'The FamilyPD workspace version needs repair.':
        'La versión del espacio FamilyPD necesita reparación.',
      'The saved FamilyPD workspace version needs an in-place repair.':
        'La versión guardada del espacio FamilyPD necesita una reparación.'
    };
    if (exact[text]) return exact[text];

    return text
      .replace(
        /^The connection to the (.+) is missing\.$/,
        'Falta la conexión con $1.'
      )
      .replace(
        /^The (.+) is unavailable, in Trash, or no longer accessible\.$/,
        '$1 no está disponible, está en la papelera o ya no es accesible.'
      )
      .replace(
        /^The required folder "(.+)" is unavailable or in Trash\.$/,
        'La carpeta requerida “$1” no está disponible o está en la papelera.'
      )
      .replace(
        /^The required file "(.+)" is unavailable or in Trash\.$/,
        'El archivo requerido “$1” no está disponible o está en la papelera.'
      )
      .replace(
        /^FamilyPD could not verify (.+)\.$/,
        'FamilyPD no pudo verificar $1.'
      );
  }


  async function loadIdentityWorkspace() {
    try {
      const data = await callServer('getIdentityWorkspace');
      if (!localStorage.getItem('FPD_LANGUAGE') && data.profile && data.profile.language) {
        state.language = data.profile.language;
        localStorage.setItem('FPD_LANGUAGE', state.language);
      }
      if (!data.guidance || data.guidance.language !== state.language) {
        data.guidance = await callServer('getGuidanceSupport', state.language);
      }
      state.identityData = data;
      state.guidance = data.guidance;
      applyAccessibilityPreferences(data.profile || {});
      renderIdentityWorkspace(data);
      maybeOpenFirstTutorial(data.profile || {});
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }

  function normalizeIdentityWorkspaceData(data) {
    data = data && typeof data === 'object' ? data : {};
    const role = data.role ||
      (state.workspace && state.workspace.role) ||
      'FAMILY_MEMBER';
    const profile = data.profile && typeof data.profile === 'object'
      ? data.profile
      : {};
    const packStatus = data.packStatus && typeof data.packStatus === 'object'
      ? data.packStatus
      : {};
    const guidebookGuidance =
      data.guidebookGuidance &&
      typeof data.guidebookGuidance === 'object'
        ? data.guidebookGuidance
        : {
            statement: state.language === 'es'
              ? 'La visión describe el hogar que están construyendo; la misión explica lo que practican; los valores explican cómo se tratarán; y los roles hacen visibles las responsabilidades.'
              : 'Vision describes the household being built; mission explains what the household practices; values describe agreed behavior; and roles make responsibilities visible.',
            inTextCitation: '(Hall, 2025)'
          };

    return Object.assign({}, data, {
      role: role,
      profile: profile,
      packStatus: packStatus,
      guidebookGuidance: guidebookGuidance,
      roleLabels: Array.isArray(data.roleLabels) && data.roleLabels.length
        ? data.roleLabels
        : IDENTITY_DROPDOWN_FALLBACKS.roleLabels,
      ageGroups: Array.isArray(data.ageGroups) && data.ageGroups.length
        ? data.ageGroups
        : IDENTITY_DROPDOWN_FALLBACKS.ageGroups,
      learningFormats:

          ? data.learningFormats
          : IDENTITY_DROPDOWN_FALLBACKS.learningFormats,
      checkInRhythms:
        Array.isArray(data.checkInRhythms) && data.checkInRhythms.length
          ? data.checkInRhythms
          : IDENTITY_DROPDOWN_FALLBACKS.checkInRhythms,
      sharingPreferences:
        Array.isArray(data.sharingPreferences) && data.sharingPreferences.length
          ? data.sharingPreferences
          : IDENTITY_DROPDOWN_FALLBACKS.sharingPreferences,
      guidance: data.guidance && typeof data.guidance === 'object'
        ? data.guidance
        : {}
    });
  }

  async function handleGenerateIdentity() {
    const payload = {
      language: state.language,

      treatment: document.getElementById('builderTreatmentSelect').value,
      focus: document.getElementById('builderFocusSelect').value,
      future: document.getElementById('builderFutureSelect').value,

    };

    const button = document.getElementById('generateIdentityButton');
    setBusy(button, true, state.language === 'es' ? 'Creando ideas…' : 'Creating ideas…');
    try {
      const result = await callServer('generateGuidedIdentity', payload);
      renderGeneratedOptions('generatedVisionOptions', result.visionOptions || [], 'visionInput');
      renderGeneratedOptions('generatedMissionOptions', result.missionOptions || [], 'missionInput');
      renderGeneratedOptions('generatedMottoOptions', result.mottoOptions || [], 'mottoInput');
      show('generatedIdentityResults');
      toast(ui().generated);
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, ui().generate);

  async function handleLanguageChange(event) {
    const nextLanguage = event && event.target && event.target.value === 'es'
      ? 'es'
      : 'en';
    if (state.languageRefreshInProgress) return;

    state.languageRefreshInProgress = true;
    state.language = nextLanguage;
    localStorage.setItem('FPD_LANGUAGE', state.language);
    document.documentElement.lang = state.language;

    const activePanel = document.querySelector('.workspace-panel.active');
    if (activePanel && activePanel.id) {
      sessionStorage.setItem('FPD_REOPEN_PANEL', activePanel.id);
    }

    // Show the requested language immediately, then perform one controlled
    // reload. The reload rebuilds every dynamic card and dropdown from a clean
    // language state, preventing English and Spanish fragments from mixing.
    applyInitialLanguage();
    refreshWorkspaceFrameLanguage();
    if (typeof applyAccessibilitySupportLanguage === 'function') {
      applyAccessibilitySupportLanguage();
    }

    try {
      if (state.workspace) await saveCurrentInterfacePreferences();
    } catch (error) {
      console.warn('FamilyPD could not save the language preference:', error);
    }

    toast(ui().languageRefreshing);
    window.setTimeout(function() {
      window.location.reload();
    }, 450);
  }


  function applyAccessibilityPreferences(profile) {
    const simple = Boolean(profile.simpleLanguage);
    const large = Boolean(profile.largeText);
    document.body.classList.toggle('simple-language', simple);
    document.body.classList.toggle('large-text', large);
    const simpleCheck = document.getElementById('profileSimpleLanguageCheck');
    const largeCheck = document.getElementById('profileLargeTextCheck');
    if (simpleCheck) simpleCheck.checked = simple;
    if (largeCheck) largeCheck.checked = large;
  }

  async function saveCurrentInterfacePreferences(tutorialCompleted) {
    const current = state.identityData && state.identityData.profile || {};
    const payload = {
      language: state.language,
      simpleLanguage: document.getElementById('profileSimpleLanguageCheck').checked,
      largeText: document.getElementById('profileLargeTextCheck').checked
    };
    if (typeof tutorialCompleted === 'boolean') {
      payload.tutorialCompleted = tutorialCompleted;
    } else if (Object.prototype.hasOwnProperty.call(current, 'tutorialCompleted')) {
      payload.tutorialCompleted = Boolean(current.tutorialCompleted);
    }

    const result = await callServer('saveInterfacePreferences', payload);
    if (state.identityData) {
      state.identityData.profile = Object.assign({}, current, result.profile || payload);
      state.identityData.guidance = result.guidance || state.guidance;
    }
    applyAccessibilityPreferences(result.profile || payload);
    return result;
  }

  function renderTutorialStep() {
    const steps = state.guidance && state.guidance.tutorial || [];
    const step = steps[state.tutorialIndex];
    if (!step) return;
    setText('tutorialModalTitle', step.title);
    setText('tutorialModalBody', step.body);
    const progress = document.getElementById('tutorialProgress');
    progress.innerHTML = steps.map(function(_, index) {
      return '<span class="' + (index <= state.tutorialIndex ? 'active' : '') + '"></span>';
    }).join('');
    document.getElementById('tutorialBackButton').disabled = state.tutorialIndex === 0;
    setText('tutorialNextButton', state.tutorialIndex === steps.length - 1 ? ui().finish : ui().next);
    const featureButton = document.getElementById('tutorialOpenFeatureButton');
    const feature = tutorialFeatureForStep_(step.id);
    featureButton.classList.toggle('hidden', !feature);
    featureButton.dataset.tutorialFeature = step.id;
    setText('tutorialOpenFeatureButton', ui().openFeature);
  }


  function tutorialFeatureForStep_(stepId) {
    return {
      workspace: { panel: 'workspacePanel' },
      identity: { panel: 'identityPanel', identityStep: 'start' },
      roles: { panel: 'identityPanel', identityStep: 'roles' },
      goals: { panel: 'goalsPanel' },
      meetings: { panel: 'meetingsPanel' },
      learning: { panel: 'learningPanel' },
      opportunities: { panel: 'opportunitiesPanel', opportunityStep: 'learn' },
      systems: { panel: 'systemsPanel' },
      sharing: { panel: 'updatePanel' },
      accessibility: { panel: 'helpPanel', support: true },
      help: { panel: 'helpPanel' }
    }[stepId] || null;
  }


  function openCurrentTutorialFeature() {
    const steps = state.guidance && state.guidance.tutorial || [];
    const step = steps[state.tutorialIndex];
    if (step) openTutorialFeature(step.id);
  }


  function openTutorialFeature(stepId) {
    const feature = tutorialFeatureForStep_(stepId);
    if (!feature) return;
    hide('tutorialModal');
    openPanel(feature.panel);
    if (feature.identityStep) {
      activateIdentityGuideStep(feature.identityStep, true);
    }
    if (feature.opportunityStep &&
        typeof activateOpportunityGuideStep === 'function') {
      activateOpportunityGuideStep(feature.opportunityStep, true);
    }
    if (feature.support && typeof openGeneralSupport === 'function') {
      openGeneralSupport();
    }
  }


  function changeTutorialStep(direction) {
    const steps = state.guidance && state.guidance.tutorial || [];
    if (direction > 0 && state.tutorialIndex >= steps.length - 1) {
      completeTutorial();
      return;
    }
    state.tutorialIndex = Math.max(0, Math.min(state.tutorialIndex + direction, steps.length - 1));
    renderTutorialStep();
  }

  function closeTutorial() {
    completeTutorial();
  }

  async function completeTutorial() {
    hide('tutorialModal');
    if (state.workspace) {
      localStorage.setItem('FPD_TUTORIAL_V7_' + state.workspace.role, 'YES');
    }
    try {
      await saveCurrentInterfacePreferences(true);
    } catch (error) {
      // The tutorial can still close if the preference could not be saved.
    }
  }

  function handleReadPage() {
    if (!('speechSynthesis' in window)) {
      toast(state.language === 'es'
        ? 'Este navegador no ofrece lectura en voz alta.'
        : 'This browser does not provide read-aloud support.', true);
      return;
    }

    if (state.speechActive) {
      window.speechSynthesis.cancel();
      state.speechActive = false;
      setText('readPageButtonText', ui().readAloud);
      return;
    }

    const panel = document.querySelector('.workspace-panel.active') ||
      document.querySelector('main');

    // The accessibility support client reads headings, explanations, current
    // form questions, selected options, and answers—not only static paragraphs.
    if (typeof readElementAloud === 'function') {
      readElementAloud(panel);
      return;
    }

    const text = Array.from(panel.querySelectorAll('h1,h2,h3,h4,p,small,label span'))
      .filter(function(element) { return element.offsetParent !== null; })
      .map(function(element) { return element.textContent.trim(); })
      .filter(Boolean)
      .join('. ')
      .substring(0, 5000);

    if (!text) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = state.language === 'es' ? 'es-US' : 'en-US';
    utterance.rate = 0.95;
    utterance.onend = function() {
      state.speechActive = false;
      setText('readPageButtonText', ui().readAloud);
    };
    utterance.onerror = utterance.onend;
    state.speechActive = true;
    setText('readPageButtonText', ui().stopReading);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

        (state.language === 'es' ? 'Sugerencia copiada.' : 'Prompt copied.'));

        ? 'No se pudo copiar automáticamente. Seleccione el texto y cópielo manualmente.'
        : 'The prompt could not be copied automatically. Select the text and copy it manually.', true);
    }
  }

  function renderIdentityPillarExamples() {

      'Health';

      'mission';
    const library = IDENTITY_PILLAR_EXAMPLES[language] &&
      IDENTITY_PILLAR_EXAMPLES[language][pillar];
    const records = library && library[type] || [];
    const text = identityExamplesUi_();

    setText('identityExamplesTitle', text.title);

    setText('identityExamplePillarLabel', text.pillar);
    setText('identityExampleTypeLabel', text.type);

    const pillar = document.getElementById('identityExamplePillarSelect').value ||

      'mission';
    const library = IDENTITY_PILLAR_EXAMPLES[language] &&

    const record = library && library[type] &&
      library[type][Number(button.dataset.identityExampleIndex)];
    if (!record) return;

    if (type === 'mission') {
      document.getElementById('missionInput').value = record;
      document.getElementById('missionInput').focus();
    } else if (type === 'vision') {
      document.getElementById('visionInput').value = record;
      document.getElementById('visionInput').focus();
    } else {
      addValueRow({
        libraryId: '',
        label: record[0],
        description: record[1]
      });

    activateIdentityGuideStep(
      type === 'values' ? 'values' : 'statements',
      true
    );
    toast(
      state.language === 'es'
        ? 'Se agregó el ejemplo al borrador editable.'

  function handleAddRoleToRoster() {
    const roleId = document.getElementById('roleTemplateSelect').value;
    const role = roleTemplates_().find(function(item) {
      return item.id === roleId;
    });
    if (!role) return;

    const responsibilities = Array.from(document.querySelectorAll('#roleResponsibilitiesEditor .responsibility-row'))
      .filter(function(row) { return row.querySelector('input[type="checkbox"]').checked; })
      .map(function(row) { return row.querySelector('input[type="text"]').value.trim(); })
      .filter(Boolean);

    if (!responsibilities.length) {
      toast(ui().roleNeedsResponsibility, true);
      return;
    }

    const customTitle = document.getElementById('customRoleTitleInput').value.trim();
    if (role.id === 'custom' && !customTitle) {
      toast(ui().customRoleNeeded, true);
      return;
    }

    const record = {
      id: '',
      customLabel: selectedHouseholdMemberLabel_(),
      roleLabel: role.storageLabel,
      roleTitle: role.id === 'custom' ? customTitle : role.label,
      ageGroup: 'Not specified',
      permissionLabel: role.permissionLabel || 'Member',
      responsibilities: responsibilities.join('\n')
    };

    if (!clientPrivacyCheck(record)) return;
    state.rosterDraft.push(record);
    document.getElementById('roleAssignedLabelSelect').value = '';
    document.getElementById('roleAssignedLabelInput').value = '';
    document.getElementById('customAssignedLabelWrap').classList.add('hidden');
    document.getElementById('customRoleTitleInput').value = '';
    renderRosterCards();
    toast(ui().roleAdded);
  }

    const container = document.getElementById('rosterEditor');
    container.innerHTML = '';

    if (!state.rosterDraft.length) {
      container.innerHTML = '<div class="empty-state">' + escapeHtml(
        state.language === 'es'

          : 'No roles have been added yet. Choose a role above to begin.'
      ) + '</div>';
      return;
    }

    state.rosterDraft.forEach(function(record, index) {
      const card = document.createElement('article');
      card.className = 'roster-card';
      const responsibilityItems = String(record.responsibilities || '').split(/\n+/).filter(Boolean);
      card.innerHTML =
        '<div><h4>' + escapeHtml(record.roleTitle || record.roleLabel || 'Family Member') + '</h4>' +
        (record.customLabel ? '<p><strong>' + escapeHtml(record.customLabel) + '</strong></p>' : '') +
        '<ul>' + responsibilityItems.map(function(item) { return '<li>' + escapeHtml(item) + '</li>'; }).join('') + '</ul></div>' +
        '<div class="roster-card-actions">' +

          '<button class="remove-role-button" type="button">' + escapeHtml(state.language === 'es' ? 'Quitar' : 'Remove') + '</button>' +
        '</div>';
      card.querySelector('.edit-role-button').addEventListener('click', function() {
        editRosterRecord(index);
      });
      card.querySelector('.remove-role-button').addEventListener('click', function() {
        state.rosterDraft.splice(index, 1);
        renderRosterCards();
      });
      container.appendChild(card);
    });
  }

  function editRosterRecord(index) {
    const record = state.rosterDraft[index];
    if (!record || !state.guidance) return;
    const roles = roleTemplates_();
    const role = roles.find(function(item) {
      return item.storageLabel === record.roleLabel;
    }) || roles.find(function(item) { return item.id === 'custom'; });

    document.getElementById('roleTemplateSelect').value = role ? role.id : 'custom';
    populateHouseholdMemberLabelSelect(record.customLabel || '');
    document.getElementById('customRoleTitleInput').value =
      record.roleLabel === 'Custom Role' ? (record.roleTitle || '') : '';
    renderSelectedRoleTemplate();

    const editor = document.getElementById('roleResponsibilitiesEditor');
    editor.innerHTML = '';
    String(record.responsibilities || '').split(/\n+/).filter(Boolean).forEach(addResponsibilityRow);
    if (!editor.children.length) addResponsibilityRow('');

    state.rosterDraft.splice(index, 1);
    renderRosterCards();
    document.getElementById('roleTemplateSelect').focus();
    toast(state.language === 'es'
      ? 'El rol está listo para editar. Haga los cambios y vuelva a agregarlo a la lista.'
      : 'The role is ready to edit. Make changes and add it back to the list.');
  }

  async function loadSymbolPreview() {
    try {
      const result = await callServer('getHouseholdSymbol');
      const isLead = state.identityData && state.identityData.role === 'HOUSEHOLD_LEAD';
      const targetId = isLead ? 'symbolPreview' : 'memberSymbolPreview';
      const target = document.getElementById(targetId);
      if (!target) return;

      target.innerHTML = result.available
        ? '<img src="' + escapeAttribute(result.dataUrl) + '" alt="Household symbol">'
        : 'FPD';
    } catch (error) {
      // A missing or removed symbol should not block the identity screen.
    }
  }

  function handleSymbolSelection(event) {
    const file = event.target.files && event.target.files[0];
    state.symbolFile = null;
    if (!file) return;

    if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) {
      toast('Use a PNG, JPEG, or WebP symbolic image.', true);
      event.target.value = '';
      return;
    }

    if (file.size > 1024 * 1024) {
      toast('The symbolic image must be 1 MB or smaller.', true);
      event.target.value = '';
      return;
    }

    state.symbolFile = file;
    const reader = new FileReader();
    reader.onload = function() {
      const preview = document.getElementById('symbolPreview');
      preview.innerHTML = '<img src="' + escapeAttribute(String(reader.result || '')) + '" alt="Selected symbolic image preview">';
    };
    reader.readAsDataURL(file);
  }

  async function handleUploadSymbol() {
    if (!state.symbolFile) {
      toast('Choose a symbolic image first.', true);
      return;
    }
    if (!document.getElementById('symbolPrivacyCheck').checked) {
      toast('Confirm that the image contains no faces or private information.', true);
      return;
    }

    const button = document.getElementById('uploadSymbolButton');
    setBusy(button, true, 'Saving symbol…');

    try {
      const base64 = await fileToBase64(state.symbolFile);
      const result = await callServer('uploadHouseholdSymbol', {
        name: state.symbolFile.name,
        mimeType: state.symbolFile.type,
        base64: base64,
        privacyConfirmed: true
      });
      document.getElementById('symbolPreview').innerHTML =
        '<img src="' + escapeAttribute(result.dataUrl) + '" alt="Household symbol">';
      state.symbolFile = null;
      document.getElementById('symbolFileInput').value = '';
      document.getElementById('symbolPrivacyCheck').checked = false;
      toast(result.message);
      await loadIdentityWorkspace();
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, 'Save Symbol to Draft');
    }
  }

  async function handleClearSymbol() {
    const confirmed = window.confirm(
      'Remove the symbolic image from the draft? Previously created Drive files and published versions will not be deleted.'
    );
    if (!confirmed) return;

    try {
      const result = await callServer('clearHouseholdSymbol');
      document.getElementById('symbolPreview').textContent = 'FPD';
      toast(result.message);
      await loadIdentityWorkspace();
    } catch (error) {
      toast(error.message || String(error), true);
    }
  }

      toast(result.message);
      await loadIdentityWorkspace();
    } catch (error) {
      toast(error.message || String(error), true);
    } finally {
      setBusy(button, false, 'Save Identity Draft');
    }
  }

    const values = Array.from(document.querySelectorAll('.value-row')).map(function(row) {
      return {
        id: row.dataset.id || '',
        libraryId: row.dataset.libraryId || '',
        label: row.querySelector('.value-label').value,
        description: row.querySelector('.value-description').value
      };

  function handlePackFileSelection(event) {
    const file = event.target.files && event.target.files[0];
    state.pendingPackText = '';
    state.pendingPackPreview = null;
    hide('packPreview');
    hide('applyPackButton');
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
      toast('The selected Family Sharing File is larger than the 2 MB safety limit.', true);
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = async function() {
      state.pendingPackText = String(reader.result || '');
      try {
        const preview = await callServer('previewHouseholdUpdatePack', state.pendingPackText);
        state.pendingPackPreview = preview;
        renderPackPreview(preview);
      } catch (error) {
        state.pendingPackText = '';
        state.pendingPackPreview = null;
        toast(error.message || String(error), true);
      }
    };
    reader.onerror = function() { toast('FamilyPD could not read the selected Family Sharing File.', true); };
    reader.readAsText(file, 'UTF-8');
  }

  function renderPackPreview(preview) {
    const countItems = Object.keys(preview.counts).map(function(category) {
      return '<li><strong>' + escapeHtml(prettyName(category)) + ':</strong> ' +
        escapeHtml(String(preview.counts[category])) + '</li>';
    }).join('');
    const warning = preview.warning
      ? '<p class="warning-text"><strong>Warning:</strong> ' + escapeHtml(preview.warning) + '</p>'
      : '';

    const box = document.getElementById('packPreview');
    box.innerHTML = '<strong>✓ ' + escapeHtml(state.language === 'es' ? 'Archivo FamilyPD verificado' : 'Verified FamilyPD Sharing File') + '</strong><br>' +
      'Sharing file version ' + escapeHtml(String(preview.packageVersion)) +
      ' · Generated ' + escapeHtml(String(preview.generatedAt || '')) +
      warning + '<ul>' + countItems + '</ul><p>' + escapeHtml(preview.privacyMessage) + '</p>';
    show('packPreview');
    show('applyPackButton');
    toast(state.language === 'es' ? 'El Archivo para compartir fue verificado.' : 'The Family Sharing File was verified.');
  }

  async function handleApplyPack() {
    if (!state.pendingPackText || !state.pendingPackPreview) {
      toast('Select and verify a Family Sharing File first.', true);
      return;
    }

    let allowHouseholdChange = false;
    if (state.pendingPackPreview.differentHousehold) {
      allowHouseholdChange = window.confirm(
        'This verified Family Sharing File belongs to a different household. Apply it and replace the currently shared household information? Personal records will remain.'
      );
      if (!allowHouseholdChange) return;
    }

    const button = document.getElementById('applyPackButton');
    setBusy(button, true, 'Applying Family Sharing File…');
    try {
      const result = await callServer('applyHouseholdUpdatePack', state.pendingPackText, allowHouseholdChange);
      toast(result.message);
      state.pendingPackText = '';
      state.pendingPackPreview = null;
      document.getElementById('packFileInput').value = '';

    } finally {
      setBusy(button, false, 'Apply Family Sharing File');
    }
  }

  function populateGoalSelects(guidance) {
    guidance = guidance || {};
    fillOptionSelect('goalPillarSelect', guidance.pillars || []);
    fillOptionSelect('goalTimeframeSelect', guidance.timeframes || []);
    fillOptionSelect('goalMeasureSelect', guidance.measures || []);
    fillOptionSelect('checkpointStatusSelect', guidance.statuses || []);
    populateGoalIdeas();

    if (!document.getElementById('goalPillarSelect').value &&
        (guidance.pillars || []).length) {
      document.getElementById('goalPillarSelect').value = 'Goals';
      populateGoalIdeas();
    }
    if (!document.getElementById('goalTimeframeSelect').value &&
        (guidance.timeframes || []).length) {
      document.getElementById('goalTimeframeSelect').value = 'This year';
    }
    if (!document.getElementById('goalMeasureSelect').value &&
        (guidance.measures || []).length) {
      document.getElementById('goalMeasureSelect').value = 'General progress review';
    }
    if (!document.getElementById('checkpointStatusSelect').value &&
        (guidance.statuses || []).length) {
      document.getElementById('checkpointStatusSelect').value = 'In progress';
    }
  }


  function fillOptionSelect(id, options) {
    const select = document.getElementById(id);
    if (!select) return;
    const current = select.value;
    select.innerHTML = (options || []).map(function(option) {
      return '<option value="' + escapeAttribute(option.value) + '">' +
        escapeHtml(option.label) + '</option>';
    }).join('');
    if (Array.from(select.options).some(function(option) { return option.value === current; })) {
      select.value = current;
    }
  }


  function populateGoalIdeas() {
    const select = document.getElementById('goalIdeaSelect');
    if (!select || !state.goalsData) return;
    const pillar = document.getElementById('goalPillarSelect').value || 'Goals';
    const ideas = state.goalsData.guidance &&
      state.goalsData.guidance.ideas &&
      state.goalsData.guidance.ideas[pillar] || [];
    const current = select.value;
    select.innerHTML = '<option value="">' + escapeHtml(goalsUi().selectIdea) + '</option>' +
      ideas.map(function(idea) {
        return '<option value="' + escapeAttribute(idea.id) + '">' +
          escapeHtml(idea.title) + '</option>';
      }).join('');
    if (ideas.some(function(idea) { return idea.id === current; })) select.value = current;
  }

    const row = document.createElement('div');
    row.className = 'repeat-row goal-step-edit-row';
    row.dataset.id = step.id || '';
    row.dataset.status = step.status === 'Completed' ? 'Completed' : 'Not started';
    row.innerHTML =
      '<input class="goal-step-text" type="text" maxlength="500" spellcheck="true" placeholder="' +
      escapeAttribute(goalsUi().stepPlaceholder) + '" value="' +
      escapeAttribute(step.text || '') + '">' +
      '<button class="remove-row-button" type="button">' + escapeHtml(goalsUi().remove) + '</button>';
    row.querySelector('button').addEventListener('click', function() { row.remove(); });
    editor.appendChild(row);
  }

            escapeAttribute(step.id) + '"' +

    const actions = [

        escapeAttribute(goal.id) + '" data-scope="' + scope + '">' + escapeHtml(goalsUi().edit) + '</button>' : '',

      '<span class="goal-status">' + escapeHtml(goalLabelFor('statuses', goal.status)) + '</span></div>' +
      '<div class="goal-meta"><span>' + escapeHtml(goalLabelFor('pillars', goal.pillar)) + '</span>' +

  function clientPrivacyCheck(payload) {
    const text = JSON.stringify(payload || {});
    const patterns = [
      /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/i,
      /(?:\+?1[\s.-]?)?(?:\(?\d{3}\)?[\s.-]?)\d{3}[\s.-]?\d{4}\b/,
      /\b\d{3}[- ]?\d{2}[- ]?\d{4}\b/,
      /\b(?:password|passcode|routing\s+number|account\s+number|social\s+security|date\s+of\s+birth|medical\s+record)\s*(?:is\b|[:=])\s*\S+/i
    ];

    if (patterns.some(function(pattern) { return pattern.test(text); })) {
      toast(
        'FamilyPD detected information that may be sensitive. Replace exact details with a general, non-sensitive description.',
        true
      );
      return false;
    }
    return true;
  }

  function callServer(functionName) {
    const args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      let runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function(error) {
          reject(new Error(error && error.message ? error.message : String(error)));
        });
      runner[functionName].apply(runner, args);
    });
  }

  function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onload = function() {
        const value = String(reader.result || '');
        resolve(value.indexOf(',') >= 0 ? value.split(',')[1] : value);
      };
      reader.onerror = function() { reject(new Error('FamilyPD could not read the selected image.')); };
      reader.readAsDataURL(file);
    });
  }

  function downloadTextFile(filename, mimeType, content) {
    downloadBlob(filename, new Blob([content], { type: mimeType + ';charset=utf-8' }));
  }

  function downloadBase64File(filename, mimeType, base64Value) {
    let value = base64Value;

    // Some server responses wrap the content or return a complete data URL.
    if (value && typeof value === 'object') {
      value = value.base64Content || value.base64 || value.data || value.content || '';
    }

    value = String(value || '').trim();
    if (!value) {
      throw new Error('The file was created, but no downloadable content was returned.');
    }

    // Remove a data-URL prefix, whitespace introduced during transport, and
    // support URL-safe Base64. Then restore required padding for atob().
    const commaIndex = value.indexOf(',');
    if (/^data:/i.test(value) && commaIndex >= 0) {
      value = value.slice(commaIndex + 1);
    }
    value = value
      .replace(/\s+/g, '')
      .replace(/-/g, '+')
      .replace(/_/g, '/');

    const remainder = value.length % 4;
    if (remainder) value += '='.repeat(4 - remainder);

    if (!/^[A-Za-z0-9+/]*={0,2}$/.test(value)) {
      throw new Error('The generated file response was not valid Base64. Please generate the file again.');
    }

    let binary;
    try {
      binary = atob(value);
    } catch (error) {
      throw new Error('FamilyPD could not decode the generated file. Please generate it again.');
    }

    const bytes = new Uint8Array(binary.length);
    for (let index = 0; index < binary.length; index += 1) {
      bytes[index] = binary.charCodeAt(index);
    }
    downloadBlob(filename || 'FamilyPD-file', new Blob([bytes], {
      type: mimeType || 'application/octet-stream'
    }));
  }

  function downloadBlob(filename, blob) {
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement('a');
    anchor.href = url;
    anchor.download = filename;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    window.setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

    if (!select.value && select.options.length) {
      select.selectedIndex = 0;
    }
  }

  function fillSelect(id, values, selected) {
    document.getElementById(id).innerHTML = optionsHtml(values || [], selected || '');
  }

  function optionsHtml(values, selected) {
    return (values || []).map(function(value) {
      return '<option' + (value === selected ? ' selected' : '') + '>' + escapeHtml(value) + '</option>';
    }).join('');
  }

  function setBusy(button, busy, label) {
    button.disabled = busy;
    button.textContent = label;
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  function toast(message, isError) {
    const element = document.getElementById('toast');
    element.textContent = message;
    element.classList.toggle('error', Boolean(isError));
    element.classList.remove('hidden');
    window.clearTimeout(toast.timer);
    toast.timer = window.setTimeout(function() {
      element.classList.add('hidden');
    }, isError ? 6500 : 4300);
  }

  function prettyName(value) {
    return String(value).replace(/([a-z])([A-Z])/g, '$1 $2').replace(/_/g, ' ');
  }

  function formatDateTime(value) {
    if (!value) return 'Not available';
    const date = new Date(value);
    return Number.isNaN(date.getTime())
      ? String(value)
      : date.toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) { return escapeHtml(value); }


  function initializeAccountAndInviteTools_() {
    var switchButton = document.getElementById('switchGoogleAccountButton');
    if (switchButton && !switchButton.dataset.bound) {
      switchButton.dataset.bound = 'true';
      switchButton.addEventListener('click', async function() {
        var message = state.language === 'es'
          ? 'Esto cerrará la sesión de Google en este navegador y volverá a abrir FamilyPD OS. Es posible que Google le pida elegir una cuenta.'
          : 'This will sign out of Google in this browser and reopen FamilyPD OS. Google may ask you to choose an account.';
        if (!window.confirm(message)) return;
        try {
          var url = await callServer('fpdGetGoogleAccountSwitchUrl');
          window.top.location.href = url;
        } catch (error) { toast(error.message || String(error), true); }
      });
    }

    var inviteButton = document.getElementById('createInviteLinkButton');
    if (inviteButton && !inviteButton.dataset.bound) {
      inviteButton.dataset.bound = 'true';
      inviteButton.addEventListener('click', async function() {
        try {
          var result = await callServer('fpdGetFamilyMemberInviteLink');
          var input = document.getElementById('familyInviteLinkInput');
          var copy = document.getElementById('copyInviteLinkButton');
          var box = document.getElementById('familyInviteResult');
          if (input) input.value = result.url || '';
          if (copy) copy.classList.remove('hidden');
          if (box) {
            box.classList.remove('hidden');
            box.textContent = result.message || '';
          }
        } catch (error) { toast(error.message || String(error), true); }
      });
    }

    var copyButton = document.getElementById('copyInviteLinkButton');
    if (copyButton && !copyButton.dataset.bound) {
      copyButton.dataset.bound = 'true';
      copyButton.addEventListener('click', async function() {
        var input = document.getElementById('familyInviteLinkInput');
        if (!input || !input.value) return;
        try {
          await navigator.clipboard.writeText(input.value);
          toast(state.language === 'es' ? 'Enlace copiado.' : 'Invitation link copied.');
        } catch (error) {
          input.focus(); input.select();
          document.execCommand('copy');
          toast(state.language === 'es' ? 'Enlace copiado.' : 'Invitation link copied.');
        }
      });
    }


    var profileShareButton = document.getElementById('createFamilyProfileShareLinkButton');
    if (profileShareButton && !profileShareButton.dataset.bound) {
      profileShareButton.dataset.bound = 'true';
      profileShareButton.addEventListener('click', async function() {
        try {
          var result = await callServer('fpdCreateFamilyProfileShareLink');
          var input = document.getElementById('familyProfileShareLinkInput');
          var copy = document.getElementById('copyFamilyProfileShareLinkButton');
          var box = document.getElementById('familyProfileShareResult');
          if (input) input.value = result.url || '';
          if (copy) copy.classList.remove('hidden');
          if (box) { box.classList.remove('hidden'); box.textContent = result.message || ''; }
        } catch (error) { toast(error.message || String(error), true); }
      });
    }
    var profileCopyButton = document.getElementById('copyFamilyProfileShareLinkButton');
    if (profileCopyButton && !profileCopyButton.dataset.bound) {
      profileCopyButton.dataset.bound = 'true';
      profileCopyButton.addEventListener('click', async function() {
        var input = document.getElementById('familyProfileShareLinkInput');
        if (!input || !input.value) return;
        try { await navigator.clipboard.writeText(input.value); } catch(e) { input.focus(); input.select(); document.execCommand('copy'); }
        toast('Family Profile link copied.');
      });
    }

    var params = new URLSearchParams(window.location.search || '');
    if (params.get('join') === 'family-member') {
      window.setTimeout(function() {
        var card = document.querySelector('.role-card[data-role="FAMILY_MEMBER"]');
        if (card && !document.getElementById('onboardingView').classList.contains('hidden')) {
          card.focus();
          card.scrollIntoView({behavior:'smooth', block:'center'});
          toast(state.language === 'es' ? 'Elija “Unirse como miembro de la familia”.' : 'Choose “Join as a Family Member” to continue.');
        }
      }, 600);
    }
  }

  document.addEventListener('DOMContentLoaded', initializeAccountAndInviteTools_);

</script>

<script>

 academic:{label:'Our Learning Household',vision:'A household where curiosity, education, skills, and lifelong learning create greater choices for every generation.',mission:'We support school success, explore careers, build useful skills, and help one another learn without shame.',motto:'Keep learning. Keep growing.',values:['Education','Curiosity','Discipline','Support','Opportunity'],commitments:['We will check progress before problems become emergencies.','We will ask questions when we do not understand.','We will celebrate effort, growth, and achievement.']},
 wellness:{label:'Our Wellness Household',vision:'A peaceful household that protects physical, mental, emotional, and spiritual well-being.',mission:'We practice healthy routines, make space for feelings, seek trustworthy help, rest when needed, and care for one another.',motto:'Health first. Grace always.',values:['Health','Peace','Compassion','Safety','Balance'],commitments:['We will take mental health seriously.','We will not shame bodies, feelings, or requests for help.','We will make small healthy choices consistently.']},
 faith:{label:'Our Faith-Centered Household',vision:'A faithful household that grows in love, wisdom, service, and purpose.',mission:'We honor God through how we treat one another, serve our community, practice gratitude, and use our gifts responsibly.',motto:'Faith, family, purpose.',values:['Faith','Love','Service','Integrity','Gratitude'],commitments:['We will pray, reflect, and seek wisdom.','We will show love through our actions.','We will serve others while protecting our household well-being.']},
 career:{label:'Our Growth & Stability Household',vision:'A prepared household with strong skills, meaningful work, financial stability, and options for the future.',mission:'We build credentials, practice professional habits, manage money intentionally, and support each person’s career goals.',motto:'Skills create options.',values:['Growth','Preparation','Stewardship','Discipline','Opportunity'],commitments:['We will continue building useful skills.','We will discuss money without shame.','We will prepare before opportunities arrive.']},
 creative:{label:'Our Creative Household',vision:'A courageous household that creates, experiments, solves problems, and turns ideas into value.',mission:'We make time to create, test ideas, learn from failure, and use our talents to help others and build opportunities.',motto:'Imagine it. Build it. Share it.',values:['Creativity','Courage','Innovation','Persistence','Ownership'],commitments:['We will protect time for creative work.','We will treat mistakes as information.','We will finish and share meaningful projects.']},
 service:{label:'Our Service Household',vision:'A connected household that strengthens its community through kindness, leadership, and practical service.',mission:'We notice needs, share resources responsibly, volunteer, advocate, and help others with dignity.',motto:'Stronger families. Stronger communities.',values:['Service','Community','Kindness','Leadership','Justice'],commitments:['We will look for ways to help without judging.','We will listen to the people we serve.','We will turn concern into responsible action.']},
 stem:{label:'Our STEM & Innovation Household',vision:'A future-ready household that uses science, technology, engineering, mathematics, and creativity to solve real problems.',mission:'We explore how things work, build technical skills, complete projects, document our learning, and share solutions.',motto:'Learn. Build. Improve.',values:['Curiosity','Innovation','Accuracy','Teamwork','Persistence'],commitments:['We will research before making claims.','We will document our work and test our ideas.','We will use technology safely and ethically.']},
 single:{label:'Our Strong Household',vision:'A stable, loving household where every member feels supported, responsible, and hopeful about the future.',mission:'We communicate clearly, share responsibilities, protect our well-being, and build opportunities together one step at a time.',motto:'Strong together.',values:['Love','Stability','Respect','Responsibility','Growth'],commitments:['We will ask for and accept help when needed.','We will share age-appropriate responsibilities.','We will celebrate progress without demanding perfection.']},
 blended:{label:'Our Blended Family',vision:'A united household where every member belongs, differences are respected, and trust grows through consistency.',mission:'We build connection through honest communication, fair expectations, shared traditions, and patience with one another.',motto:'Many stories. One team.',values:['Belonging','Respect','Patience','Fairness','Trust'],commitments:['We will not compare family members or relationships.','We will create new traditions together.','We will address conflict without attacking belonging.']},
 grandparent:{label:'Our Grandparent-Led Household',vision:'A secure multigenerational household where wisdom, care, learning, and opportunity are passed forward.',mission:'We combine experience with new ideas, support education and health, preserve family history, and prepare the next generation.',motto:'Wisdom forward.',values:['Wisdom','Care','Education','Tradition','Preparation'],commitments:['We will preserve stories and lessons.','We will ask for support before caregivers become overwhelmed.','We will prepare young people for independence.']},
 newhousehold:{label:'Our New Household',vision:'A peaceful, organized home where we learn how to live, communicate, and grow together.',mission:'We create clear routines, discuss expectations, make decisions together, and build healthy traditions from the beginning.',motto:'Build it with purpose.',values:['Clarity','Respect','Cooperation','Peace','Growth'],commitments:['We will discuss expectations instead of assuming them.','We will review what is working and adjust together.','We will create traditions that fit our household.']},
 legacy:{label:'Our Family Legacy Household',vision:'A connected family that preserves its history, grows through each generation, and leaves wisdom and opportunity behind.',mission:'We document stories, recipes, traditions, lessons, achievements, and values while continuing to learn and improve.',motto:'Remember. Grow. Pass it on.',values:['Legacy','Family','Wisdom','Growth','Stewardship'],commitments:['We will preserve important family stories.','We will teach useful skills across generations.','We will leave the next generation stronger and better prepared.']}
 };
 function setv(id,v){const e=document.getElementById(id);if(e)e.value=v||'';}
 function applyStarter(){
   const select=document.getElementById('identityStarterProfileSelect');
   const key=select?select.value:'foundation';
   const box=document.getElementById('identityStarterProfilePreview');
   if(key==='custom'){
     if(!confirm('Start with a blank custom Family Profile? This clears the mission, vision, motto, values, and commitments currently shown.'))return;
     setv('identityLabelInput','My Household');
     setv('visionInput','');
     setv('missionInput','');
     setv('mottoInput','');
     if(typeof renderValuesEditor==='function')renderValuesEditor([]);
     if(typeof renderCommitmentsEditor==='function')renderCommitmentsEditor([{}]);
     if(box){box.innerHTML='<strong>Custom profile ready.</strong><br>Use the examples and sentence starters below to create your household mission, vision, values, motto, and commitments.';box.classList.remove('hidden');}
     if(typeof activateIdentityGuideStep==='function')activateIdentityGuideStep('statements',true);
     const target=document.getElementById('identityStatementsSection')||document.getElementById('visionInput');
     if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
     window.toast&&toast('Blank editable Family Profile created.');
     return;
   }
   const p=STARTERS[key];
   if(!p)return;
   if(!confirm('Create this editable Family Profile? Any unsaved mission, vision, motto, values, and commitments currently shown will be replaced.'))return;
   setv('identityLabelInput',p.label);
   setv('visionInput',p.vision);
   setv('missionInput',p.mission);
   setv('mottoInput',p.motto);
   const values=(p.values||[]).map((name,i)=>({id:'starter-'+i,label:name,description:'This value guides how our household treats people, makes decisions, and works toward shared goals.'}));
   const commitments=(p.commitments||[]).map((text,i)=>({id:'starter-c-'+i,statement:text,description:''}));
   if(typeof renderValuesEditor==='function')renderValuesEditor(values);
   if(typeof renderCommitmentsEditor==='function')renderCommitmentsEditor(commitments);
   ['identityLabelInput','visionInput','missionInput','mottoInput'].forEach(function(id){const e=document.getElementById(id);if(e)e.dispatchEvent(new Event('input',{bubbles:true}));});
   if(box){box.innerHTML='<strong>Your editable Family Profile is ready.</strong><br><strong>Mission:</strong> '+escapeHtml(p.mission)+'<br><strong>Vision:</strong> '+escapeHtml(p.vision)+'<br><strong>Motto:</strong> '+escapeHtml(p.motto)+'<br><br>Review and personalize every section. Then save the draft and publish it before inviting family members.';box.classList.remove('hidden');}
   if(typeof activateIdentityGuideStep==='function')activateIdentityGuideStep('statements',true);
   const target=document.getElementById('identityStatementsSection')||document.getElementById('visionInput');
   if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
   window.toast&&toast('Editable Family Profile created. Review the generated sections below.');
 }
 function sharingState(){if(typeof state==='undefined'||!state.workspace)return;const isLead=state.workspace.role==='HOUSEHOLD_LEAD';if(isLead)return;const identity=state.identityData&&state.identityData.publishedVersion;const connected=identity&&identity.exists;const no=document.getElementById('memberNotConnectedView'),yes=document.getElementById('memberConnectedView');if(no)no.classList.toggle('hidden',!!connected);if(yes)yes.classList.toggle('hidden',!connected);if(connected){const profile=identity.profile||{};const n=document.getElementById('connectedHouseholdName');if(n)n.textContent='Connected to '+(profile.label||profile.householdLabel||'your household');const d=document.getElementById('connectedHouseholdDetails');if(d)d.textContent='Connected using published Family Identity version '+(identity.versionNumber||identity.version||1)+'.';}}
 async function disconnectShared(){if(!confirm('Disconnect from this household? This removes previously imported shared household information from this workspace. Your private personal work remains.'))return;try{await callServer('fpdDisconnectImportedHousehold');window.toast&&toast('Household disconnected.');setTimeout(()=>location.reload(),600);}catch(e){window.toast&&toast(e.message||String(e),true);}}
 function bindV11(){const b=document.getElementById('applyIdentityStarterProfileButton');if(b&&!b.dataset.bound){b.dataset.bound='1';b.addEventListener('click',applyStarter);}const d=document.getElementById('disconnectSharedHouseholdButton');if(d&&!d.dataset.bound){d.dataset.bound='1';d.addEventListener('click',disconnectShared);}document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{if(btn.dataset.panel==='updatePanel')setTimeout(sharingState,100);}));setTimeout(sharingState,1000);}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bindV11);else bindV11();
})();


(function(){
  'use strict';
  let validInviteToken='';
  let incomingToken='';
  function el(id){return document.getElementById(id)}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function server(name,args){return new Promise((resolve,reject)=>{let r=google.script.run.withSuccessHandler(resolve).withFailureHandler(e=>reject(new Error(e&&e.message?e.message:String(e))));r[name].apply(r,args||[]);});}
  function tokenFromLink(value,key){try{const u=new URL(String(value||'').trim());return u.searchParams.get(key)||'';}catch(e){return '';}}
  async function loadConnection(){try{const r=await server('fpdGetHouseholdConnection');const no=el('memberNotConnectedView'),yes=el('memberConnectedView');if(no)no.classList.toggle('hidden',!!r.connected);if(yes)yes.classList.toggle('hidden',!r.connected);if(r.connected&&r.connection){el('connectedHouseholdName').textContent='Connected to '+(r.connection.householdLabel||'your household');el('connectedHouseholdDetails').textContent='Joined '+new Date(r.connection.joinedAt).toLocaleDateString()+'. Approved household information is available in this workspace.';}}catch(e){}}
  async function createInvite(){const b=el('createHouseholdInviteButton');if(!b)return;b.disabled=true;b.textContent='Creating…';try{const r=await server('fpdCreateHouseholdInvite');el('householdInviteOutput').value=r.url;el('copyHouseholdInviteButton').classList.remove('hidden');el('householdInviteResult').innerHTML='<strong>Invitation ready.</strong><br>Send this one link by text or email. It expires '+esc(new Date(r.expiresAt).toLocaleDateString())+'.';el('householdInviteResult').classList.remove('hidden');}catch(e){alert(e.message)}finally{b.disabled=false;b.textContent='Create Invitation Link';}}
  async function checkInvite(token){const box=el('joinHouseholdPreview'),join=el('joinHouseholdByLinkButton');validInviteToken='';join.disabled=true;if(!token){box.innerHTML='<span class="warning-text">Paste a complete FamilyPD invitation link.</span>';box.classList.remove('hidden');return;}try{const r=await server('fpdPreviewHouseholdInvite',[token]);validInviteToken=token;join.disabled=false;box.innerHTML='<strong>Invitation verified</strong><br>You are joining <strong>'+esc(r.householdLabel)+'</strong>.<br>Review the household name, then choose Join Household.';box.classList.remove('hidden');}catch(e){box.innerHTML='<span class="warning-text">'+esc(e.message)+'</span>';box.classList.remove('hidden');}}
  async function joinInvite(){if(!validInviteToken)return;const b=el('joinHouseholdByLinkButton');b.disabled=true;b.textContent='Joining…';try{const r=await server('fpdJoinHouseholdByLink',[validInviteToken]);alert(r.message);await loadConnection();if(typeof loadIdentityWorkspace==='function')await loadIdentityWorkspace();}catch(e){alert(e.message)}finally{b.textContent='Join Household';}}
  async function loadShareables(){const select=el('shareableItemSelect');if(!select)return;try{const rows=await server('fpdListShareableItems');select.innerHTML='<option value="">Choose an item</option>'+rows.map(x=>'<option value="'+esc(x.type+'|'+x.id)+'">'+esc(x.title)+' · '+esc(x.type.replace(/-/g,' '))+'</option>').join('');select.onchange=()=>{el('createItemShareButton').disabled=!select.value;};}catch(e){select.innerHTML='<option value="">No shareable items available</option>';}}
  async function createItemShare(){const val=el('shareableItemSelect').value;if(!val)return;const [type,id]=val.split('|');const b=el('createItemShareButton');b.disabled=true;b.textContent='Creating…';try{const r=await server('fpdCreateItemShare',[type,id]);el('itemShareLinkOutput').value=r.url;el('copyItemShareButton').classList.remove('hidden');el('itemShareResult').innerHTML='<strong>Sharing link ready.</strong><br>The recipient can preview this '+esc(type.replace(/-/g,' '))+' before adding it to FamilyPD.';el('itemShareResult').classList.remove('hidden');}catch(e){alert(e.message)}finally{b.disabled=false;b.textContent='Create Sharing Link';}}
  async function previewIncoming(token){if(!token)return;try{const r=await server('fpdPreviewItemShare',[token]);incomingToken=token;el('incomingSharedItemTitle').textContent=r.title;el('incomingSharedItemPreview').innerHTML='<p><strong>Type:</strong> '+esc(r.type.replace(/-/g,' '))+'</p><p>This information was shared intentionally. Add it only if you recognize and trust the sender.</p>';el('incomingSharedItemCard').classList.remove('hidden');}catch(e){alert(e.message)}}
  async function importIncoming(){if(!incomingToken)return;const b=el('addSharedItemButton');b.disabled=true;try{const r=await server('fpdImportItemShare',[incomingToken]);alert(r.message);el('incomingSharedItemCard').classList.add('hidden');await loadReceived();}catch(e){alert(e.message)}finally{b.disabled=false;}}
  async function loadReceived(){const box=el('receivedItemsList'),dash=el('dashboardReceivedItemsList');try{const rows=await server('fpdListReceivedItems');const html=rows.length?rows.map(x=>'<article class="shared-item-card"><strong>'+esc(x.title)+'</strong><br><small>'+esc(x.type.replace(/-/g,' '))+' · Added '+esc(new Date(x.importedAt).toLocaleDateString())+'</small></article>').join(''):'<p class="empty-state">Nothing has been added yet.</p>';if(box)box.innerHTML=html;if(dash)dash.innerHTML=html;}catch(e){if(box)box.innerHTML='<p class="empty-state">Shared items could not be loaded.</p>';if(dash)dash.innerHTML='<p class="empty-state">Shared items could not be loaded.</p>';}}
  function copy(id){const v=el(id).value;if(!v)return;navigator.clipboard.writeText(v).then(()=>alert('Link copied.')).catch(()=>{el(id).select();document.execCommand('copy');alert('Link copied.');});}
  async function disconnect(){if(!confirm('Disconnect from this household? Imported household information will be removed. Your private projects, goals, notes, and files will remain.'))return;try{const r=await server('fpdDisconnectHouseholdLink');alert(r.message);await loadConnection();}catch(e){alert(e.message)}}
  function bind(){
    el('createHouseholdInviteButton')?.addEventListener('click',createInvite);
    el('copyHouseholdInviteButton')?.addEventListener('click',()=>copy('householdInviteOutput'));
    el('checkHouseholdInviteButton')?.addEventListener('click',()=>checkInvite(tokenFromLink(el('joinHouseholdLinkInput').value,'join')));
    el('joinHouseholdLinkInput')?.addEventListener('input',()=>{validInviteToken='';el('joinHouseholdByLinkButton').disabled=true;});
    el('joinHouseholdByLinkButton')?.addEventListener('click',joinInvite);
    el('disconnectSharedHouseholdButton')?.addEventListener('click',disconnect);
    el('createItemShareButton')?.addEventListener('click',createItemShare);
    el('copyItemShareButton')?.addEventListener('click',()=>copy('itemShareLinkOutput'));
    el('addSharedItemButton')?.addEventListener('click',importIncoming);
    el('dashboardOpenSharingButton')?.addEventListener('click',()=>{document.querySelector('[data-panel="updatePanel"]')?.click();});
    loadConnection();loadShareables();loadReceived();
    const ctx=window.FPD_INITIAL_LINK_CONTEXT||{};
    if(ctx.joinToken){const inp=el('joinHouseholdLinkInput');if(inp)inp.value=location.href;checkInvite(ctx.joinToken);}
    if(ctx.sharedToken)previewIncoming(ctx.sharedToken);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bind);else bind();
})();
</script>
