<script>
(function(){
 const $=id=>document.getElementById(id), esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); let projects=[];
 const ideas={
  'Robotics':['Build a sensor-based safety helper','Design a robot that sorts household items','Create and test three drivetrain designs','Develop an assistive robot concept for a community need'],
  'Coding & Apps':['Build a family task app prototype','Create a study timer with progress tracking','Design an accessible quiz game','Build a local-resource directory prototype'],
  'Cybersecurity':['Create a family phishing-awareness campaign','Build a password-safety teaching game','Design a home cyber-safety checklist and test plan','Analyze common scam patterns and present prevention strategies'],
  'AI & Data':['Create an AI prompt guide for families','Compare AI answers with official sources','Build a small family survey and visualize results','Design an ethical AI assistant concept'],
  'Entrepreneurship':['Create a small business concept and customer profile','Design a product, price it, and test feedback','Build a one-page business plan','Create a marketing campaign and measure response'],
  'Community Service':['Map a local need and propose a solution','Create a neighborhood resource guide','Plan and document a service project','Develop an awareness campaign with measurable impact'],
  'Family History':['Interview relatives and create a digital story','Build a family timeline','Create a recipe and tradition archive','Produce a mini-documentary about family resilience'],
  'Health & Wellness':['Design a beginner family movement challenge','Create a low-cost healthy meal plan','Track one wellness habit and analyze results','Build a stress-reduction toolkit'],
  'Art & Design':['Create a family values poster series','Design an accessible public-information flyer','Build a recycled-material art installation','Create a visual identity for a community cause'],
  'Writing & Media':['Write and publish a family lesson booklet','Produce a short podcast series','Create a documentary storyboard','Build a fact-checked news explainer'],
  'Science & Engineering':['Design and test a water-filter model','Build a simple energy-efficiency investigation','Create a bridge prototype and compare designs','Research a local environmental problem and engineer a response'],
  'Financial Literacy':['Create a family budget simulation','Compare real costs of three career paths','Design a youth savings challenge','Build a needs-versus-wants teaching game']
 };
 function levelReq(level){return {elementary:'Use clear steps, one simple test, pictures, and a short explanation.',middle:'Include research from two trustworthy sources, a test or comparison, data, and a presentation.',high:'Define a real problem, document requirements, use three or more credible sources, analyze evidence, revise the product, and present limitations.',adult:'Create a project charter, timeline, budget or resource plan, stakeholder needs, measurable outcomes, risk review, and a professional final presentation.'}[level];}
 function generate(){const area=$('projectArea').value,level=$('projectGradeBand').value,purpose=$('projectPurpose').value,time=$('projectTime').selectedOptions[0].text,budget=$('projectBudget').selectedOptions[0].text; const base=ideas[area]||ideas['Coding & Apps']; $('projectIdeaResults').innerHTML=base.map((title,i)=>`<article class="project-idea-card"><span class="eyebrow">IDEA ${i+1}</span><h4>${esc(title)}</h4><p><strong>Purpose:</strong> ${esc(purpose)} · <strong>Time:</strong> ${esc(time)} · <strong>Budget:</strong> ${esc(budget)}</p><p>${esc(levelReq(level))}</p><button class="primary-button create-project-from-idea" data-title="${esc(title)}" type="button">Create Project</button></article>`).join(''); document.querySelectorAll('.create-project-from-idea').forEach(b=>b.onclick=()=>createFromIdea(b.dataset.title,area,level)); }
 function createFromIdea(title,area,level){const tasks=['Define the project goal and success criteria','Research trustworthy information','Create a plan and list materials or tools','Build or complete the first version','Test, collect feedback, and improve','Prepare the final explanation or presentation','Reflect on what was learned']; const p={title,area,level,status:'Planning',progress:0,tasks:tasks.map((t,i)=>({id:String(i+1),title:t,done:false})),notes:'',publicUrl:''}; save(p);}
 function save(p){google.script.run.withSuccessHandler(r=>{projects=r.projects||[];render();window.toast&&toast('Project saved.');}).withFailureHandler(e=>window.toast&&toast(e.message||String(e),true)).fpdProjectSave(p);}
 function load(){if(!$('projectStudioPanel'))return;google.script.run.withSuccessHandler(r=>{projects=r||[];render();}).withFailureHandler(()=>{}).fpdProjectList();}
 function render(){const box=$('projectTrackerList'); if(!projects.length){box.innerHTML='<div class="empty-state">Choose a generated idea and select <strong>Create Project</strong>.</div>';return;} box.innerHTML=projects.map(p=>`<article class="project-tracker-card"><div><span class="status-badge">${esc(p.status)}</span><h4>${esc(p.title)}</h4><p>${esc(p.area||'Project')} · ${Math.round(p.progress||0)}% complete</p>${p.driveFolderUrl?`<a href="${esc(p.driveFolderUrl)}" target="_blank" rel="noopener">Open Google Drive folder</a>`:''}</div><div class="button-row"><button class="secondary-button project-open" data-id="${esc(p.id)}" type="button">Open Tasks</button>${p.driveFolderUrl?'':`<button class="secondary-button project-drive" data-id="${esc(p.id)}" type="button">Connect Google Drive</button>`}<button class="text-button danger-text project-delete" data-id="${esc(p.id)}" type="button">Delete</button></div></article>`).join(''); document.querySelectorAll('.project-open').forEach(b=>b.onclick=()=>openEditor(b.dataset.id));document.querySelectorAll('.project-drive').forEach(b=>b.onclick=()=>connectDrive(b.dataset.id));document.querySelectorAll('.project-delete').forEach(b=>b.onclick=()=>del(b.dataset.id));}
 function openEditor(id){const p=projects.find(x=>x.id===id);if(!p)return;const modal=$('projectEditorModal');modal.innerHTML=`<section class="edit-card project-editor-card"><div class="section-heading-row"><div><span class="eyebrow">PROJECT TASK TRACKER</span><h3>${esc(p.title)}</h3><p>Check tasks as you complete them. Add a public review link only after you intentionally share a finished file or site.</p></div><button id="closeProjectEditor" class="modal-close" type="button">×</button></div><div class="project-task-list">${(p.tasks||[]).map(t=>`<label class="project-task"><input type="checkbox" data-task="${esc(t.id)}" ${t.done?'checked':''}><span>${esc(t.title)}</span></label>`).join('')}</div><label class="field"><span>Project notes or reflection</span><textarea id="projectNotes" rows="5" spellcheck="true">${esc(p.notes||'')}</textarea></label><label class="field"><span>Optional public review link</span><input id="projectPublicUrl" type="url" value="${esc(p.publicUrl||'')}" placeholder="https://..."><small>Warning: anyone with a public link may be able to view the shared content. Review Drive or site permissions before saving the link here.</small></label><div class="button-row"><button id="saveProjectEditor" class="primary-button" type="button">Save Progress</button><button id="completeProject" class="secondary-button" type="button">Mark Project Complete</button></div></section>`;modal.classList.remove('hidden');$('closeProjectEditor').onclick=()=>modal.classList.add('hidden');$('saveProjectEditor').onclick=()=>saveEditor(p,false);$('completeProject').onclick=()=>saveEditor(p,true);}
 function saveEditor(p,complete){p.tasks=(p.tasks||[]).map(t=>Object.assign({},t,{done:!!document.querySelector('[data-task="'+t.id+'"]').checked}));p.notes=$('projectNotes').value;p.publicUrl=$('projectPublicUrl').value.trim();p.progress=p.tasks.length?Math.round(p.tasks.filter(t=>t.done).length/p.tasks.length*100):0;if(complete){p.status='Complete';p.progress=100;p.tasks=p.tasks.map(t=>Object.assign({},t,{done:true}));}else p.status=p.progress? 'In Progress':'Planning';$('projectEditorModal').classList.add('hidden');save(p);}
 function server(name,args,onSuccess,onFailure){let runner=google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFailure||function(e){window.toast&&toast(e.message||String(e),true);});runner[name].apply(runner,args||[]);}
 function showDriveGuidance(result,id){const status=result&&result.driveStatus?result.driveStatus:{};const issues=(status.issues||[]).filter(Boolean);let message=(result&&result.message)||status.message||'Your FamilyPD Drive workspace needs attention.';if(issues.length)message+='\n\nFamilyPD found:\n• '+issues.join('\n• ');if(result&&result.requiresSetup){alert(message+'\n\nOpen Workspace Setup from the FamilyPD OS menu, complete setup, and then return to this project.');return;}if(result&&result.requiresRepair){if(confirm(message+'\n\nYour project and tasks are safe. Repairing reconnects or recreates missing FamilyPD workspace folders and files. It does not delete this project.\n\nRepair Workspace now?'))repairAndRetry(id);return;}alert(message);}
 function repairAndRetry(id){window.toast&&toast('Repairing and refreshing your FamilyPD Drive workspace...');server('fpdProjectRepairDriveWorkspace',[],function(r){if(!r||!r.success){showDriveGuidance({requiresRepair:true,message:(r&&r.message)||'Repair did not complete.',driveStatus:r&&r.status},id);return;}window.toast&&toast(r.message||'Workspace repaired.');createFolderAfterCheck(id);});}
 function createFolderAfterCheck(id){server('fpdProjectCreateDriveFolder',[id],function(r){if(!r||r.success===false){showDriveGuidance(r||{},id);return;}projects=r.projects||[];render();window.toast&&toast(r.alreadyConnected?'This project is already connected to Google Drive.':'Project Drive folder created.');});}
 function connectDrive(id){if(!confirm('Connect this project to your FamilyPD Google Drive workspace? FamilyPD will create one project folder. Your project tracker stays safe if Drive needs repair.'))return;server('fpdProjectGetDriveStatus',[],function(status){if(status&&status.ready){createFolderAfterCheck(id);return;}showDriveGuidance({requiresRepair:status&&status.code==='repair-required',requiresSetup:status&&status.code==='not-configured',message:status&&status.message,driveStatus:status},id);});}
 function del(id){if(!confirm('Delete this project tracker? This does not delete any Google Drive folder or public file.'))return;google.script.run.withSuccessHandler(r=>{projects=r||[];render();}).fpdProjectDelete(id);}
 function bind(){if(!$('projectStudioPanel')||$('projectStudioPanel').dataset.bound)return;$('projectStudioPanel').dataset.bound='1';$('generateProjectIdeasButton').onclick=generate;load();}
 if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bind);else bind();
})();
</script>
